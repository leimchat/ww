<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>leimchat — технические работы</title>
<style>
  :root{
    --bg:#08080c;
    --panel:rgba(20,20,28,0.6);
    --accent:#6c8cff;
    --accent2:#ff6ca0;
    --text:#eef0f5;
    --muted:#8b8fa3;
    --border:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at 20% 15%, rgba(108,140,255,0.16), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(255,108,160,0.12), transparent 50%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow:hidden;
  }

  .card{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:24px;
    padding:48px 36px 40px;
    text-align:center;
    backdrop-filter:blur(18px);
    box-shadow:0 30px 80px -30px rgba(0,0,0,0.6);
    position:relative;
  }

  .logo{
    font-size:15px;
    font-weight:800;
    letter-spacing:.08em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:34px;
  }
  .logo b{color:var(--text);}

  .icon-wrap{
    width:84px; height:84px;
    margin:0 auto 28px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .icon-ring{
    position:absolute; inset:0;
    border-radius:50%;
    border:2px solid rgba(108,140,255,0.25);
    border-top-color:var(--accent);
    animation:spin 1.6s linear infinite;
  }
  .icon-wrap svg{
    width:34px; height:34px;
    color:var(--accent);
    animation:wrench 2.4s ease-in-out infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes wrench{
    0%,100%{ transform:rotate(-8deg); }
    50%{ transform:rotate(8deg); }
  }

  h1{
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.01em;
    margin-bottom:12px;
  }

  p.desc{
    color:var(--muted);
    font-size:14.5px;
    line-height:1.65;
    max-width:360px;
    margin:0 auto 30px;
  }

  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(108,140,255,0.10);
    border:1px solid rgba(108,140,255,0.25);
    color:var(--accent);
    font-size:12.5px;
    font-weight:600;
    letter-spacing:.02em;
    padding:8px 16px;
    border-radius:100px;
    margin-bottom:32px;
  }
  .status-pill .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 8px 2px var(--accent);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:.35; transform:scale(1.3);}
  }

  .progress-track{
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.06);
    border-radius:100px;
    overflow:hidden;
    margin-bottom:10px;
  }
  .progress-fill{
    height:100%;
    width:64%;
    border-radius:100px;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    animation:grow 2.8s ease-in-out infinite alternate;
  }
  @keyframes grow{
    from{ width:52%; }
    to{ width:76%; }
  }

  .progress-label{
    font-size:11.5px;
    color:var(--muted);
    letter-spacing:.03em;
    margin-bottom:34px;
  }

  footer{
    font-size:12px;
    color:var(--muted);
  }
  footer a{
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="logo"><b>leim</b>chat</div>

    <div class="icon-wrap">
      <div class="icon-ring"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <h1>Ведутся технические работы</h1>
    <p class="desc">
      Мы обновляем leimchat, чтобы сделать его быстрее и стабильнее.
      Сервис скоро вернётся в обычном режиме — спасибо за терпение.
    </p>

    <div class="status-pill"><span class="dot"></span> Работы в процессе</div>

    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="progress-label">выполняется обновление серверов</div>
  </div>

</body>
</html>
