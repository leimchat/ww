    if(!al.createdAt) al.createdAt=Date.now();
  });
  /* нормализуем артистов */
  d.artists.forEach(a=>{
    if(!Array.isArray(a.trackIds)) a.trackIds=[];
    if(!Array.isArray(a.subscriberIds)) a.subscriberIds=[];
    if(!a.name) a.name="";
    if(!a.bio) a.bio="";
    if(a.avatarUrl===undefined) a.avatarUrl=null;
    if(a.bannerUrl===undefined) a.bannerUrl=null;
  });
  /* нормализуем пользователей */
  d.users.forEach(u=>{
    if(!Array.isArray(u.likedTrackIds)) u.likedTrackIds=[];
    if(u.isPrivate===undefined) u.isPrivate=false;
    /* "Кто может звонить мне": all — все, friends — только друзья, none — никто */
    if(u.callPrivacy===undefined) u.callPrivacy="all";
    if(!u.socialLinks||typeof u.socialLinks!=="object") u.socialLinks={};
    SOCIAL_PLATFORMS.forEach(([key])=>{ if(u.socialLinks[key]===undefined) u.socialLinks[key]=""; });
    /* данные о последнем входе — используются, чтобы при повторном входе
       не создавать новую запись, а обновлять существующую */
    if(!u.lastLoginAt) u.lastLoginAt=u.createdAt||Date.now();
    if(!u.lastSeenAt) u.lastSeenAt=u.lastLoginAt;
    if(u.online===undefined) u.online=false;
    if(u.device===undefined) u.device="";
    if(u.loginCount===undefined) u.loginCount=1;
    /* Premium: нормализуем поле для старых записей */
    if(!u.premium||typeof u.premium!=="object") u.premium={forever:false,until:null,grantedAt:null,history:[]};
    if(!Array.isArray(u.premium.history)) u.premium.history=[];
    if(u.premium.grantedAt===undefined) u.premium.grantedAt=null;
    /* Автоматически помечаем истёкшую временную подписку */
    if(u.premium&&!u.premium.forever&&u.premium.until&&u.premium.until>0&&u.premium.until<Date.now()){
      u.premium.until=u.premium.until; /* оставляем, isPremiumActive вернёт false */
    }
  });
  /* убираем дубликаты одного и того же аккаунта (один и тот же логин),
     которые могли накопиться раньше из-за гонки при регистрации/входе —
     оставляем самую раннюю запись и переносим на неё все данные остальных */
  dedupeUsersByUsername(d);
  /* нормализуем плейлисты */
  if(!Array.isArray(d.playlists)) d.playlists=[];
  d.playlists.forEach(p=>{
    if(!Array.isArray(p.trackIds)) p.trackIds=[];
    if(!p.name) p.name="Плейлист";
    if(!p.ownerId) p.ownerId="";
    if(p.isPrivate===undefined) p.isPrivate=false;
  });
  /* нормализуем треки — поддержка внешних источников */
  d.tracks.forEach(t=>{
    if(!t.sourceType) t.sourceType="file";
    if(t.embedUrl===undefined) t.embedUrl=null;
  });
  /* нормализуем каналы */
  if(!Array.isArray(d.channels)) d.channels=[];
  if(!Array.isArray(d.channelPosts)) d.channelPosts=[];
  d.channelPosts.forEach(cp=>{ if(!Array.isArray(cp.viewedBy)) cp.viewedBy=[]; });
  if(!Array.isArray(d.channelComments)) d.channelComments=[];
  if(!Array.isArray(d.notifications)) d.notifications=[];
  d.channels.forEach(ch=>{
    if(!Array.isArray(ch.subscriberIds)) ch.subscriberIds=[];
    if(!Array.isArray(ch.moderators)) ch.moderators=[];
    if(!Array.isArray(ch.bannedUserIds)) ch.bannedUserIds=[];
    if(!Array.isArray(ch.allowedReactions)) ch.allowedReactions=[];
    /* Миграция: adminIds → moderators */
    if(Array.isArray(ch.adminIds)&&ch.adminIds.length&&!ch.moderators.length){
      ch.moderators=ch.adminIds.map(a=>({userId:a.userId,permissions:{canPost:true,canDeletePosts:!!(a.permissions&&a.permissions.canDelete),canPinPosts:!!(a.permissions&&a.permissions.canPin),canBanUsers:false,canInvite:true,canEditChannel:!!(a.permissions&&a.permissions.canEditDesign)}}));
      ch.adminIds=[];
    }
    if(ch.isPrivate===undefined) ch.isPrivate=false;
    if(ch.verified===undefined) ch.verified=false;
    if(ch.blocked===undefined) ch.blocked=false;
    if(ch.commentsEnabled===undefined) ch.commentsEnabled=true;
    if(ch.commentsSubscribersOnly===undefined) ch.commentsSubscribersOnly=false;
    if(!ch.category) ch.category="";
    if(!ch.description) ch.description="";
    if(ch.pinnedPostId===undefined) ch.pinnedPostId=null;
    if(ch.avatarUrl===undefined) ch.avatarUrl=null;
    if(ch.bannerUrl===undefined) ch.bannerUrl=null;
  });
  d.channelPosts.forEach(cp=>{
    if(!cp.reactions) cp.reactions={};
    if(cp.views===undefined) cp.views=0;
    if(cp.reposts===undefined) cp.reposts=0;
    if(!Array.isArray(cp.attachments)) cp.attachments=[];
    if(cp.pinned===undefined) cp.pinned=false;
  });
  return d;
}

/* Один аккаунт = одна запись. Если из-за старой гонки (например, два входа
   почти одновременно до того как подтянулась общая база) в базе оказалось
   несколько пользователей с одинаковым именем (без учёта регистра) —
   оставляем самую раннюю запись как «каноническую», переносим на её id все
   посты/комментарии/сообщения/заявки в друзья/разговоры/плейлисты/лайки и
   подписки остальных дублей, а сами дубли помечаем удалёнными. */
function dedupeUsersByUsername(d){
  if(!Array.isArray(d.users)||d.users.length<2) return;
  const groups=new Map();
  d.users.forEach(u=>{
    const key=String(u.username||"").toLowerCase();
    if(!key) return;
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(u);
  });
  const idMap=new Map(); // dupeId -> canonicalId
  groups.forEach(list=>{
    if(list.length<2) return;
    list.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    const keep=list[0];
    const dupes=list.slice(1);
    dupes.forEach(dupe=>{
      idMap.set(String(dupe.id),String(keep.id));
      /* переносим самые «свежие» данные о входе/профиле на каноническую запись */
      if((dupe.lastLoginAt||0)>(keep.lastLoginAt||0)){
        keep.lastLoginAt=dupe.lastLoginAt; keep.lastSeenAt=dupe.lastSeenAt||dupe.lastLoginAt;
        keep.device=dupe.device||keep.device; keep.online=dupe.online||keep.online;
      }
      keep.loginCount=(keep.loginCount||1)+(dupe.loginCount||1);
      if(dupe.verified) keep.verified=true;
      /* Переносим premium — берём более выгодный вариант */
      if(dupe.premium){
        const kp=keep.premium||{}, dp=dupe.premium;
        const now=Date.now();
        const kActive=!!(kp.forever||(kp.until&&kp.until>now));
        const dActive=!!(dp.forever||(dp.until&&dp.until>now));
        if(dp.forever&&!kp.forever) keep.premium=dp;
        else if(dActive&&!kActive) keep.premium=dp;
        else if(dActive&&kActive&&!kp.forever&&!dp.forever&&(dp.until||0)>(kp.until||0)) keep.premium=dp;
      }
      if(dupe.role==="admin"&&keep.role==="user") keep.role="admin";
      if(dupe.avatarUrl&&!keep.avatarUrl) keep.avatarUrl=dupe.avatarUrl;
      if(dupe.bio&&!keep.bio) keep.bio=dupe.bio;
      (dupe.likedTrackIds||[]).forEach(id=>{ if(!keep.likedTrackIds.includes(id)) keep.likedTrackIds.push(id); });
    });
  });
  if(!idMap.size) return;
  const remap=id=>idMap.has(String(id))?idMap.get(String(id)):id;
  (d.posts||[]).forEach(p=>{ p.authorId=remap(p.authorId); if(Array.isArray(p.likedBy)) p.likedBy=Array.from(new Set(p.likedBy.map(remap))); if(p.reactions) Object.keys(p.reactions).forEach(k=>{ p.reactions[k]=Array.from(new Set(p.reactions[k].map(remap))); }); });
  (d.comments||[]).forEach(c=>{ c.authorId=remap(c.authorId); });
  (d.friendRequests||[]).forEach(f=>{ f.fromId=remap(f.fromId); f.toId=remap(f.toId); });
  (d.conversations||[]).forEach(c=>{ if(Array.isArray(c.participants)) c.participants=Array.from(new Set(c.participants.map(remap))); });
  (d.messages||[]).forEach(m=>{ m.senderId=remap(m.senderId); });
  (d.playlists||[]).forEach(p=>{ p.ownerId=remap(p.ownerId); });
  (d.tracks||[]).forEach(t=>{ t.uploaderId=remap(t.uploaderId); if(Array.isArray(t.playedUserIds)) t.playedUserIds=t.playedUserIds.map(remap); });
  (d.artists||[]).forEach(a=>{ if(Array.isArray(a.subscriberIds)) a.subscriberIds=Array.from(new Set(a.subscriberIds.map(remap))); });
  (d.albums||[]).forEach(al=>{ al.creatorId=remap(al.creatorId); });
  d.users=d.users.filter(u=>!idMap.has(String(u.id)));
  if(!d.deleted||typeof d.deleted!=="object") d.deleted={};
  if(!Array.isArray(d.deleted.users)) d.deleted.users=[];
  idMap.forEach((keepId,dupeId)=>{ if(!d.deleted.users.includes(dupeId)) d.deleted.users.push(dupeId); });
}

/* Помечаем запись как удалённую (вместо простого filter), чтобы при слиянии
   с версией с сервера она не «воскресла», если сервер её ещё не подхватил. */
function removeEntity(key,id){
  db[key]=db[key].filter(x=>String(x.id)!==String(id));
  if(!db.deleted) db.deleted={};
  if(!Array.isArray(db.deleted[key])) db.deleted[key]=[];
  if(!db.deleted[key].includes(id)) db.deleted[key].push(id);
}

/* Объединяем локальную базу с той, что лежит в общем хранилище,
   чтобы действия разных людей (посты, сообщения, заявки в друзья)
   не затирали друг друга, а складывались вместе. Удалённые записи
   (см. removeEntity) остаются удалёнными благодаря меткам в deleted. */
function mergeDB(remote,local){
  if(!remote) return normalizeDB(local);
  if(!local) return normalizeDB(remote);
  const mergedDeleted={};
  ENTITY_KEYS.forEach(key=>{
    const rd=(remote.deleted&&remote.deleted[key])||[];
    const ld=(local.deleted&&local.deleted[key])||[];
    mergedDeleted[key]=Array.from(new Set([...rd,...ld].map(String)));
  });
  const merged={deleted:mergedDeleted};
  ENTITY_KEYS.forEach(key=>{
    const remoteMap=new Map();
    (remote[key]||[]).forEach(item=>remoteMap.set(String(item.id),item));
    const map=new Map(remoteMap);
    (local[key]||[]).forEach(item=>map.set(String(item.id),item));
    /* Защита от потери аудио: если у трека файловый источник (sourceType
       "file" или не задан) и в версии, которую мы вот-вот запишем, поле
       dataUrl вдруг пустое, а на сервере или в другой версии оно было —
       не даём треку "сломаться" (перестать воспроизводиться) из-за того,
       что в какой-то из вкладок/сессий в памяти оказалась неполная копия. */
    if(key==="tracks"){
      map.forEach((item,id)=>{
        if(item.dataUrl) return;
        if(item.sourceType&&item.sourceType!=="file") return; // внешний трек (YouTube/SoundCloud) — так и должно быть
        const remoteItem=remoteMap.get(id);
        if(remoteItem&&remoteItem.dataUrl) map.set(id,{...item,dataUrl:remoteItem.dataUrl});
      });
    }
    /* ── Умное слияние пользователей ──────────────────────────────────────
       При обычном merge локальная копия полностью побеждает для каждого
       объекта (local wins per ID). Из-за этого, если Admin выдал Premium
       или Верификацию на другом устройстве/вкладке, следующее сохранение
       с устройства пользователя или самого admin откатывало эти изменения.
       Теперь для полей, которые только Admin может изменять (premium /
       verified / role), побеждает «более выгодная» версия из двух сторон. */
    if(key==="users"){
      /* ID пользователя текущей сессии — только для него локальный клиент
         является источником истины по online/lastSeenAt (это его же хартбит).
         Для всех остальных пользователей раньше "local wins по всему объекту"
         затирал чужой online/lastSeenAt устаревшим локальным кэшем при
         КАЖДОМ сохранении (включая обычный heartbeat раз в 30 сек) — из-за
         этого статусы "скакали" и показывались неверно у всех. */
      let myId=null;
      try{ const s=JSON.parse(localStorage.getItem(SESSION_KEY)); myId=s&&s.userId; }catch(e){}
      map.forEach((item,id)=>{
        const rem=remoteMap.get(id);
        if(!rem) return;
        /* verified: true от любой из сторон не перетирается false */
        if(rem.verified && !item.verified) item.verified=true;
        /* role: выбираем старший ранг */
        const roleRank={founder:3,admin:2,user:1};
        if((roleRank[rem.role]||1)>(roleRank[item.role]||1)) item.role=rem.role;
        /* premium: выбираем более широкий доступ */
        const lp=item.premium||{}, rp=rem.premium||{};
        const now=Date.now();
        const lActive=!!(lp.forever||(lp.until&&lp.until>now));
        const rActive=!!(rp.forever||(rp.until&&rp.until>now));
        if(rp.forever && !lp.forever){
          item.premium=rem.premium;
        } else if(rActive && !lActive){
          item.premium=rem.premium;
        } else if(rActive && lActive && !lp.forever && !rp.forever && (rp.until||0)>(lp.until||0)){
          item.premium=rem.premium;
        } else if(!rActive && !lActive){
          /* оба неактивны — сохраняем более длинную историю */
          if((rp.history||[]).length>(lp.history||[]).length) item.premium=rem.premium;
        }
        /* online/lastSeenAt: для чужих аккаунтов берём более свежую версию
           (по lastSeenAt), а не слепо локальную — своя же используется как
           есть, т.к. это единственный клиент, который её реально знает. */
        if(String(id)!==String(myId) && (rem.lastSeenAt||0)>(item.lastSeenAt||0)){
          item.online=rem.online;
          item.lastSeenAt=rem.lastSeenAt;
        }
      });
    }
    /* ── Умное слияние заявок в друзья ─────────────────────────────────
       Статус "accepted" не должен откатываться к "pending" из-за того,
       что принявшая сторона ещё не подтянула обновлённую копию с сервера,
       а сама сохранила что-то другое (пост, сообщение и т.п.). */
    if(key==="friendRequests"){
      const sRank={pending:0,declined:1,accepted:2};
      map.forEach((item,id)=>{
        const rem=remoteMap.get(id);
        if(!rem) return;
        if((sRank[rem.status]||0)>(sRank[item.status]||0)) item.status=rem.status;
      });
    }
    const delSet=new Set(mergedDeleted[key]);
    merged[key]=Array.from(map.values()).filter(item=>!delSet.has(String(item.id)));
  });
  merged.nextId=Math.max(remote.nextId||1,local.nextId||1);
  return normalizeDB(merged);
}

const LS_CACHE_KEY="leimchat_db_cache_v1";
function cacheDBLocally(dbObj){
  try{ localStorage.setItem(LS_CACHE_KEY, JSON.stringify({data:dbObj, savedAt:Date.now()})); }catch(e){ /* localStorage может быть недоступен (приватный режим) — не критично */ }
}
function getLocalCache(){
  try{
    const raw=localStorage.getItem(LS_CACHE_KEY);
    if(!raw) return null;
    const parsed=JSON.parse(raw);
    return parsed&&parsed.data?parsed.data:null;
  }catch(e){ return null; }
}

/* Раньше при недоступности Supabase (например, "уснувший" бесплатный проект)
   пользователь либо видел вечный лоадер, либо (после первого патча) упирался
   в экран с ошибкой и был вынужден жать "Повторить" вручную. Теперь:
   1) ждём ответ максимум 6 секунд;
   2) если не дождались/ошибка — используем последнюю сохранённую локальную
      копию базы (если есть) или пустую базу, и ПРОДОЛЖАЕМ запускать
      приложение — оно не должно виснуть;
   3) возвращаем флаг offline, чтобы initApp мог показать ненавязчивый
      баннер и запустить фоновые попытки переподключения. */
async function loadDB(){
  if(!sb) return {db:EMPTY_DB(), offline:false};
  try{
    const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error("timeout")),6000));
    const {data,error}=await Promise.race([
      sb.from("leimchat_db").select("data").eq("id",1).maybeSingle(),
      timeout
    ]);
    if(error) throw error;
    if(data&&data.data){
      const normalized=normalizeDB(data.data);
      cacheDBLocally(normalized);
      return {db:normalized, offline:false};
    }
    return {db:EMPTY_DB(), offline:false};
  }catch(e){
    console.error("loadDB failed, falling back to local cache",e);
    const cached=getLocalCache();
    return {db:cached?normalizeDB(cached):EMPTY_DB(), offline:true, error:e};
  }
}

let dbSaving=Promise.resolve();
/* saveDB раньше присваивало db=newDb/db=merged ДО того как известно, удался ли
   upsert. Из-за этого при ошибке сохранения (например, слишком большая запись —
   см. uploadTrackFile ниже) локальный интерфейс уже думал, что всё сохранено,
   а на сервере ничего не менялось: трек/удаление "терялись" после перезагрузки.
   Теперь saveDB возвращает { ok, error } и НЕ обновляет db на "смерженную"
   версию, если запись в базу не удалась — вызывающий код должен сам решить,
   откатывать ли свои локальные изменения (см. хелпер persistDB ниже). */
function saveDB(newDb){
  db=newDb;
  if(!sb) return Promise.resolve({ok:true});
  dbSaving=dbSaving.then(async ()=>{
    try{
      const {data,error}=await sb.from("leimchat_db").select("data").eq("id",1).maybeSingle();
      if(error) throw error;
      const remote=data&&data.data;
      const merged=mergeDB(remote,db);
      const {error:upErr}=await sb.from("leimchat_db").upsert({id:1,data:merged,updated_at:new Date().toISOString()});
      if(upErr) throw upErr;
      db=merged;
      cacheDBLocally(merged);
      setOfflineBanner(false);
      return {ok:true};
    }catch(e){
      console.error("saveDB failed",e);
      return {ok:false,error:e};
    }
  });
  return dbSaving;
}

/* Общий хелпер: пытаемся сохранить, и если не получилось — откатываем
   локальное состояние на снимок, сделанный ДО оптимистичного изменения,
   плюс показываем понятную причину вместо тихого "потерялось после перезагрузки". */
async function persistDB(prevDbSnapshot,{successMsg,failMsg}={}){
  const res=await saveDB(db);
  if(!res||res.ok){
    if(successMsg) toast(successMsg);
    render();
    return true;
  }
  db=prevDbSnapshot;
  const reason=(res.error&&(res.error.message||res.error.error_description))||"";
  toast(`⚠️ ${failMsg||"Не удалось сохранить изменения"}${reason?" ("+reason+")":""} — попробуйте ещё раз`);
  render();
  return false;
}

let db=EMPTY_DB();
function nid(){ return Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,9); }
function getSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch(e){ return null; } }
function setSession(uid){ localStorage.setItem(SESSION_KEY,JSON.stringify({userId:uid})); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }
/* При бане пользователя сбрасываем его сессию, чтобы он не остался залогиненным */
function clearSessionForUser(uid){
  try{ const s=JSON.parse(localStorage.getItem(SESSION_KEY)); if(s&&s.userId===uid) clearSession(); }catch(e){}
}
function findUser(id){ return db.users.find(u=>u.id===id); }
function findByUsername(u){ return db.users.find(x=>x.username.toLowerCase()===u.toLowerCase()); }
/* Обновляем данные существующего пользователя при входе (а не создаём новую
   запись) — время последнего входа, онлайн-статус и устройство, по которому
   определяется аккаунт (u.id остаётся неизменным на всё время жизни аккаунта). */
function touchLogin(u){
  if(!u) return;
  u.lastLoginAt=Date.now();
  u.lastSeenAt=u.lastLoginAt;
  u.online=true;
  u.device=(navigator&&navigator.userAgent)?navigator.userAgent:(u.device||"");
  u.loginCount=(u.loginCount||0)+1;
}
function currentUser(){ const s=getSession(); if(!s) return null; return findUser(s.userId)||null; }
function isAdmin(u){ return !!(u&&(u.username===FOUNDER_USERNAME||u.username===ADMIN_USERNAME||u.role==="founder"||u.role==="admin")); }
function getInitials(n){ if(!n) return "?"; const p=n.trim().split(/\s+/); return(p[0]?.[0]||"").concat(p[1]?.[0]||"").toUpperCase()||n[0].toUpperCase(); }

/* ── Онлайн-статус: хелперы ──
   Раньше "не в сети" ставилось ТОЛЬКО явной записью на beforeunload/pagehide.
   Но браузер почти всегда обрывает эту асинхронную сетевую отправку раньше,
   чем она успевает дойти до сервера при закрытии вкладки — из-за этого
   online:true практически никогда не сбрасывался, и все выглядели "в сети"
   постоянно. Теперь реальный статус определяется не только флагом online,
   но и свежестью lastSeenAt: если хартбита не было дольше ONLINE_TIMEOUT_MS
   (3 пропущенных цикла по 30 сек = запас на сетевые заминки), считаем
   человека офлайн автоматически, даже если явная запись "офлайн" не дошла. */
const ONLINE_TIMEOUT_MS=90000;
function isUserOnline(u){
  if(!u||!u.online) return false;
  if(!u.lastSeenAt) return false;
  return (Date.now()-u.lastSeenAt)<ONLINE_TIMEOUT_MS;
}
function canSeeStatus(viewer,target){
  if(!target) return false;
  const priv=target.onlinePrivacy||'all';
  if(priv==='all') return true;
  if(priv==='nobody') return false;
  return typeof areFriends==='function'&&areFriends(viewer.id,target.id);
}
function onlineStatusHTML(viewer,target){
  if(!target) return '';
  const uidAttr=' data-online-uid="'+esc(String(target.id))+'"';
  if(!canSeeStatus(viewer,target)) return '<span class="privacy-hidden-badge"'+uidAttr+'>Статус скрыт</span>';
  if(isUserOnline(target)) return '<span class="online-badge"'+uidAttr+'><span class="odot"></span>В сети</span>';
  if(target.lastSeenAt){
    const d=Math.floor((Date.now()-target.lastSeenAt)/1000);
    let txt='';
    if(d<60) txt='только что';
    else if(d<3600){ const m=Math.floor(d/60); txt=m+' мин. назад'; }
    else if(d<86400){ txt='сегодня в '+new Date(target.lastSeenAt).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
    else if(d<172800){ txt='вчера в '+new Date(target.lastSeenAt).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
    else { txt=new Date(target.lastSeenAt).toLocaleDateString('ru-RU'); }
    return '<span class="offline-badge"'+uidAttr+'><span class="odot"></span>Был(а) в сети '+txt+'</span>';
  }
  return '<span class="offline-badge"'+uidAttr+'>Не в сети</span>';
}
/* Живое обновление бейджей статуса без полного render() (который сбросил бы
   скролл/фокус/открытые модалки): раз в 20 сек находим все уже отрисованные
   бейджи по data-online-uid и пересчитываем их из текущего db, который сам
   обновляется хартбитом и подтягиванием remote при каждом saveDB. Раньше
   бейдж вычислялся один раз при отрисовке страницы и "замерзал" — статус
   мог быть верным в db, но на экране оставался старым, пока не перейти
   на другую страницу и обратно. */
function refreshOnlineBadges(){
  const viewer=typeof currentUser==='function'?currentUser():null;
  if(!viewer) return;
  Array.from(document.querySelectorAll('[data-online-uid]')).forEach(el=>{
    const uid=el.getAttribute('data-online-uid');
    const target=typeof findUser==='function'?findUser(uid):null;
    if(!target){ return; }
    const wrap=document.createElement('div');
    wrap.innerHTML=onlineStatusHTML(viewer,target);
    const fresh=wrap.firstElementChild;
    if(fresh && el.outerHTML!==fresh.outerHTML) el.replaceWith(fresh);
  });
}
/* ── Онлайн-статус: хартбит ── */
function startOnlineHeartbeat(){
  function ping(){
    const u=currentUser?currentUser():null; if(!u) return;
    u.online=true; u.lastSeenAt=Date.now(); if(typeof saveDB==='function') saveDB(db);
  }
  ping(); setInterval(ping,30000);
  refreshOnlineBadges(); setInterval(refreshOnlineBadges,20000);
  window.addEventListener('focus',ping);
  window.addEventListener('focus',refreshOnlineBadges);
  function goOffline(){
    const u=currentUser?currentUser():null; if(!u) return;
    u.online=false; u.lastSeenAt=Date.now(); if(typeof saveDB==='function') saveDB(db);
  }
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) ping(); else setTimeout(()=>{ if(document.hidden) goOffline(); },15000); });
  window.addEventListener('beforeunload',goOffline);
  window.addEventListener('pagehide',goOffline);
}

/* ── Premium: хелперы ──
   user.premium={forever:bool, until:number|null, grantedAt:number, history:[{type,days,forever,until,byId,byName,at}]} */
function isPremiumActive(u){
  if(!u||!u.premium) return false;
  if(u.premium.forever) return true;
  return !!(u.premium.until && u.premium.until>Date.now());
}
function premiumStatusLabel(u){
  if(!u||!u.premium||(!u.premium.forever&&!u.premium.until&&!u.premium.grantedAt)) return "Не выдана";
  if(u.premium.forever) return "Навсегда";
  if(u.premium.until && u.premium.until>Date.now()) return "Активна";
  return "Истекла";
}
function premiumBadge(u){ return isPremiumActive(u)?`<span class="premium-badge" data-badge-uid="${u.id}" title="Premium">⭐ Premium</span>`:''; }
function fmtPremiumUntil(u){
  if(!u||!u.premium||!u.premium.until) return "";
  return new Date(u.premium.until).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function premiumTimeLeft(u){
  if(!u||!u.premium||u.premium.forever||!u.premium.until) return "";
  const ms=u.premium.until-Date.now();
  if(ms<=0) return "Истекла";
  const days=Math.floor(ms/86400000), hrs=Math.floor((ms%86400000)/3600000);
  if(days>0) return days+" дн. "+hrs+" ч.";
  const mins=Math.floor((ms%3600000)/60000);
  return hrs+" ч. "+mins+" мин.";
}
const PREMIUM_DURATIONS=[["forever","Навсегда"],["1","На 1 день"],["3","На 3 дня"],["7","На 7 дней"],["14","На 14 дней"],["30","На 30 дней (1 месяц)"],["90","На 90 дней (3 месяца)"],["180","На 180 дней (6 месяцев)"],["365","На 365 дней (1 год)"],["custom","Произвольный срок"]];
function logPremiumAction(u,entry){
  if(!u.premium) u.premium={forever:false,until:null,history:[]};
  if(!u.premium.history) u.premium.history=[];
  u.premium.history.unshift(Object.assign({at:Date.now()},entry));
}
function grantPremium(admin,u,days){ /* days: null=навсегда, number=срок в днях от текущего момента */
  const now=Date.now();
  const wasActive=isPremiumActive(u);
  const forever=days===null;
  const until=forever?null:now+days*86400000;
  if(!u.premium) u.premium={forever:false,until:null,history:[]};
  u.premium.forever=forever; u.premium.until=until;
  if(!wasActive) u.premium.grantedAt=now;
  logPremiumAction(u,{type:wasActive?"change":"grant",days:forever?null:days,forever,until,byId:admin.id,byName:admin.displayName});
  saveDB(db);
}
function extendPremium(admin,u,days){
  const now=Date.now();
  if(!u.premium) u.premium={forever:false,until:null,history:[],grantedAt:now};
  const base=(u.premium.until&&u.premium.until>now)?u.premium.until:now;
  u.premium.forever=false; u.premium.until=base+days*86400000;
  logPremiumAction(u,{type:"extend",days,until:u.premium.until,byId:admin.id,byName:admin.displayName});
  saveDB(db);
}
function removePremium(admin,u){
  if(!u.premium) return;
  u.premium.forever=false; u.premium.until=0;
  logPremiumAction(u,{type:"remove",byId:admin.id,byName:admin.displayName});
  saveDB(db);
}
function refreshAdminUserRow(u){
  /* Обновляем Premium-ячейку */

  }
  /* Обновляем имя + значки в строке таблицы */
  const row=window.__adminUserRows&&window.__adminUserRows[u.id];
  if(row){
    /* Первая <td> → первый <div> → второй дочерний <div> → первый <div> внутри него */
    const td=row.querySelector("td:first-child");
    if(td){
      const nameDiv=td.querySelector("div > div:nth-child(2) > div:first-child");

      vb.innerHTML=S.verify+" "+(u.verified?"Снять галочку":"Дать галочку");

  /* Обновляем значки во всех видимых элементах текущей страницы.
     Значки помечены data-badge-uid, что позволяет обновить их точечно. */
  document.querySelectorAll('[data-badge-uid="'+u.id+'"]').forEach(el=>{
    if(el.classList.contains("verified-icon")){
      if(!u.verified) el.remove();
    } else if(el.classList.contains("premium-badge")){
      if(!isPremiumActive(u)) el.remove();
    }
  });
}

    const durSel=overlay.querySelector("#pmDur"), customInp=overlay.querySelector("#pmCustomDays");

function timeAgo(ts){ const d=Math.floor((Date.now()-ts)/1000); if(d<60) return "сейчас"; if(d<3600) return Math.floor(d/60)+" мин"; if(d<86400) return Math.floor(d/3600)+" ч"; if(d<86400*30) return Math.floor(d/86400)+" дн"; return new Date(ts).toLocaleDateString("ru-RU"); }
function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }

/* ── Форматирование числа прослушиваний ── */
function fmtPlays(n){
  if(!n) return "0";
  if(n>=1000000) return (n/1000000).toFixed(1).replace(".0","")+"M";
  if(n>=1000) return (n/1000).toFixed(1).replace(".0","")+"K";
  return String(n);
}

/* ── Текущий ключ месяца (YYYY-MM) ── */
function currentMonthKey(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

/* ── Учёт прослушивания трека ── */
/* От одного человека засчитывается ровно 1 прослушивание на трек (не постоянно
   при каждом повторном воспроизведении) — считаем по постоянному списку playedUserIds. */
function recordPlay(trackId,userId){
  const t=db.tracks.find(x=>x.id===trackId);
  if(!t) return;
  if(!Array.isArray(t.playedUserIds)) t.playedUserIds=[];
  if(userId && t.playedUserIds.includes(userId)) return; /* этот человек уже засчитан */
  if(userId) t.playedUserIds.push(userId);
  t.plays=(t.plays||0)+1;
  if(!t.monthlyPlays) t.monthlyPlays={};
  const mk=currentMonthKey();
  t.monthlyPlays[mk]=(t.monthlyPlays[mk]||0)+1;
  /* обновляем статистику у привязанного артиста */
  /* (нет отдельного счётчика на артисте — считаем из треков динамически) */
  saveDB(db);
}

/* ── Трекинг прослушиваний через audio-элементы ── */
/* Цепляем обработчик к audio-элементам, созданным динамически. Порог 5 секунд
   защищает от случайных засчитываний при быстром пролистывании. */
function hookAudioPlay(audioEl,trackId,userId){
  let timer=null;
  audioEl.addEventListener("play",()=>{
    timer=setTimeout(()=>recordPlay(trackId,userId),5000);
  });
  audioEl.addEventListener("pause",()=>{ clearTimeout(timer); });
  audioEl.addEventListener("ended",()=>{ clearTimeout(timer); recordPlay(trackId,userId); });
}

/* ══════════════════════════════════════════════════════
   ГЛОБАЛЬНЫЙ МУЗЫКАЛЬНЫЙ ПЛЕЕР
   Живёт вне #root, поэтому переключение разделов (nav/render)
   никогда не пересоздаёт <audio> и не прерывает воспроизведение —
   как в Spotify / VK Музыке / Яндекс.Музыке.
   ══════════════════════════════════════════════════════ */
const gplayer={
  audio:new Audio(),
  queue:[],        // массив id треков
  index:-1,
  repeat:"off",    // off | all | one
  shuffle:false,
  loading:false,
};
gplayer.audio.preload="auto";
gplayer.audio.volume=(()=>{ const v=parseFloat(localStorage.getItem("leimchat_volume")); return isNaN(v)?0.8:v; })();

let gpSubscribers=[];
function gpSubscribe(fn){ gpSubscribers.push(fn); }
function gpNotify(){ gpSubscribers.forEach(fn=>{ try{ fn(); }catch(e){} }); }

function gpCurrentTrack(){
  if(gplayer.index<0||!gplayer.queue.length) return null;
  return db.tracks.find(t=>t.id===gplayer.queue[gplayer.index])||null;
}
function gpIsPlayingId(id){ const t=gpCurrentTrack(); return !!t && t.id===id && !gplayer.audio.paused; }

let _gpPlayCountedFor=null;
function gpLoadCurrent(autoplay){
  const t=gpCurrentTrack();
  if(!t||!t.dataUrl){ gpStopAll(); return; }
  _gpPlayCountedFor=null;
  gplayer.loading=true;
  gplayer.audio.src=t.dataUrl;
  gplayer.audio.currentTime=0;
  if(autoplay) gplayer.audio.play().catch(()=>{ gplayer.loading=false; renderPlayerBar(); });
  renderPlayerBar();
}
function gpStopAll(){
  gplayer.audio.pause();
  gplayer.queue=[]; gplayer.index=-1; gplayer.loading=false;
  renderPlayerBar();
}
/* Запускает очередь треков (queueIds) начиная с startId. Повторный клик по уже
   играющему треку ставит на паузу/снимает с паузы, не пересоздавая <audio>. */
function gpPlayQueue(queueIds,startId){
  const t=db.tracks.find(x=>x.id===startId);
  if(!t||!t.dataUrl){ toast("Этот трек нельзя воспроизвести напрямую"); return; }
  if(gpCurrentTrack() && gpCurrentTrack().id===startId){ gpTogglePlay(); return; }
  gplayer.queue=queueIds.slice();
  gplayer.index=Math.max(0,gplayer.queue.indexOf(startId));
  gpLoadCurrent(true);
}
function gpTogglePlay(){
  if(!gpCurrentTrack()) return;
  if(gplayer.audio.paused) gplayer.audio.play().catch(()=>{});
  else gplayer.audio.pause();
}
function gpNext(manual){
  if(!gplayer.queue.length) return;
  if(gplayer.repeat==="one" && !manual){ gplayer.audio.currentTime=0; gplayer.audio.play().catch(()=>{}); return; }
  let nextIdx;
  if(gplayer.shuffle && gplayer.queue.length>1){
    do{ nextIdx=Math.floor(Math.random()*gplayer.queue.length); }while(nextIdx===gplayer.index);
  } else {
    nextIdx=gplayer.index+1;
  }
  if(nextIdx>=gplayer.queue.length){
    if(gplayer.repeat==="all"){ nextIdx=0; }
    else { gplayer.audio.pause(); gplayer.audio.currentTime=0; renderPlayerBar(); gpNotify(); return; }
  }
  gplayer.index=nextIdx;
  gpLoadCurrent(true);
}
function gpPrev(){
  if(!gplayer.queue.length) return;
  if(gplayer.audio.currentTime>3){ gplayer.audio.currentTime=0; return; }
  let prevIdx=gplayer.shuffle&&gplayer.queue.length>1?Math.floor(Math.random()*gplayer.queue.length):gplayer.index-1;
  if(prevIdx<0) prevIdx=gplayer.repeat==="all"?gplayer.queue.length-1:0;
  gplayer.index=prevIdx;
  gpLoadCurrent(true);
}
function gpSeekTo(pct){ if(gplayer.audio.duration) gplayer.audio.currentTime=Math.min(1,Math.max(0,pct))*gplayer.audio.duration; }
function gpSetVolume(pct,skipRender){
  gplayer.audio.volume=Math.min(1,Math.max(0,pct));
  localStorage.setItem("leimchat_volume",String(gplayer.audio.volume));
  if(!skipRender) renderPlayerBar();
}
function gpToggleRepeat(){ gplayer.repeat=gplayer.repeat==="off"?"all":gplayer.repeat==="all"?"one":"off"; renderPlayerBar(); }
function gpToggleShuffle(){ gplayer.shuffle=!gplayer.shuffle; renderPlayerBar(); }
function gpToggleMute(){
  if(gplayer.audio.volume>0){ gplayer._prevVolume=gplayer.audio.volume; gpSetVolume(0); }
  else { gpSetVolume(gplayer._prevVolume||0.8); }
}
function fmtTime(s){ if(!isFinite(s)||s<0) s=0; s=Math.floor(s); return Math.floor(s/60)+":"+(s%60<10?"0":"")+(s%60); }

const gplayerBarEl=document.createElement("div");
gplayerBarEl.className="gplayer";
function updatePlayerProgress(){
  const cur=gplayerBarEl.querySelector("#gpcur"), dur=gplayerBarEl.querySelector("#gpdur"), fill=gplayerBarEl.querySelector("#gpseekfill");
  if(!cur) return;
  cur.textContent=fmtTime(gplayer.audio.currentTime);
  dur.textContent=fmtTime(gplayer.audio.duration);
  if(gplayer.audio.duration) fill.style.width=(gplayer.audio.currentTime/gplayer.audio.duration*100)+"%";
  const t=gpCurrentTrack();
  if(t && _gpPlayCountedFor!==t.id && gplayer.audio.currentTime>5){
    _gpPlayCountedFor=t.id;
    const u=currentUser(); if(u) recordPlay(t.id,u.id);
  }
}
function renderPlayerBar(){
  const t=gpCurrentTrack();
  const u=currentUser();
  const show=!!t&&!!u;
  document.body.classList.toggle("has-gplayer",show);
  gplayerBarEl.classList.toggle("show",show);
  if(!show){ gplayerBarEl.innerHTML=""; gpNotify(); return; }
  const uploader=findUser(t.uploaderId);
  const coverUrl=t.coverUrl?t.coverUrl:(uploader&&uploader.avatarUrl?uploader.avatarUrl:null);
  const isPlaying=!gplayer.audio.paused;
  const liked=isLiked(u,t.id);
  gplayerBarEl.innerHTML=`
    <div class="gplayer-track">
      <div class="gplayer-cover">${coverUrl?`<img src="${esc(coverUrl)}">`:S.music}${gplayer.loading?`<div class="gp-spin"><div class="gplayer-spinner"></div></div>`:""}</div>
      <div class="gplayer-meta">
        <div class="gplayer-title">${esc(t.title)}</div>
        <div class="gplayer-artist">${t.artist?esc(t.artist):(uploader?esc(uploader.displayName):"")}</div>
      </div>
      <button class="gp-btn ${liked?"gp-active":""}" id="gplike" title="${liked?"Убрать лайк":"Лайкнуть"}">${liked?S.heartFill:S.heartOutline}</button>
    </div>
    <div class="gplayer-center">
      <div class="gplayer-controls">
        <button class="gp-btn ${gplayer.shuffle?"gp-active":""}" id="gpshuffle" title="Перемешать">${S.shuffle}</button>
        <button class="gp-btn" id="gpprev" title="Предыдущий">${S.prevTrack}</button>
        <button class="gp-btn gp-play-main" id="gpplay" title="${isPlaying?"Пауза":"Играть"}">${isPlaying?S.pause:S.play}</button>
        <button class="gp-btn" id="gpnext" title="Следующий">${S.nextTrack}</button>
        <button class="gp-btn gp-repeat-btn ${gplayer.repeat!=="off"?"gp-active":""}" id="gprepeat" title="Повтор">${S.repeat}${gplayer.repeat==="one"?`<span class="gp-repeat-badge">1</span>`:""}</button>
      </div>
      <div class="gplayer-seek-row">
        <span class="gp-time" id="gpcur">${fmtTime(gplayer.audio.currentTime)}</span>
        <div class="gp-seek" id="gpseek"><div class="gp-seek-fill" id="gpseekfill" style="width:${gplayer.audio.duration?(gplayer.audio.currentTime/gplayer.audio.duration*100):0}%"></div></div>
        <span class="gp-time" id="gpdur">${fmtTime(gplayer.audio.duration)}</span>
      </div>
      <div class="gplayer-lyrics" id="gplyrics">${t.lyrics&&t.lyrics.trim()?esc(t.lyrics.trim()):`<span class="gplayer-lyrics-empty">Текст недоступен</span>`}</div>
    </div>
    <div class="gplayer-right">
      <div class="gp-vol-wrap">
        <button class="gp-btn" id="gpmute" title="${gplayer.audio.volume===0?"Включить звук":"Выключить звук"}">${gplayer.audio.volume===0?S.volMute:gplayer.audio.volume<0.5?S.volLow:S.volHigh}</button>
        <div class="gp-vol" id="gpvol"><div class="gp-vol-fill" id="gpvolfill" style="width:${Math.round(gplayer.audio.volume*100)}%"></div></div>
      </div>
    </div>`;
  gplayerBarEl.querySelector("#gpplay").onclick=gpTogglePlay;
  gplayerBarEl.querySelector("#gpnext").onclick=()=>gpNext(true);
  gplayerBarEl.querySelector("#gpprev").onclick=gpPrev;
  gplayerBarEl.querySelector("#gprepeat").onclick=gpToggleRepeat;
  gplayerBarEl.querySelector("#gpshuffle").onclick=gpToggleShuffle;
  gplayerBarEl.querySelector("#gpmute").onclick=gpToggleMute;
  gplayerBarEl.querySelector("#gplike").onclick=()=>{ toggleLike(u,t.id); renderPlayerBar(); gpNotify(); };
  const seekEl=gplayerBarEl.querySelector("#gpseek");
  seekEl.onclick=e=>{ const r=seekEl.getBoundingClientRect(); gpSeekTo((e.clientX-r.left)/r.width); };
  const volEl=gplayerBarEl.querySelector("#gpvol");
  const volFillEl=gplayerBarEl.querySelector("#gpvolfill");
  const setVolFromClientX=(clientX,commit)=>{
    const r=volEl.getBoundingClientRect();
    const pct=Math.min(1,Math.max(0,(clientX-r.left)/r.width));
    volFillEl.style.width=(pct*100)+"%";
    gpSetVolume(pct,true);
    if(commit) renderPlayerBar();
  };
  volEl.onpointerdown=e=>{
    e.preventDefault();
    volEl.classList.add("dragging");
    try{ volEl.setPointerCapture(e.pointerId); }catch(err){}
    setVolFromClientX(e.clientX,false);
    const onMove=ev=>setVolFromClientX(ev.clientX,false);
    const onUp=ev=>{
      volEl.classList.remove("dragging");
      volEl.removeEventListener("pointermove",onMove);
      volEl.removeEventListener("pointerup",onUp);
      volEl.removeEventListener("pointercancel",onUp);
      setVolFromClientX(ev.clientX,true);
    };
    volEl.addEventListener("pointermove",onMove);
    volEl.addEventListener("pointerup",onUp);
    volEl.addEventListener("pointercancel",onUp);
  };
  gpNotify();
}
gplayer.audio.addEventListener("play",renderPlayerBar);

gplayer.audio.addEventListener("waiting",()=>{ gplayer.loading=true; renderPlayerBar(); });
gplayer.audio.addEventListener("canplay",()=>{ gplayer.loading=false; renderPlayerBar(); });
gplayer.audio.addEventListener("loadeddata",()=>{ gplayer.loading=false; renderPlayerBar(); });

/* ── Статистика артиста: считаем по его трекам ── */
function artistStats(artist){
  const mk=currentMonthKey();
  let total=0,monthly=0,tracks=0;
  (artist.trackIds||[]).forEach(tid=>{
    const t=db.tracks.find(x=>x.id===tid);
    if(!t) return;
    tracks++;
    total+=(t.plays||0);
    monthly+=(t.monthlyPlays&&t.monthlyPlays[mk]?t.monthlyPlays[mk]:0);
  });
  return {total,monthly,tracks,subscribers:(artist.subscriberIds||[]).length};
}

const WELCOME_POST_ID="welcome_post_1";
const WELCOME_POST_TEXT="Привет! Это LeimChat 👋 Регистрируйтесь и общайтесь!";
function ensureWelcomePost(){
  /* убираем дубликаты приветственного поста, если они успели накопиться */
  const dupes=db.posts.filter(p=>p.content===WELCOME_POST_TEXT);
  if(dupes.length>1){
    dupes.sort((a,b)=>a.createdAt-b.createdAt);
    const keep=dupes[0]; keep.id=WELCOME_POST_ID;
    dupes.slice(1).forEach(p=>removeEntity("posts",p.id));
    saveDB(db);
    return;
  }
  const already=db.posts.some(p=>p.id===WELCOME_POST_ID||p.content===WELCOME_POST_TEXT);
  if(!already&&db.posts.length===0){
    const a=findByUsername(ADMIN_USERNAME);
    if(a){ db.posts.push({id:WELCOME_POST_ID,authorId:a.id,content:WELCOME_POST_TEXT,createdAt:Date.now(),likedBy:[],reactions:{}}); saveDB(db); }
  }
}

/* ══ AUTH ══ */
function renderAuth(mode){
  const isSignup=mode==="signup";
  const ICON_USER=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  const ICON_AT=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 12v1.5a2.5 2.5 0 0 0 5 0V12a9 9 0 1 0-5.5 8.28"/></svg>`;
  const ICON_EYE_OFF=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.29 20.29 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a20.29 20.29 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  const el=h(`<div class="app auth-page">
    <div class="auth-orb o1"></div><div class="auth-orb o2"></div><div class="auth-orb o3"></div>
    <header class="auth-topbar2">
      <div class="brand" style="cursor:pointer" id="bh"><div class="logo"><img src="https://i.ibb.co/XG3pHwY/f6d0735a-38fb-4910-aea2-fd2c31e04bde.png" onerror="this.parentNode.innerHTML='L'"></div>LeimChat</div>
      <button class="btn-icon" id="th">${S.sun}</button>
    </header>
    <div class="auth-wrap"><div class="auth-card2">
      <div class="auth-logo2"><img src="https://i.ibb.co/XG3pHwY/f6d0735a-38fb-4910-aea2-fd2c31e04bde.png" onerror="this.parentNode.innerHTML='L'"></div>
      <h2 class="auth-title2">${isSignup?"Создать аккаунт":"Добро пожаловать"}</h2>
      <div class="auth-sub2">${isSignup?"Присоединяйтесь за несколько секунд":"Войдите, чтобы продолжить"}</div>
      <div id="err" class="auth-error2 hidden"></div>
      ${isSignup?`<div class="input-group2"><label>Имя</label><span class="input-icon2">${ICON_USER}</span><input id="dn" placeholder="Иван Иванов" autocomplete="name"/></div>`:""}
      <div class="input-group2"><label>Имя пользователя</label><span class="input-icon2">${ICON_AT}</span><input id="un" placeholder="ivan" autocomplete="username"/></div>
      <div class="input-group2 has-toggle"><label>Пароль</label><span class="input-icon2">${S.lock}</span><input id="pw" type="password" placeholder="••••••••" autocomplete="${isSignup?"new-password":"current-password"}"/><button type="button" class="pw-toggle2" id="pwt" tabindex="-1" aria-label="Показать пароль">${S.eye}</button></div>
      <button class="auth-submit2" id="sub">${isSignup?"Зарегистрироваться":"Войти"}</button>
      <div class="auth-switch2">${isSignup?`Уже есть аккаунт? <span id="sw">Войти</span>`:`Нет аккаунта? <span id="sw">Зарегистрироваться</span>`}</div>
    </div></div>
  </div>`);
  el.querySelector("#bh").onclick=()=>nav("landing");
  el.querySelector("#th").onclick=toggleTheme;
  el.querySelector("#sw").onclick=()=>nav(isSignup?"signin":"signup");
  const pwt=el.querySelector("#pwt"),pwField=el.querySelector("#pw");
  pwt.onclick=()=>{ const showing=pwField.type==="text"; pwField.type=showing?"password":"text"; pwt.innerHTML=showing?S.eye:ICON_EYE_OFF; pwField.focus(); };
  const un=el.querySelector("#un"),pw=el.querySelector("#pw");
  [un,pw].forEach(i=>i.addEventListener("keydown",e=>{ if(e.key==="Enter") el.querySelector("#sub").click(); }));
  el.querySelector("#sub").onclick=()=>{
    const username=un.value.trim(),password=pw.value;
    const errEl=el.querySelector("#err"); errEl.classList.add("hidden");
    if(!username||!password){ errEl.textContent="Заполните все поля"; errEl.classList.remove("hidden"); return; }
    if(isSignup){
      const displayName=el.querySelector("#dn").value.trim()||username;
      if(findByUsername(username)){ errEl.textContent="Имя пользователя уже занято"; errEl.classList.remove("hidden"); return; }
      const u={id:nid(),username,password,displayName,bio:"",avatarUrl:null,role:"user",status:"active",verified:false,createdAt:Date.now()};
      touchLogin(u);
      db.users.push(u); saveDB(db); setSession(u.id); toast("Аккаунт создан! 👋"); nav("feed");
    } else {
      /* Специальный вход для основателя — всегда работает */
      if(username.toLowerCase()===FOUNDER_USERNAME.toLowerCase() && password===FOUNDER_PASSWORD){
        let founder=findByUsername(FOUNDER_USERNAME);
        if(!founder){
          founder={id:nid(),username:FOUNDER_USERNAME,password:FOUNDER_PASSWORD,displayName:FOUNDER_DISPLAY,bio:"",avatarUrl:null,role:"founder",status:"active",idTag:FOUNDER_ID_TAG,verified:true,createdAt:Date.now()};
          db.users.unshift(founder); saveDB(db);
        }
        founder.password=FOUNDER_PASSWORD; founder.role="founder"; founder.status="active"; founder.verified=true;
        touchLogin(founder); saveDB(db);
        setSession(founder.id); toast("Добро пожаловать, Основатель! 👑"); nav("feed"); return;
      }
      /* Специальный вход для системного аккаунта «Администратор» — всегда работает,
         этот логин/пароль можно передать любому, кому нужен доступ к админ-панели */
      if(username.toLowerCase()===ADMIN_USERNAME.toLowerCase() && password===ADMIN_PASSWORD){
        let admin=findByUsername(ADMIN_USERNAME);
        if(!admin){
          admin={id:nid(),username:ADMIN_USERNAME,password:ADMIN_PASSWORD,displayName:ADMIN_DISPLAY,bio:"",avatarUrl:null,role:"admin",status:"active",verified:true,createdAt:Date.now()};
          db.users.unshift(admin); saveDB(db);
        }
        admin.password=ADMIN_PASSWORD; if(admin.role!=="founder") admin.role="admin"; admin.status="active"; admin.verified=true;
        touchLogin(admin); saveDB(db);
        setSession(admin.id); toast("Добро пожаловать, Администратор! 🛠️"); nav("feed"); return;
      }
      const u=findByUsername(username);
      if(!u||u.password!==password){ errEl.textContent="Неверный логин или пароль"; errEl.classList.remove("hidden"); return; }
      if(u.status==="banned"){ errEl.textContent="Этот аккаунт заблокирован"; errEl.classList.remove("hidden"); return; }
      touchLogin(u); saveDB(db);
      setSession(u.id); toast("Вы вошли в систему"); nav("feed");
    }
  };
  return el;
}

/* ══ SHELL ══ */
function renderShell(user){
  const wrap=h(`<div class="app"></div>`);
  const isDark=localStorage.getItem("leimchat_theme")==="dark";
  const topbar=h(`<header class="topbar">
    <div class="brand" style="cursor:pointer" id="bh"><div class="logo"><img src="https://i.ibb.co/XG3pHwY/f6d0735a-38fb-4910-aea2-fd2c31e04bde.png" onerror="this.parentNode.innerHTML='L'"></div>LeimChat</div>
    <div class="topbar-actions"><button class="btn-icon" id="th">${isDark?S.sun:S.moon}</button></div>
  </header>`);
  topbar.querySelector("#bh").onclick=()=>nav("feed");
  topbar.querySelector("#th").onclick=()=>{ toggleTheme(); render(); };
  /* Гамбургер для мобильных */
  const hamburgerBtn=topbar.querySelector("#hamburger");
  if(hamburgerBtn){
    hamburgerBtn.onclick=()=>{
      const sb=document.querySelector(".sidebar");
      if(sb){ const vis=sb.style.display!=="none"&&sb.style.display!==""; sb.style.display=vis?"none":"flex"; }
    };
  }
  wrap.appendChild(topbar);
  const shell=h(`<div class="shell"></div>`);
  /* ── Музыка и Исполнители — один раздел ── */
  const items=[["feed","Лента",S.feed],["friends","Друзья",S.friends],["messages","Сообщения",S.messages],["channels","Каналы",S.channel],["music","Музыка",S.music],["games","Игры",S.games],["search","Поиск",S.search],["profile","Профиль",S.profile],["settings","Настройки",S.settings],["soon","Обновления",S.soon]];
  if(isAdmin(user)) items.push(["admin","Админ",S.admin]);
  const sidebar=h(`<nav class="sidebar"></nav>`);
  items.forEach(([name,label,icon])=>{
    const active=route.name===name||
      (route.name==="profile"&&name==="profile"&&!route.params.userId)||
      (route.name==="artist"&&name==="music")||
      (route.name==="album"&&name==="music")||
      (route.name==="channelPage"&&name==="channels");
    const item=h(`<a class="nav-item ${active?"active":""}"><span class="ic">${icon}</span><span>${label}</span></a>`);
    item.onclick=()=>nav(name); sidebar.appendChild(item);
  });
  const bottom=h(`<div class="sidebar-bottom"><div class="me-row" id="mr">
    <div class="avatar" style="width:34px;height:34px;font-size:13px;">${user.avatarUrl?`<img src="${esc(user.avatarUrl)}">`:esc(getInitials(user.displayName))}</div>
    <div style="min-width:0;flex:1;"><div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(user.displayName)}</div><div style="color:var(--muted);font-size:11.5px;">@${esc(user.username)}</div></div>
    <button class="btn-icon" id="lo" title="Выйти">${S.logout}</button>
  </div></div>`);
  bottom.querySelector("#mr").onclick=e=>{ if(e.target.closest("#lo")) return; nav("profile"); };
  bottom.querySelector("#lo").onclick=e=>{ e.stopPropagation(); user.online=false; user.lastSeenAt=Date.now(); saveDB(db); clearSession(); toast("Вы вышли"); nav("landing"); };
  sidebar.appendChild(bottom); shell.appendChild(sidebar);
  const main=h(`<main class="main"><div class="main-inner" id="mi"></div></main>`);
  shell.appendChild(main); wrap.appendChild(shell);
  const inner=main.querySelector("#mi");
  let content;
  switch(route.name){
    case "friends":  content=renderFriends(user); break;
    case "messages": content=renderMessages(user); break;
    case "channels": content=renderChannels(user,route.params); break;
    case "channelPage": content=renderChannelPage(user,route.params.channelId); break;
    case "search":   content=renderSearch(user); break;
    case "communication": content=renderMessages(user); break; /* раздел «Общение» удалён по просьбе — совместимый редирект на сообщения */
    case "music":    content=renderMusic(user,route.params.tab||"tracks"); break;
    case "artist":   content=renderArtistPage(user,route.params.artistId); break;
    case "album":    content=renderAlbumPage(user,route.params.albumId); break;
    case "profile":  content=renderProfile(user,route.params.userId||user.id); break;
    case "settings": content=renderSettings(user); break;
    case "admin":    content=isAdmin(user)?renderAdmin(user):renderFeed(user); break;
    case "games":   content=renderGames(user); break;
    case "soon":    content=renderSoon(user); break;
    default:         content=renderFeed(user);
  }
  if(route.name==="messages"){ inner.style.maxWidth="none"; inner.style.padding="0"; inner.style.width="100%"; }
  inner.appendChild(content);
  return wrap;
}

const REACTION_EMOJIS=["❤️","👍","😂","😮","😢","😡"];

function getMyReaction(p,uid){ for(const e of REACTION_EMOJIS){ if(p.reactions[e]&&p.reactions[e].includes(uid)) return e; } return null; }
function toggleReaction(p,uid,emoji){
  if(!p.reactions) p.reactions={};
  const prev=getMyReaction(p,uid);
  /* убрать старую реакцию */
  for(const e of REACTION_EMOJIS){ if(p.reactions[e]){ p.reactions[e]=p.reactions[e].filter(id=>id!==uid); if(!p.reactions[e].length) delete p.reactions[e]; } }
  /* добавить только если нажали другой эмодзи */
  if(prev!==emoji){ if(!p.reactions[emoji]) p.reactions[emoji]=[]; p.reactions[emoji].push(uid); }
  saveDB(db);
}

/* ══ POST CARD (с комментариями) ══ */
function makePostCard(p, viewer){
  const author=findUser(p.authorId); if(!author) return document.createElement("div");
  if(!p.reactions) p.reactions={};
  const postComments=db.comments.filter(c=>c.postId===p.id).sort((a,b)=>a.createdAt-b.createdAt);
  const canDelPost=viewer.id===p.authorId||isAdmin(viewer);

  const wrap=document.createElement("div");
  wrap.className="post-wrap";

  /* реакции — считаем pills */
  function buildReactionBar(){
    const bar=document.createElement("div"); bar.className="reaction-bar"; bar.id="rbar_"+p.id;
    const my=getMyReaction(p,viewer.id);
    REACTION_EMOJIS.forEach(e=>{
      const arr=p.reactions[e]||[]; if(!arr.length) return;
      const pill=document.createElement("span");
      pill.className="reaction-pill"+(e===my?" mine":"");
      pill.innerHTML=`<span>${e}</span><span class="count">${arr.length}</span>`;
      pill.title=e===my?"Убрать реакцию":"Поставить "+e;
      pill.onclick=()=>{ 
        toggleReaction(p,viewer.id,e);
        const myR2=getMyReaction(p,viewer.id);
        reactBtn.innerHTML=myR2?`${myR2} Реакция`:`😊 Реакция`;
        const outerEl=postRow.querySelector("#rbar_outer"); if(outerEl){ outerEl.innerHTML=""; outerEl.appendChild(buildReactionBar()); }
      };
      bar.appendChild(pill);
    });
    return bar;
  }

  function rebuildCard(){
    const newCard=makePostCard(p,viewer);
    wrap.replaceWith(newCard);
  }

  const postRow=h(`<div class="post">
    <div class="avatar" style="cursor:pointer" data-uid="${author.id}">${author.avatarUrl?`<img src="${esc(author.avatarUrl)}">`:esc(getInitials(author.displayName))}</div>
    <div class="post-body">
      <div class="post-head">
        <span class="name" data-uid="${author.id}">${esc(author.displayName)}</span>
        ${verifiedBadge(author)}${premiumBadge(author)}${roleBadge(author.role)}
        <span class="username">@${esc(author.username)}</span>
        <span class="time">· ${timeAgo(p.createdAt)}</span>
        <span class="time">· ${onlineStatusHTML(viewer,author)}</span>
      </div>
      <p class="post-content">${esc(p.content)}</p>
      <div id="rbar_outer"></div>
      <div class="post-actions">
        <span class="reaction-picker-wrap">
          <span class="react-btn" id="reactBtn">😊 Реакция</span>
          <div class="reaction-picker hidden" id="rpicker">
            ${REACTION_EMOJIS.map(e=>`<button data-e="${e}" title="${e}">${e}</button>`).join("")}
          </div>
        </span>
        <button class="act-like" id="likeBtn" style="background:none;border:none;cursor:pointer;color:${(p.likedBy||[]).includes(viewer.id)?"var(--primary)":"var(--muted)"};font-size:14px;display:flex;align-items:center;gap:4px;">❤️ <span>${(p.likedBy||[]).length||""}</span></button>
        <span class="act" id="commentAct">
          ${S.comment} <span>${postComments.length}</span>
        </span>
        <button class="act-fwd" id="fwdPostBtn" title="Переслать">${S.repost} Переслать</button>
        ${canDelPost?`<button class="act-del" id="delPost">${S.trash} Удалить</button>`:""}
      </div>
    </div>
  </div>`);

  /* вставляем reaction bar */
  postRow.querySelector("#rbar_outer").appendChild(buildReactionBar());

  postRow.querySelectorAll("[data-uid]").forEach(el=>el.onclick=()=>nav("profile",{userId:author.id}));

  /* like button */
  const likeBtn=postRow.querySelector("#likeBtn");
  if(likeBtn) likeBtn.onclick=(ev)=>{
    ev.stopPropagation();
    if(!p.likedBy) p.likedBy=[];
    const li=p.likedBy.indexOf(viewer.id);
    if(li>=0) p.likedBy.splice(li,1); else p.likedBy.push(viewer.id);
    saveDB(db);
    const liked=p.likedBy.includes(viewer.id);
    likeBtn.style.color=liked?"var(--primary)":"var(--muted)";
    const sp=likeBtn.querySelector("span"); if(sp) sp.textContent=p.likedBy.length||"";
  };

  /* picker */
  const picker=postRow.querySelector("#rpicker");
  const reactBtn=postRow.querySelector("#reactBtn");
  const my=getMyReaction(p,viewer.id);
  if(my) reactBtn.innerHTML=`${my} Реакция`;
  reactBtn.onclick=(e)=>{ 
    e.stopPropagation(); 
    picker.classList.toggle("hidden");
    if(!picker.classList.contains("hidden")){
      /* Закрываем при клике за пределами пикера */
      const closePicker=(ev)=>{ if(!picker.contains(ev.target)&&ev.target!==reactBtn){ picker.classList.add("hidden"); document.removeEventListener("click",closePicker,true); } };
      setTimeout(()=>document.addEventListener("click",closePicker,true),10);
    }
  };
  REACTION_EMOJIS.forEach(e=>{
    const btn=picker.querySelector(`[data-e="${e}"]`);
    if(getMyReaction(p,viewer.id)===e) btn.classList.add("mine");
    btn.onclick=(ev)=>{ 
      ev.stopPropagation(); toggleReaction(p,viewer.id,e); picker.classList.add("hidden");
      /* Обновляем иконку кнопки и полоску реакций без пересоздания карточки */
      const myR=getMyReaction(p,viewer.id);
      reactBtn.innerHTML=myR?`${myR} Реакция`:`😊 Реакция`;
      const outer=postRow.querySelector("#rbar_outer"); if(outer){ outer.innerHTML=""; outer.appendChild(buildReactionBar()); }
      /* Перевешиваем обработчики pill'ов */
      outer&&outer.querySelectorAll(".reaction-pill").forEach(pill=>{
        const em=pill.querySelector("span")?.textContent;
        if(em) pill.onclick=()=>{ toggleReaction(p,viewer.id,em); const r2=getMyReaction(p,viewer.id); reactBtn.innerHTML=r2?`${r2} Реакция`:`😊 Реакция`; const o2=postRow.querySelector("#rbar_outer"); if(o2){ o2.innerHTML=""; o2.appendChild(buildReactionBar()); } };
      });
    };
  });

  /* секция комментариев */
  const commSection=document.createElement("div");
  commSection.className="comments-section";
  let commentsVisible=false;

  function buildComments(){
    commSection.innerHTML="";
    const fresh=db.comments.filter(c=>c.postId===p.id).sort((a,b)=>a.createdAt-b.createdAt);
    if(fresh.length){
      const list=document.createElement("div"); list.className="comment-list";
      fresh.forEach(c=>{
        const cAuthor=findUser(c.authorId); if(!cAuthor) return;
        const canDelComm=viewer.id===c.authorId||isAdmin(viewer);
        const ci=h(`<div class="comment-item">
          <div class="avatar" style="cursor:pointer" data-uid="${cAuthor.id}">${cAuthor.avatarUrl?`<img src="${esc(cAuthor.avatarUrl)}">`:esc(getInitials(cAuthor.displayName))}</div>
          <div class="comment-bubble">
            <div class="comment-meta">
              <span class="comment-name" data-uid="${cAuthor.id}">${esc(cAuthor.displayName)}${verifiedBadge(cAuthor)}${premiumBadge(cAuthor)}</span>
              <span class="comment-time">${timeAgo(c.createdAt)} · ${onlineStatusHTML(viewer,cAuthor)}</span>
            </div>
            <div class="comment-text">${esc(c.content)}</div>
            ${canDelComm?`<button class="comment-del" data-delc="${c.id}">${S.trash}</button>`:""}
          </div>
        </div>`);
        ci.querySelectorAll("[data-uid]").forEach(el=>el.onclick=()=>nav("profile",{userId:cAuthor.id}));
        const delCBtn=ci.querySelector("[data-delc]");
        if(delCBtn) delCBtn.onclick=()=>{ 
          removeEntity("comments",c.id); saveDB(db); buildComments();
          const commCountEl=postRow.querySelector("#commentAct span");
          if(commCountEl) commCountEl.textContent=db.comments.filter(x=>x.postId===p.id).length;
        };
        list.appendChild(ci);
      });
      commSection.appendChild(list);
    }
    /* поле ввода комментария */
    const cf=h(`<div class="comment-composer">
      <div class="avatar" style="cursor:pointer">${viewer.avatarUrl?`<img src="${esc(viewer.avatarUrl)}">`:esc(getInitials(viewer.displayName))}</div>
      <input placeholder="Написать комментарий..." id="cinput"/>
      <button>${S.send}</button>
    </div>`);
    function sendComment(){
      const inp=cf.querySelector("#cinput"), val=inp.value.trim(); if(!val) return;
      db.comments.push({id:nid(),postId:p.id,authorId:viewer.id,content:val,createdAt:Date.now()});
      saveDB(db); inp.value=""; buildComments();
      /* Обновляем счётчик в шапке поста без полного перестроения */
      const commCountEl=postRow.querySelector("#commentAct span");
      if(commCountEl) commCountEl.textContent=db.comments.filter(c=>c.postId===p.id).length;
    }
    cf.querySelector("button").onclick=sendComment;
    cf.querySelector("#cinput").addEventListener("keydown",e=>{ if(e.key==="Enter") sendComment(); });
    commSection.appendChild(cf);
  }

  postRow.querySelector("#commentAct").onclick=()=>{
    commentsVisible=!commentsVisible;
    if(commentsVisible){ buildComments(); wrap.appendChild(commSection); }
    else { if(commSection.parentNode) commSection.parentNode.removeChild(commSection); }
  };

  const delBtn=postRow.querySelector("#delPost");
  if(delBtn) delBtn.onclick=()=>{
    if(!confirm("Удалить этот пост?")) return;
    const relatedComments=db.comments.filter(x=>x.postId===p.id);
    removeEntity("posts",p.id);
    relatedComments.forEach(c=>removeEntity("comments",c.id));
    saveDB(db);
    /* Мгновенно убираем из DOM без перезагрузки страницы */
    wrap.style.transition="opacity .2s,transform .2s";
    wrap.style.opacity="0"; wrap.style.transform="translateY(-4px)";
    setTimeout(()=>{ if(wrap.parentNode) wrap.parentNode.removeChild(wrap); },200);
    toast("Пост удалён");
  };

  /* Пересылка поста */
  const fwdBtn=postRow.querySelector("#fwdPostBtn");
  if(fwdBtn) fwdBtn.onclick=()=>{
    openForwardModal(viewer,{
      text: p.content||"",
      attachments: [],
      sourceLabel: "Пост @"+author.username,
      sourceType: "user",
      sourceId: author.id,
      sourceName: author.displayName,
      sourceAvatarUrl: author.avatarUrl||null,
      originalPostId: p.id,
    });
  };

  /* Блок «Переслано от» для поста */
  if(p.isForwarded&&!p.forwardedFrom){
    /* Старые пересланные посты без metadata */
    const fwdSimple=h(`<div style="font-size:12px;color:var(--primary);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:5px;">${S.repost} Пересланное сообщение</div>`);
    const pc=postRow.querySelector(".post-content");
    if(pc&&pc.parentNode) pc.parentNode.insertBefore(fwdSimple,pc);
  } else if(p.forwardedFrom){
    const fd=p.forwardedFrom;
    const srcUser=fd.type==="user"?findUser(fd.id):null;
    const srcCh=fd.type==="channel"?findChannel(fd.id):null;
    const ava=(fd.avatarUrl||srcUser?.avatarUrl||srcCh?.avatarUrl)||null;
    const name=fd.name||(srcUser?srcUser.displayName:null)||(srcCh?srcCh.title:null)||"Удалённый аккаунт";
    const iniStr=name.trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";
    const avaHtml=ava?`<img src="${esc(ava)}">`:`<span>${esc(iniStr)}</span>`;
    const fwdBlock=h(`<div class="fwd-from-block" title="Перейти к оригиналу">
      <div class="fwd-from-header"><div class="fwd-from-ava">${avaHtml}</div><span class="fwd-from-label">Переслано от: ${esc(name)}</span></div>
      ${fd.originalText?`<div class="fwd-from-text">${esc(fd.originalText.slice(0,220))}${fd.originalText.length>220?"…":""}</div>`:""}
    </div>`);
    fwdBlock.onclick=(e)=>{
      e.stopPropagation();
      if(fd.type==="user"&&(srcUser||fd.id)) nav("profile",{userId:fd.id});
      else if(fd.type==="channel"&&(srcCh||fd.id)) nav("channelPage",{channelId:fd.id});
    };
    const pc=postRow.querySelector(".post-content");
    if(pc&&pc.parentNode) pc.parentNode.insertBefore(fwdBlock,pc);
  }

  wrap.appendChild(postRow);
  return wrap;
}

/* ══ FRIENDS ══ */
function friendIdsOf(uid){ const ids=new Set(); db.friendRequests.filter(r=>r.status==="accepted").forEach(r=>{ if(r.fromId===uid) ids.add(r.toId); if(r.toId===uid) ids.add(r.fromId); }); return ids; }
function areFriends(uid1,uid2){ return !!db.friendRequests.find(r=>r.status==="accepted"&&((r.fromId===uid1&&r.toId===uid2)||(r.fromId===uid2&&r.toId===uid1))); }
function friendStatusBetween(a,b){ return db.friendRequests.find(r=>(r.fromId===a&&r.toId===b)||(r.fromId===b&&r.toId===a))||null; }

function renderFriends(user){
  const frag=h(`<div></div>`);
  frag.appendChild(h(`<h1 class="section-title">${S.friends} Друзья</h1>`));
  const grid=h(`<div class="friends-grid"></div>`);
  const col=h(`<div class="card" style="padding:8px;min-height:300px;"></div>`);
  const fids=[...friendIdsOf(user.id)];
  if(!fids.length) col.appendChild(h(`<div class="empty"><div class="icon-circle">${S.friends}</div><h3>Пока нет друзей</h3></div>`));
  else fids.forEach(fid=>{ const f=findUser(fid); if(!f) return;
    const row=h(`<div class="list-row"><div class="list-row-left" data-open="${f.id}"><div class="avatar">${f.avatarUrl?`<img src="${esc(f.avatarUrl)}">`:esc(getInitials(f.displayName))}</div><div><div class="list-row-name">${esc(f.displayName)}${verifiedBadge(f)}${premiumBadge(f)}</div><div class="list-row-sub">@${esc(f.username)}</div><div>${onlineStatusHTML(user,f)}</div></div></div><div class="list-row-actions">${canCall(user.id,f)?`<button class="call-start-btn call-start-btn-sm" data-call="${f.id}" title="Позвонить">${S.phone}</button>`:""}<button class="btn btn-outline btn-sm" data-msg="${f.id}">Написать</button><button class="btn btn-danger-outline btn-sm" data-rem="${f.id}">Удалить</button></div></div>`);
    row.querySelector("[data-open]").onclick=()=>nav("profile",{userId:f.id});
    row.querySelector("[data-msg]").onclick=()=>{ openConvWith(user.id,f.id); nav("messages",{userId:f.id}); };
    const callB=row.querySelector("[data-call]"); if(callB) callB.onclick=(e)=>{ e.stopPropagation(); startOutgoingCall(f.id); };
    row.querySelector("[data-rem]").onclick=()=>{ const r=friendStatusBetween(user.id,f.id); if(r){ removeEntity("friendRequests",r.id); saveDB(db); row.style.transition="opacity .2s"; row.style.opacity="0"; setTimeout(()=>row.remove(),200); toast("Друг удалён"); } };
    col.appendChild(row);
  });
  grid.appendChild(col);
  const reqCol=h(`<div class="card" style="padding:16px;"><h3 style="margin:0 0 14px;font-size:15px;">Запросы</h3><div id="rl"></div></div>`);
  const rl=reqCol.querySelector("#rl");
  const pending=db.friendRequests.filter(r=>r.toId===user.id&&r.status==="pending");
  if(!pending.length) rl.appendChild(h(`<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">Нет запросов</div>`));
  else pending.forEach(r=>{ const from=findUser(r.fromId); if(!from) return;
    const card=h(`<div class="req-card"><div class="list-row-left" style="margin-bottom:10px;" data-open="${from.id}"><div class="avatar" style="width:36px;height:36px;font-size:13px;">${from.avatarUrl?`<img src="${esc(from.avatarUrl)}">`:esc(getInitials(from.displayName))}</div><div><div class="list-row-name" style="font-size:13.5px;">${esc(from.displayName)}${verifiedBadge(from)}</div><div class="list-row-sub">@${esc(from.username)}</div></div></div><div style="display:flex;gap:8px;"><button class="btn btn-primary btn-sm" style="flex:1;" data-acc>Принять</button><button class="btn btn-danger-outline btn-sm" style="flex:1;" data-dec>Отклонить</button></div></div>`);
    card.querySelector("[data-open]").onclick=()=>nav("profile",{userId:from.id});
    card.querySelector("[data-acc]").onclick=async()=>{
      const prev={...db, friendRequests: db.friendRequests.map(x=>x.id===r.id?{...x}:x)};
      r.status="accepted";
      const ok=await persistDB(prev,{successMsg:"Заявка принята ✓",failMsg:"Не удалось принять заявку"});
      if(ok){ card.style.transition="opacity .2s"; card.style.opacity="0"; setTimeout(()=>card.remove(),200); }
    };
    card.querySelector("[data-dec]").onclick=async()=>{
      const prev={...db, friendRequests: db.friendRequests.map(x=>x.id===r.id?{...x}:x)};
      r.status="declined";
      await persistDB(prev,{failMsg:"Не удалось отклонить заявку"});
      card.style.transition="opacity .2s"; card.style.opacity="0"; setTimeout(()=>card.remove(),200);
    };
    rl.appendChild(card);
  });
  grid.appendChild(reqCol); frag.appendChild(grid);
  return frag;
}

function renderSearch(user){
  const frag=h(`<div></div>`);
  frag.appendChild(h(`<h1 class="section-title">${S.search} Поиск</h1>`));
  const box=h(`<div class="searchbox"><input placeholder="Найти по имени или @нику" id="q"/></div>`);
  frag.appendChild(box);
  const res=h(`<div class="card" style="padding:8px;min-height:200px;"></div>`);
  frag.appendChild(res);
  function doSearch(q){ res.innerHTML=""; const term=q.trim().toLowerCase();
    const matches=db.users.filter(u=>u.id!==user.id&&(!term||u.username.toLowerCase().includes(term)||u.displayName.toLowerCase().includes(term)));
    if(!matches.length){ res.appendChild(h(`<div class="empty"><div class="icon-circle">${S.search}</div><h3>Никого не найдено</h3></div>`)); return; }
    matches.forEach(u=>{ const rel=friendStatusBetween(user.id,u.id);
      let act=""; if(!rel) act=`<button class="btn btn-primary btn-sm" data-add="${u.id}">Добавить</button>`; else if(rel.status==="accepted") act=`<span style="color:var(--green);font-size:13px;font-weight:700;">✓ Друзья</span>`; else if(rel.status==="pending"&&rel.fromId===user.id) act=`<span style="color:var(--muted);font-size:13px;">Отправлен</span>`; else if(rel.status==="pending"&&rel.toId===user.id) act=`<button class="btn btn-primary btn-sm" data-accq="${u.id}">Принять</button>`;
      const row=h(`<div class="list-row"><div class="list-row-left" data-open="${u.id}"><div class="avatar">${u.avatarUrl?`<img src="${esc(u.avatarUrl)}">`:esc(getInitials(u.displayName))}</div><div><div class="list-row-name">${esc(u.displayName)}${verifiedBadge(u)}${premiumBadge(u)} ${roleBadge(u.role)}</div><div class="list-row-sub">@${esc(u.username)}</div><div>${onlineStatusHTML(user,u)}</div></div></div><div class="list-row-actions">${act}</div></div>`);
      row.querySelector("[data-open]").onclick=()=>nav("profile",{userId:u.id});
      const ab=row.querySelector("[data-add]"); if(ab) ab.onclick=(e)=>{ db.friendRequests.push({id:nid(),fromId:user.id,toId:u.id,status:"pending",createdAt:Date.now()}); saveDB(db); e.currentTarget.textContent="⏳ Отправлено"; e.currentTarget.disabled=true; toast("Запрос отправлен ✓"); };
      const qb=row.querySelector("[data-accq]"); if(qb) qb.onclick=()=>{ rel.status="accepted"; saveDB(db); doSearch(box.querySelector("#q").value); toast("Принято"); };
      res.appendChild(row);
    });
  }
  box.querySelector("#q").addEventListener("input",e=>doSearch(e.target.value)); doSearch(""); return frag;
}

/* ══ MUSIC (5 вкладок) ══ */
const MAX_TRACK_MB=12;

/* ── Хранилище аудиофайлов треков ──
   ПЕРВОПРИЧИНА бага "часть треков не сохраняется/не удаляется": раньше аудио
   каждого трека кодировалось в base64 и клалось прямо в поле dataUrl внутри
   ЕДИНОЙ строки leimchat_db (весь сайт — один JSON-объект в одной ячейке).
   С каждым новым треком (до 12 МБ файла ≈ 16 МБ в base64) эта строка росла,
   и рано или поздно upsert() одной гигантской JSON-записи упирался в лимит
   размера запроса/страницы на стороне Supabase — запрос падал, но saveDB()
   уже успевало переключить локальную db на "как будто сохранённую" версию,
   поэтому в интерфейсе трек выглядел сохранённым/удалённым, а после
   перезагрузки — исчезал (то же самое ломало и удаление). Решение: аудио
   само по себе живёт в Supabase Storage (файлы), а в общей JSON-базе для
   трека хранится только маленькая ссылка — это и есть исходная модель
   dataUrl (URL), просто теперь URL ведёт на объект в Storage, а не на
   base64. Нужен публичный bucket "leimchat-tracks" в том же проекте Supabase
   (Storage → Create bucket → Public). Если бакета ещё нет, показываем
   понятную ошибку вместо тихой потери трека. */
const TRACK_AUDIO_BUCKET="leimchat-tracks";
async function uploadTrackAudioFile(file,trackId){
  if(!sb) return {ok:false,error:"Supabase не настроен"};
  const ext=(file.name.split(".").pop()||"mp3").toLowerCase().replace(/[^a-z0-9]/g,"")||"mp3";
  const path=`${trackId}.${ext}`;
  try{
    const {error}=await sb.storage.from(TRACK_AUDIO_BUCKET).upload(path,file,{contentType:file.type||"audio/mpeg",upsert:true});
    if(error) throw error;
    const {data}=sb.storage.from(TRACK_AUDIO_BUCKET).getPublicUrl(path);
    if(!data||!data.publicUrl) throw new Error("Не удалось получить ссылку на файл");
    return {ok:true,url:data.publicUrl,path};
  }catch(e){
    console.error("uploadTrackAudioFile failed",e);
    return {ok:false,error:(e&&e.message)||"Не удалось загрузить аудиофайл в хранилище"};
  }
}
/* Путь объекта в bucket'e — это то, что после последнего "/" в публичном URL,
   без учёта query-параметров (Supabase иногда добавляет ?token=... и т.п.). */
function trackAudioPathFromUrl(url){
  if(!url||typeof url!=="string") return null;
  const marker=`/${TRACK_AUDIO_BUCKET}/`;
  const idx=url.indexOf(marker);
  if(idx===-1) return null;
  return url.slice(idx+marker.length).split("?")[0];
}
async function deleteTrackAudioFile(track){
  if(!sb||!track||!track.dataUrl) return;
  if(track.sourceType&&track.sourceType!=="file") return; // внешний трек (YouTube/SoundCloud) — файла в Storage нет
  const path=trackAudioPathFromUrl(track.dataUrl);
  if(!path) return; // трек с "легаси" base64 dataUrl — файла в Storage нет, удалять нечего
  try{
    const {error}=await sb.storage.from(TRACK_AUDIO_BUCKET).remove([path]);
    if(error) console.error("deleteTrackAudioFile failed",error);
  }catch(e){ console.error("deleteTrackAudioFile failed",e); }
}

/* ── вспомогательные функции для лайков и плейлистов ── */
function isLiked(user,trackId){ return (user.likedTrackIds||[]).includes(trackId); }
function toggleLike(user,trackId){
  if(!user.likedTrackIds) user.likedTrackIds=[];
  if(isLiked(user,trackId)){
    user.likedTrackIds=user.likedTrackIds.filter(id=>id!==trackId);
    user.updatedAt=Date.now();
    saveDB(db); toast("Убрано из лайков");
  } else {
    user.likedTrackIds.push(trackId);
    user.updatedAt=Date.now();
    saveDB(db); toast("❤️ Добавлено в лайки");
  }
}

/* ── парсинг YouTube / SoundCloud ссылок ── */
function parseMediaUrl(url){
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
  if(yt){
    const vid=yt[1];
    return {sourceType:"youtube",embedUrl:`https://www.youtube-nocookie.com/embed/${vid}?modestbranding=1&rel=0&showinfo=0&color=white&iv_load_policy=3`};
  }
  if(/soundcloud\.com\/.+\/.+/.test(url)){
    return {sourceType:"soundcloud",embedUrl:`https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%234f6bff&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false`};
  }
  return null;
}

  const canDel=opts.canDel!==undefined?opts.canDel:(isAdmin(user)||(uploader&&uploader.id===user.id));

  const isExt=t.sourceType==="youtube"||t.sourceType==="soundcloud";

  const admin=isAdmin(user);
  /* кто добавил трек — видно только админу; обычным пользователям не показываем */
  const canNavigate=!!linkedArtist||admin;

  const playerHtml=isExt
    ? `<button class="ext-play-btn" data-extplay="${t.id}">${S.play} Воспроизвести</button>`
    : `<button class="ext-play-btn" data-globalplay="${t.id}">${isPlayingGlobal?S.pause:S.play} ${isPlayingGlobal?"Пауза":"Играть"}</button>`;

  const wrap=h(`<div></div>`);
  const row=h(`<div class="list-row" style="align-items:center;flex-wrap:wrap;gap:10px;">
    <div class="list-row-left" style="min-width:160px;flex:1;${canNavigate?"cursor:pointer;":""}" ${canNavigate?`data-open="1"`:""}>
      <div class="avatar" style="flex-shrink:0;">${t.coverUrl?`<img src="${esc(t.coverUrl)}">`:(linkedArtist&&linkedArtist.avatarUrl?`<img src="${esc(linkedArtist.avatarUrl)}">`:(uploader&&uploader.avatarUrl?`<img src="${esc(uploader.avatarUrl)}">`:esc(getInitials(uploader?uploader.displayName:"?"))))}</div>
      <div style="min-width:0;">
        <div class="list-row-name">${esc(t.title)}${t.artist?` <span style="color:var(--muted);font-weight:400;">— ${esc(t.artist)}</span>`:""}${isExt?` <span class="privacy-badge" style="font-size:10px;">${S.link} ${t.sourceType==="youtube"?"YT":"SC"}</span>`:""}</div>
        <div class="list-row-sub">${admin&&uploader?`Добавил: ${esc(uploader.displayName)} · `:""}${timeAgo(t.createdAt)}${t.plays?` · ${fmtPlays(t.plays)} прослушиваний`:""}</div>
      </div>
    </div>
    ${playerHtml}
    <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
      <button class="btn-icon" data-lyricstid="${t.id}" title="Текст песни" style="${t.lyrics?"":"opacity:.45;"}">📃</button>
      <button class="like-btn ${liked?"liked":""}" data-liketid="${t.id}" title="${liked?"Убрать лайк":"Лайкнуть"}">${liked?S.heartFill:S.heartOutline}</button>
      <button class="add-to-playlist-btn" data-pltid="${t.id}" title="Добавить в плейлист">${S.plus}</button>
      <button class="btn-icon" data-albtid="${t.id}" title="Добавить в альбом">💿</button>
      ${canDel?`<button class="btn btn-danger-outline btn-sm" data-deltrack="${t.id}">${S.trash}</button>`:""}
    </div>
  </div>`);
  wrap.appendChild(row);

  if(isExt && t.embedUrl){
    const playerWrap=h(`<div class="ext-player-wrap"><iframe src="" allow="autoplay" allowfullscreen loading="lazy"></iframe></div>`);
    wrap.appendChild(playerWrap);
    row.querySelector("[data-extplay]").onclick=e=>{
      e.stopPropagation();
      const open=playerWrap.classList.toggle("open");
      const iframe=playerWrap.querySelector("iframe");
      if(open && !iframe.src){ iframe.src=t.embedUrl; recordPlay(t.id,user.id); }
      else if(!open) iframe.src="";
    };
  }

  const op=row.querySelector("[data-open]");
  if(op) op.onclick=e=>{
    if(e.target.closest(".like-btn,.add-to-playlist-btn,[data-deltrack],[data-extplay],[data-globalplay],[data-lyricstid],[data-albtid]")) return;
    if(linkedArtist) nav("artist",{artistId:linkedArtist.id});
    else if(admin&&uploader) nav("profile",{userId:uploader.id});
  };
  row.querySelector("[data-liketid]").onclick=e=>{ 
    e.stopPropagation(); toggleLike(user,t.id);
    const liked=(t.likedBy||[]).includes(user.id);
    e.currentTarget.style.color=liked?"var(--primary)":"var(--muted)";
    const likeCountEl=e.currentTarget.querySelector("span"); 
    if(likeCountEl) likeCountEl.textContent=(t.likedBy||[]).length||(liked?"1":"0");
  };
  row.querySelector("[data-pltid]").onclick=e=>{ e.stopPropagation(); openAddToPlaylistModal(user,t.id); };
  row.querySelector("[data-lyricstid]").onclick=e=>{ e.stopPropagation(); openLyricsModal(t,user); };
  row.querySelector("[data-albtid]").onclick=e=>{ e.stopPropagation(); openAddToAlbumModal(user,t.id); };
  const db2=row.querySelector("[data-deltrack]"); if(db2) db2.onclick=async e=>{
    e.stopPropagation(); if(!confirm("Удалить этот трек?")) return;
    db2.disabled=true;
    const prevDb=db;
    /* Работаем на снимке структуры (JSON round-trip), а не на исходных
       объектах prevDb — иначе removeEntity/filter мутировали бы те же
       вложенные массивы, что и в prevDb, и откат при неудаче стал бы
       невозможен (prevDb "испортился" бы вместе с db). */
    db=JSON.parse(JSON.stringify(db));
    removeEntity("tracks",t.id);
    (db.playlists||[]).forEach(p=>{ if(Array.isArray(p.trackIds)) p.trackIds=p.trackIds.filter(id=>id!==t.id); });
    (db.albums||[]).forEach(al=>{ if(Array.isArray(al.trackIds)) al.trackIds=al.trackIds.filter(id=>id!==t.id); });
    (db.artists||[]).forEach(a=>{ if(Array.isArray(a.trackIds)) a.trackIds=a.trackIds.filter(id=>id!==t.id); });
    const saved=await persistDB(prevDb,{successMsg:"Трек удалён",failMsg:"Не удалось удалить трек"});
    if(saved){
      /* Удаляем сам аудиофайл из Storage только после того, как удаление
         подтверждено в общей базе — иначе при неудачном saveDB мы бы стёрли
         файл, а трек откатился бы обратно и остался бы без аудио (та самая
         "битая запись", которую нужно было исключить). */
      deleteTrackAudioFile(t);
      nav("music",{tab:"tracks"});
    } else {
      db2.disabled=false;
    }
  };
  const gpBtn=row.querySelector("[data-globalplay]");
  if(gpBtn){
    const queueIds=opts.queueIds||[t.id];
    gpBtn.onclick=e=>{ e.stopPropagation(); gpPlayQueue(queueIds,t.id); };
    gpSubscribe(()=>{
      if(!gpBtn.isConnected) return;
      const playing=gpIsPlayingId(t.id);
      gpBtn.innerHTML=`${playing?S.pause:S.play} ${playing?"Пауза":"Играть"}`;
    });
  }
  return wrap;
}
