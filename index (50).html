    up.querySelector("#tsub").onclick=async()=>{
      const title=up.querySelector("#tt").value.trim(), artist=up.querySelector("#ta").value.trim(), lyrics=up.querySelector("#tly").value.trim();
      if(!pickedFile){ toast("Сначала выберите аудиофайл"); return; }
      if(!title){ toast("Введите название трека"); return; }
      const btn=up.querySelector("#tsub"); btn.disabled=true; btn.textContent="Загрузка...";
      const trackId=nid();
      /* Загружаем сам файл в Storage ДО того, как трек появится в общей базе —
         так в базе никогда не окажется "битой" записи без аудио. */
      const uploadRes=await uploadTrackAudioFile(pickedFile,trackId);
      if(!uploadRes.ok){
        toast(`⚠️ Не удалось загрузить файл: ${uploadRes.error}`);
        btn.disabled=false; btn.textContent="Опубликовать трек";
        return;
      }
      const prevDb=db;
      db={...db,tracks:[{id:trackId,uploaderId:user.id,title,artist,lyrics,dataUrl:uploadRes.url,createdAt:Date.now(),plays:0,monthlyPlays:{}},...db.tracks]};
      const saved=await persistDB(prevDb,{successMsg:"Трек добавлен 🎵",failMsg:"Не удалось сохранить трек"});
      if(saved){ nav("music",{tab:"tracks"}); }
      else{
        /* Запись в базу не удалась — не оставляем висящий файл в Storage. */
        deleteTrackAudioFile({dataUrl:uploadRes.url});
        btn.disabled=false; btn.textContent="Опубликовать трек";
      }
    };
    body.appendChild(up);
    const listCard=h(`<div class="card" style="padding:8px;"></div>`);
    const tracks=[...db.tracks].sort((a,b)=>b.createdAt-a.createdAt);
    if(!tracks.length) listCard.appendChild(h(`<div class="empty"><div class="icon-circle">${S.music}</div><h3>Пока нет треков</h3><p>Загрузите первый!</p></div>`));
    else { const qIds=tracks.filter(x=>x.dataUrl).map(x=>x.id); tracks.forEach(t=>listCard.appendChild(makeTrackRow(t,user,{queueIds:qIds}))); }
    body.appendChild(listCard);

  /* ════════ АЛЬБОМЫ ════════ */
  } else if(activeTab==="albums"){
    const cbox=h(`<div class="card" style="padding:20px;margin-bottom:20px;">
      <div style="font-weight:700;margin-bottom:10px;">💿 Создать альбом</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Соберите свои треки в альбом. Треки можно добавить кнопкой 💿 рядом с треком.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input id="alname" placeholder="Название альбома" style="flex:1;min-width:180px;"/>
        <button class="btn btn-primary" id="alcreate">${S.plus} Создать</button>
      </div>
    </div>`);
    cbox.querySelector("#alcreate").onclick=()=>{
      const title=cbox.querySelector("#alname").value.trim(); if(!title){ toast("Введите название альбома"); return; }
      db.albums.unshift({id:nid(),creatorId:user.id,title,coverUrl:null,artistId:null,trackIds:[],createdAt:Date.now()});
      saveDB(db); toast(`Альбом «${title}» создан 💿`); nav("music",{tab:"albums"});
    };
    body.appendChild(cbox);
    const grid=h(`<div class="artists-grid"></div>`);
    const albums=[...db.albums].sort((a,b)=>b.createdAt-a.createdAt);
    if(!albums.length) grid.appendChild(h(`<div class="empty" style="grid-column:1/-1;"><div class="icon-circle">💿</div><h3>Пока нет альбомов</h3><p>Создайте первый выше!</p></div>`));
    else albums.forEach(al=>{
      const linkedArtist=al.artistId?db.artists.find(a=>a.id===al.artistId):null;
      const card=h(`<div class="artist-card" data-alid="${al.id}">
        <div class="artist-card-banner">${al.coverUrl?`<img src="${esc(al.coverUrl)}">`:""}</div>
        <div class="artist-card-body">
          <div class="avatar artist-card-avatar">${al.coverUrl?`<img src="${esc(al.coverUrl)}">`:"💿"}</div>
          <div class="artist-card-name">${esc(al.title)}</div>
          <div class="artist-card-stats"><span>${(al.trackIds||[]).length} треков</span>${linkedArtist?`<span>· ${esc(linkedArtist.name)}</span>`:""}</div>
        </div>
      </div>`);
      card.onclick=()=>nav("album",{albumId:al.id});
      grid.appendChild(card);
    });
    body.appendChild(grid);

  /* ════════ ИСПОЛНИТЕЛИ ════════ */
  } else if(activeTab==="artists"){
    const box=h(`<div class="searchbox" style="margin-bottom:20px;"><input placeholder="Найти исполнителя..." id="aq"/></div>`);
    body.appendChild(box);
    const grid=h(`<div class="artists-grid" id="agrid"></div>`);
    body.appendChild(grid);
    function buildGrid(term){
      grid.innerHTML="";
      const matched=db.artists.filter(a=>!term||a.name.toLowerCase().includes(term.toLowerCase()));
      if(!matched.length){ grid.innerHTML=`<div class="empty" style="grid-column:1/-1;"><div class="icon-circle">🎤</div><h3>Исполнителей пока нет</h3><p>${term?"Никто не найден":"Администратор ещё не добавил ни одного"}</p></div>`; return; }
      matched.forEach(artist=>grid.appendChild(makeArtistCard(artist)));
    }
    box.querySelector("#aq").addEventListener("input",e=>buildGrid(e.target.value));
    buildGrid("");

  /* ════════ ПОДПИСКИ ════════ */
  } else if(activeTab==="subs"){
    const subArtists=db.artists.filter(a=>(a.subscriberIds||[]).includes(user.id));
    const grid=h(`<div class="artists-grid"></div>`);
    if(!subArtists.length) grid.appendChild(h(`<div class="empty" style="grid-column:1/-1;"><div class="icon-circle">${S.mic}</div><h3>Вы ни на кого не подписаны</h3><p>Откройте страницу исполнителя и нажмите «Подписаться»</p></div>`));
    else subArtists.forEach(artist=>grid.appendChild(makeArtistCard(artist)));
    body.appendChild(grid);

  /* ════════ ЛАЙКИ ════════ */
  } else if(activeTab==="likes"){
    const likedIds=user.likedTrackIds||[];
    const liked=likedIds.map(id=>db.tracks.find(t=>t.id===id)).filter(Boolean).reverse();
    const card=h(`<div class="card" style="padding:8px;"></div>`);
    if(!liked.length) card.appendChild(h(`<div class="empty"><div class="icon-circle">${S.heartFill}</div><h3>Нет лайкнутых треков</h3><p>Нажмите ❤️ рядом с любым треком</p></div>`));
    else { const qIds=liked.filter(x=>x.dataUrl).map(x=>x.id); liked.forEach(t=>card.appendChild(makeTrackRow(t,user,{canDel:false,queueIds:qIds}))); }
    body.appendChild(card);

  /* ════════ ПЛЕЙЛИСТЫ ════════ */
  } else if(activeTab==="playlists"){
    if(route.params.plid){
      /* ── Открытый плейлист ── */
      const pl=db.playlists.find(p=>p.id===route.params.plid);
      if(!pl){ body.appendChild(h(`<div class="empty"><div class="icon-circle">${S.playlist}</div><h3>Плейлист не найден</h3></div>`)); }
      else {
        const backBtn=h(`<button class="btn btn-outline btn-sm" style="margin-bottom:16px;">← Мои плейлисты</button>`);
        backBtn.onclick=()=>nav("music",{tab:"playlists"});
        body.appendChild(backBtn);
        const plCard=h(`<div class="card" style="padding:20px;margin-bottom:16px;">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <div>
              <div style="font-size:20px;font-weight:800;">${S.playlist} ${esc(pl.name)}</div>
              <div style="color:var(--muted);font-size:13px;margin-top:4px;">${pl.trackIds.length} треков · Создан ${timeAgo(pl.createdAt)}</div>
            </div>
            ${pl.ownerId===user.id?`<button class="btn btn-danger-outline btn-sm" id="delpl">${S.trash} Удалить</button>`:""}
          </div>
        </div>`);
        if(pl.ownerId===user.id){
          plCard.querySelector("#delpl").onclick=()=>{ if(!confirm("Удалить плейлист?")) return; removeEntity("playlists",pl.id); saveDB(db); nav("music",{tab:"playlists"}); toast("Плейлист удалён"); };
        }
        body.appendChild(plCard);
        const tracks=pl.trackIds.map(id=>db.tracks.find(t=>t.id===id)).filter(Boolean);
        const tracksCard=h(`<div class="card" style="padding:8px;"></div>`);
        if(!tracks.length) tracksCard.appendChild(h(`<div class="empty"><div class="icon-circle">${S.music}</div><h3>Плейлист пуст</h3><p>Добавьте треки кнопкой ${S.plus} рядом с треком</p></div>`));
        else { const qIds=tracks.filter(x=>x.dataUrl).map(x=>x.id); tracks.forEach(t=>tracksCard.appendChild(makeTrackRow(t,user,{canDel:false,queueIds:qIds}))); }
        body.appendChild(tracksCard);
      }
    } else {
      /* ── Список плейлистов ── */
      const allMyPl=db.playlists.filter(p=>p.ownerId===user.id).sort((a,b)=>b.createdAt-a.createdAt);
      const topBar=h(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;">
        <div style="font-weight:700;font-size:16px;">${S.playlist} Мои плейлисты</div>
        <button class="btn btn-primary btn-sm" id="newpl">${S.plus} Создать</button>
      </div>`);
      topBar.querySelector("#newpl").onclick=()=>{
        const name=prompt("Название плейлиста:"); if(!name||!name.trim()) return;
        db.playlists.push({id:nid(),ownerId:user.id,name:name.trim(),trackIds:[],isPrivate:false,createdAt:Date.now()});
        saveDB(db); nav("music",{tab:"playlists"}); toast("Плейлист создан 🎵");
      };
      body.appendChild(topBar);

      /* Поиск */
      const searchBox=h(`<div class="searchbox" style="margin-bottom:16px;"><input id="plsearch" placeholder="Поиск по названию плейлиста..."/></div>`);
      body.appendChild(searchBox);

      const gridWrap=h(`<div></div>`);
      body.appendChild(gridWrap);

      function buildPlGrid(term){
        gridWrap.innerHTML="";
        const filtered=allMyPl.filter(p=>!term||p.name.toLowerCase().includes(term.toLowerCase()));
        if(!filtered.length){
          gridWrap.appendChild(h(`<div class="empty"><div class="icon-circle">${S.playlist}</div><h3>${term?"Ничего не найдено":"Нет плейлистов"}</h3><p>${term?"":"Нажмите «Создать» или добавляйте треки кнопкой " +S.plus}</p></div>`));
          return;
        }
        const grid=h(`<div class="playlist-grid"></div>`);
        filtered.forEach(pl=>{
          const card=h(`<div class="playlist-card">
            <div class="playlist-card-cover" style="${pl.isPrivate?"background:linear-gradient(135deg,#555,#333)":""}">
              ${pl.isPrivate?S.lock:S.playlist}
            </div>
            <div class="playlist-card-name">${esc(pl.name)}</div>
            <div class="playlist-card-meta" style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
              <span>${pl.trackIds.length} треков</span>
              <button class="privacy-badge ${pl.isPrivate?"private":""}" data-privpl title="${pl.isPrivate?"Сделать публичным":"Сделать приватным"}" style="cursor:pointer;border:none;">
                ${pl.isPrivate?S.lock+" Приватный":S.unlock+" Публичный"}
              </button>
            </div>
          </div>`);
          card.onclick=e=>{
            if(e.target.closest("[data-privpl]")) return;
            nav("music",{tab:"playlists",plid:pl.id});
          };
          card.querySelector("[data-privpl]").onclick=e=>{
            e.stopPropagation();
            pl.isPrivate=!pl.isPrivate;
            saveDB(db); toast(pl.isPrivate?"Плейлист приватный 🔒":"Плейлист публичный");
            buildPlGrid(searchBox.querySelector("#plsearch").value.trim());
          };
          grid.appendChild(card);
        });
        gridWrap.appendChild(grid);
      }

      searchBox.querySelector("#plsearch").addEventListener("input",e=>buildPlGrid(e.target.value.trim()));
      buildPlGrid("");
    }
  }

  return frag;
}

/* ══════════════════════════════════════════════════════
   ИСПОЛНИТЕЛИ — СТРАНИЦА ИСПОЛНИТЕЛЯ
   ══════════════════════════════════════════════════════ */
function renderArtistPage(user, artistId){
  const artist=db.artists.find(a=>a.id===artistId);
  if(!artist){
    const frag=h(`<div></div>`);
    frag.appendChild(h(`<button class="btn btn-outline" style="margin-bottom:16px;" id="bk">← Назад к исполнителям</button>`));
    frag.querySelector("#bk").onclick=()=>nav("music",{tab:"artists"});
    frag.appendChild(h(`<div class="empty"><div class="icon-circle">🎤</div><h3>Исполнитель не найден</h3></div>`));
    return frag;
  }

  const stats=artistStats(artist);
  const isSubscribed=(artist.subscriberIds||[]).includes(user.id);
  const mk=currentMonthKey();

  const frag=h(`<div></div>`);

  /* Кнопка «Назад» */
  const backBtn=h(`<button class="btn btn-outline btn-sm" style="margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;">← Все исполнители</button>`);
  backBtn.onclick=()=>nav("music",{tab:"artists"});
  frag.appendChild(backBtn);

  /* Карточка с шапкой — аватарка вынесена НАРУЖУ карточки, чтобы не обрезаться */
  const pageCard=h(`<div class="artist-page-card">
    <div class="artist-page-card-inner">
      <div class="artist-hero">
        ${artist.bannerUrl?`<img src="${esc(artist.bannerUrl)}" alt="баннер">`:``}
      </div>
    </div>
    <div class="artist-page-info">
      <div class="artist-page-avatar-wrap">
        <div class="avatar artist-page-avatar">
          ${artist.avatarUrl?`<img src="${esc(artist.avatarUrl)}" alt="${esc(artist.name)}">`:esc(getInitials(artist.name)||"?")}
        </div>
      </div>
      <div class="artist-page-name">${esc(artist.name)}</div>
      ${artist.bio?`<p class="artist-page-bio">${esc(artist.bio)}</p>`:`<p class="artist-page-bio" style="font-style:italic;opacity:.5;">Описание пока не добавлено</p>`}
      <div class="artist-stats-row">
        <div class="artist-stat-block"><span class="artist-stat-num">${fmtPlays(stats.total)}</span><span class="artist-stat-label">Всего прослушиваний</span></div>
        <div class="artist-stat-block"><span class="artist-stat-num">${fmtPlays(stats.monthly)}</span><span class="artist-stat-label">За этот месяц</span></div>
        <div class="artist-stat-block"><span class="artist-stat-num">${stats.tracks}</span><span class="artist-stat-label">Треков</span></div>
        <div class="artist-stat-block"><span class="artist-stat-num">${fmtPlays(stats.subscribers)}</span><span class="artist-stat-label">Подписчиков</span></div>
      </div>
      <button class="sub-btn ${isSubscribed?"subscribed":"not-subscribed"}" id="subBtn">
        ${isSubscribed?`${S.check} Подписан`:`${S.star} Подписаться`}
      </button>
    </div>
  </div>`);

  pageCard.querySelector("#subBtn").onclick=async()=>{
    const prev={...db, artists: db.artists.map(x=>x.id===artist.id?{...x,subscriberIds:[...(x.subscriberIds||[])]}:x)};
    if(!artist.subscriberIds) artist.subscriberIds=[];
    let nowSubbed;
    if(isSubscribed){
      artist.subscriberIds=artist.subscriberIds.filter(id=>id!==user.id);
      nowSubbed=false;
    } else {
      artist.subscriberIds.push(user.id);
      nowSubbed=true;
    }
    /* Раньше saveDB(db) вызывался без проверки результата — при ошибке
       сохранения подписка на артиста тихо терялась после перезагрузки. */
    await persistDB(prev,{
      successMsg:nowSubbed?"Вы подписались! 🎤":"Вы отписались",
      failMsg:nowSubbed?"Не удалось подписаться":"Не удалось отписаться"
    });
  };
  frag.appendChild(pageCard);

  /* Список треков */
  const tracksCard=h(`<div class="card" style="padding:20px;"></div>`);
  const artistTracks=(artist.trackIds||[]).map(tid=>db.tracks.find(t=>t.id===tid)).filter(Boolean);

  if(!artistTracks.length){
    tracksCard.appendChild(h(`<div class="empty" style="padding:40px 20px;"><div class="icon-circle">${S.music}</div><h3>Треков пока нет</h3><p>Администратор ещё не назначил треки этому исполнителю</p></div>`));
    frag.appendChild(tracksCard);
    return frag;
  }

  /* Заголовок + сортировка */
  const tracksHeader=h(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
    <div style="font-weight:800;font-size:17px;">Треки</div>
    <div class="tracks-sort-bar">
      <button class="sort-btn active" data-sort="date">По дате</button>
      <button class="sort-btn" data-sort="plays">По популярности</button>
    </div>
  </div>`);
  tracksCard.appendChild(tracksHeader);

  let currentSort="date";
  const trackListWrap=h(`<div id="tlistwrap"></div>`);
  tracksCard.appendChild(trackListWrap);

  /* Воспроизведение идёт через глобальный плеер (закреплённая нижняя панель),
     поэтому музыка не останавливается при переходе на другую страницу. */
  function sortedTracks(){
    let sorted=[...artistTracks];
    if(currentSort==="plays") sorted.sort((a,b)=>(b.plays||0)-(a.plays||0));
    else sorted.sort((a,b)=>b.createdAt-a.createdAt);
    return sorted;
  }

  function buildTrackList(){
    trackListWrap.innerHTML="";
    const sorted=sortedTracks();
    const queueIds=sorted.filter(x=>x.dataUrl).map(x=>x.id);

    sorted.forEach((t,idx)=>{
      const mk2=currentMonthKey();
      const monthPlays=t.monthlyPlays&&t.monthlyPlays[mk2]?t.monthlyPlays[mk2]:0;
      const isPlaying=gpIsPlayingId(t.id);
      const liked=isLiked(user,t.id);
      const row=h(`<div class="track-list-item" data-tid="${t.id}">
        <span class="track-num">${idx+1}</span>
        ${t.coverUrl?`<img class="track-cover" src="${esc(t.coverUrl)}">`:""}
        <button class="track-play-btn" title="${isPlaying?"Пауза":"Играть"}">
          ${isPlaying?S.pause:S.play}
        </button>
        <div class="track-info">
          <div class="track-title-text">${esc(t.title)}</div>
          <div class="track-meta-text">${t.artist?esc(t.artist):""}${t.artist&&t.plays?" · ":""}${t.plays?`${fmtPlays(t.plays)} прослушиваний`:""}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
          <div class="track-plays-count">${S.headphone} ${monthPlays?`${fmtPlays(monthPlays)} за мес.`:""}</div>
          <button class="like-btn ${liked?"liked":""}" data-lid="${t.id}" title="${liked?"Убрать лайк":"Лайкнуть"}">${liked?S.heartFill:S.heartOutline}</button>
          <button class="add-to-playlist-btn" data-pid="${t.id}" title="В плейлист">${S.plus}</button>
        </div>
      </div>`);

      row.querySelector(".track-play-btn").onclick=e=>{ e.stopPropagation(); gpPlayQueue(queueIds,t.id); };
      row.querySelector("[data-lid]").onclick=e=>{ e.stopPropagation(); toggleLike(user,t.id); buildTrackList(); };
      row.querySelector("[data-pid]").onclick=e=>{ e.stopPropagation(); openAddToPlaylistModal(user,t.id); };
      row.onclick=e=>{ if(e.target.closest(".like-btn,.add-to-playlist-btn,.track-play-btn")) return; gpPlayQueue(queueIds,t.id); };
      trackListWrap.appendChild(row);
    });
  }

  /* Пока эта страница открыта — держим кнопки play/pause и счётчик
     синхронизированными с состоянием глобального плеера. */
  gpSubscribe(buildTrackList);

  /* Обработчики кнопок сортировки */
  tracksHeader.querySelectorAll(".sort-btn").forEach(btn=>{
    btn.onclick=()=>{
      tracksHeader.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      currentSort=btn.dataset.sort;
      buildTrackList();
    };
  });

  buildTrackList();
  frag.appendChild(tracksCard);
  return frag;
}

/* ══ АЛЬБОМ ══ */
function renderAlbumPage(user, albumId){
  const album=db.albums.find(a=>a.id===albumId);
  const frag=h(`<div></div>`);
  if(!album){
    frag.appendChild(h(`<div class="empty"><div class="icon-circle">💿</div><h3>Альбом не найден</h3></div>`));
    return frag;
  }
  const canEdit=isAdmin(user)||album.creatorId===user.id;
  const linkedArtist=album.artistId?db.artists.find(a=>a.id===album.artistId):null;
  const albumTracks=(album.trackIds||[]).map(tid=>db.tracks.find(t=>t.id===tid)).filter(Boolean);

  const headCard=h(`<div class="card artist-page-card" style="padding:0;">
    <div class="artist-page-card-inner">
      <div class="artist-hero" style="background:linear-gradient(135deg,var(--primary),#7aa2ff);">${album.coverUrl?`<img src="${esc(album.coverUrl)}">`:""}</div>
      <div class="artist-page-info">
        <div class="artist-page-avatar-wrap"><div class="avatar artist-page-avatar">${album.coverUrl?`<img src="${esc(album.coverUrl)}">`:"💿"}</div></div>
        <div class="artist-page-name">${esc(album.title)}</div>
        ${linkedArtist?`<div style="color:var(--muted);font-size:14px;margin-bottom:10px;">${esc(linkedArtist.name)}</div>`:""}
        <div class="artist-stats-row"><span><b>${albumTracks.length}</b> треков</span><span>Создан ${timeAgo(album.createdAt)}</span></div>
        ${canEdit?`<div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input id="alcover" placeholder="Ссылка на обложку..." value="${esc(album.coverUrl||"")}" style="max-width:260px;"/>
          <button class="btn btn-outline btn-sm" id="alcoversave">Сохранить обложку</button>
          <button class="btn btn-danger-outline btn-sm" id="aldel">${S.trash} Удалить альбом</button>
        </div>`:""}
      </div>
    </div>
  </div>`);
  if(canEdit){
    headCard.querySelector("#alcoversave").onclick=()=>{
      album.coverUrl=headCard.querySelector("#alcover").value.trim()||null;
      saveDB(db); toast("Обложка обновлена"); render();
    };
    headCard.querySelector("#aldel").onclick=()=>{
      if(!confirm("Удалить этот альбом? Треки останутся, удалится только альбом.")) return;
      removeEntity("albums",album.id); saveDB(db); toast("Альбом удалён"); nav("music",{tab:"albums"});
    };
  }
  frag.appendChild(headCard);

  const tracksCard=h(`<div class="card" style="padding:8px;"></div>`);
  if(!albumTracks.length) tracksCard.appendChild(h(`<div class="empty"><div class="icon-circle">${S.music}</div><h3>В альбоме пока нет треков</h3><p>Добавьте треки кнопкой 💿 рядом с треком в разделе «Треки»</p></div>`));
  else { const qIds=albumTracks.filter(x=>x.dataUrl).map(x=>x.id); albumTracks.forEach(t=>tracksCard.appendChild(makeTrackRow(t,user,{queueIds:qIds}))); }
  frag.appendChild(tracksCard);
  return frag;
}

/* ══ PROFILE ══ */
function renderProfile(viewer,userId){
  const target=findUser(userId)||viewer, isMe=target.id===viewer.id;
  const isFriend=friendIdsOf(viewer.id).has(target.id);
  const rel=!isMe?friendStatusBetween(viewer.id,target.id):null;
  /* Профиль закрыт если: isPrivate + не я + не друг */
  const isBlocked=!isMe && !isFriend && target.isPrivate && !isAdmin(viewer);
  /* Если заявка ещё не принята — тоже ограничиваем */
  const isPending=rel&&rel.status==="pending"&&rel.fromId===viewer.id;

  const frag=h(`<div></div>`);
  const privBadge=target.isPrivate&&isMe?`<span class="privacy-badge private">${S.lock} Закрытый</span>`:"";
  const card=h(`<div class="card profile-card">
    <div class="profile-cover"></div>
    <div class="profile-info">
      <div class="avatar profile-avatar">${target.avatarUrl?`<img src="${esc(target.avatarUrl)}">`:esc(getInitials(target.displayName))}</div>
      <h2 class="profile-name">${esc(target.displayName)}${verifiedBadge(target)}${premiumBadge(target)} ${roleBadge(target.role)} ${privBadge}</h2>
      <div class="profile-username">@${esc(target.username)}${target.idTag?` <span style="color:var(--muted);font-size:12px;">ID: ${esc(target.idTag)}</span>`:""}</div>
      ${!isMe?`<div style="margin-top:4px;">${onlineStatusHTML(viewer,target)}</div>`:""}
      ${!isBlocked?`<p class="profile-bio">${target.bio?esc(target.bio):`<span style="color:var(--muted)">Пока нет описания.</span>`}</p>`:""}
      ${!isBlocked?`<div class="profile-stats"><span><b>${db.posts.filter(p=>p.authorId===target.id).length}</b> постов</span><span><b>${friendIdsOf(target.id).size}</b> друзей</span></div>`:""}
      ${!isBlocked?`<div id="soclinks"></div>`:""}
      <div id="pa"></div>
    </div>
  </div>`);
  const socWrap=card.querySelector("#soclinks");
  if(socWrap && target.socialLinks){
    const filled=SOCIAL_PLATFORMS.filter(([key])=>target.socialLinks[key]);
    if(filled.length){
      const row=h(`<div class="social-links-row"></div>`);
      filled.forEach(([key,label,path])=>{
        const url=target.socialLinks[key];
        const href=/^https?:\/\//i.test(url)?url:"https://"+url;
        const a=h(`<a class="social-link-badge" href="${esc(href)}" target="_blank" rel="noopener noreferrer"><span class="sl-ic"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="${path}"/></svg></span>${label}</a>`);
        row.appendChild(a);
      });
      socWrap.appendChild(row);
    }
  }
  const pa=card.querySelector("#pa");
  if(isMe){
    const b=h(`<button class="btn btn-outline">Редактировать</button>`); b.onclick=()=>nav("settings"); pa.appendChild(b);
  } else {
    let btn;
    if(!rel) btn=h(`<button class="btn btn-primary">Добавить в друзья</button>`);
    else if(rel.status==="accepted") btn=h(`<button class="btn btn-outline" disabled>✓ Друзья</button>`);
    else if(rel.status==="pending"&&rel.fromId===viewer.id) btn=h(`<button class="btn btn-outline" disabled>⏳ Заявка отправлена</button>`);
    else btn=h(`<button class="btn btn-primary">Принять заявку</button>`);
    btn.onclick=()=>{
      if(!rel){ db.friendRequests.push({id:nid(),fromId:viewer.id,toId:target.id,status:"pending",createdAt:Date.now()}); saveDB(db); toast("Запрос отправлен ✓"); btn.textContent="⏳ Заявка отправлена"; btn.disabled=true; btn.className="btn btn-outline"; }
      else if(rel.status==="pending"&&rel.toId===viewer.id){ rel.status="accepted"; saveDB(db); toast("Принято ✓"); btn.textContent="✓ Друзья"; btn.disabled=true; btn.className="btn btn-outline"; }
    };
    pa.appendChild(btn);
    if(isFriend){
      const mb=h(`<button class="btn btn-outline" style="margin-left:8px;">Написать</button>`); mb.onclick=()=>{ openConvWith(viewer.id,target.id); nav("messages",{userId:target.id}); }; pa.appendChild(mb);
    }
    if(canCall(viewer.id,target)){
      const cb=h(`<button class="call-start-btn" style="margin-left:8px;" title="Позвонить">${S.phone}</button>`); cb.onclick=()=>startOutgoingCall(target.id); pa.appendChild(cb);
    }
  }
  frag.appendChild(card);

  if(isBlocked || isPending){
    frag.appendChild(h(`<div class="private-wall">
      <div class="icon-circle">${S.lock}</div>
      <h3>Профиль закрыт</h3>
      <p>${isPending?"Ваша заявка ещё не принята. Подождите, пока пользователь подтвердит её.":"Этот профиль закрытый. Добавьте пользователя в друзья, чтобы видеть его содержимое."}</p>
    </div>`));
    return frag;
  }

  const pc=h(`<div class="card"></div>`);
  const posts=db.posts.filter(p=>p.authorId===target.id).sort((a,b)=>b.createdAt-a.createdAt);
  if(!posts.length) pc.appendChild(h(`<div class="empty"><div class="icon-circle">📝</div><h3>Пока нет постов</h3></div>`));
  else posts.forEach(p=>pc.appendChild(makePostCard(p,viewer)));
  frag.appendChild(pc);
  return frag;
}

/* ══ MESSAGES ══ */
function openConvWith(meId,otherId){ let c=db.conversations.find(c=>c.participants.includes(meId)&&c.participants.includes(otherId)); if(!c){ c={id:nid(),participants:[meId,otherId],createdAt:Date.now()}; db.conversations.push(c); saveDB(db); } return c; }
function renderMessages(user){
  const wrap=h(`<div class="msg-shell"></div>`);
  const cl=h(`<div class="conv-list"></div>`), tv=h(`<div class="thread-view"></div>`);
  wrap.appendChild(cl); wrap.appendChild(tv);
  const myC=db.conversations.filter(c=>c.participants.includes(user.id));
  function lastMsg(cid){ const m=db.messages.filter(m=>m.conversationId===cid); return m.length?m[m.length-1]:null; }
  myC.sort((a,b)=>{ const la=lastMsg(a.id),lb=lastMsg(b.id); return(lb?lb.createdAt:b.createdAt)-(la?la.createdAt:a.createdAt); });
  let activeOid=route.params.userId||(route.params.noAutoSelect?null:(myC[0]?myC[0].participants.find(id=>id!==user.id):null));
  if(!myC.length) cl.appendChild(h(`<div style="padding:20px;color:var(--muted);font-size:13px;text-align:center;">Нет диалогов.</div>`));
  myC.forEach(c=>{ const oid=c.participants.find(id=>id!==user.id),other=findUser(oid); if(!other) return;
    const last=lastMsg(c.id);
    function msgPreview(m){
      if(!m) return "Начните переписку";
      if(m.type==="call") return m.callStatus==="completed"?"📞 Звонок":"📞 Пропущенный";
      if(m.type==="voice") return "🎙 Голосовое сообщение";
      if(m.isForwarded) return "🔁 Пересланное сообщение";
      return m.content||"📎 Вложение";
    }
    const item=h(`<div class="conv-item ${oid===activeOid?"active":""}" data-cid="${c.id}"><div class="avatar">${other.avatarUrl?`<img src="${esc(other.avatarUrl)}">`:esc(getInitials(other.displayName))}</div><div class="conv-meta"><div class="conv-name">${esc(other.displayName)}${premiumBadge(other)}</div><div class="conv-last">${esc(msgPreview(last))}</div><div>${onlineStatusHTML(user,other)}</div></div></div>`);
    item.onclick=()=>{ activeOid=oid; nav("messages",{userId:oid}); }; cl.appendChild(item);
  });
  if(activeOid) wrap.classList.add("chat-open");
  if(!activeOid){ tv.appendChild(h(`<div class="thread-empty">Выберите диалог</div>`)); return wrap; }
  const other=findUser(activeOid);
  let conv=db.conversations.find(c=>c.participants.includes(user.id)&&c.participants.includes(activeOid));
  if(!conv) conv=openConvWith(user.id,activeOid);
  const threadHead=h(`<div class="thread-head"><button class="thread-back-btn" title="Назад к списку">←</button><div class="avatar" style="width:38px;height:38px;font-size:14px;">${other.avatarUrl?`<img src="${esc(other.avatarUrl)}">`:esc(getInitials(other.displayName))}</div><div style="flex:1;"><div style="font-weight:700;font-size:14.5px;">${esc(other.displayName)}${verifiedBadge(other)}${premiumBadge(other)}</div><div style="color:var(--muted);font-size:12.5px;">${onlineStatusHTML(user,other)}</div></div>${canCall(user.id,other)?`<button class="call-start-btn" id="threadCallBtn" title="Позвонить">${S.phone}</button>`:""}</div>`);
  threadHead.querySelector(".thread-back-btn").onclick=()=>nav("messages",{noAutoSelect:true});
  const threadCallBtnEl=threadHead.querySelector("#threadCallBtn"); if(threadCallBtnEl) threadCallBtnEl.onclick=()=>startOutgoingCall(other.id);
  tv.appendChild(threadHead);
  const mb=h(`<div class="thread-messages"></div>`);
  const msgs=db.messages.filter(m=>m.conversationId===conv.id).sort((a,b)=>a.createdAt-b.createdAt);
  if(!msgs.length) mb.appendChild(h(`<div style="color:var(--muted);text-align:center;margin:auto;font-size:13px;">Нет сообщений.</div>`));
  else msgs.forEach(m=>{
    const mine=m.senderId===user.id;
    const time=new Date(m.createdAt).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
    if(m.type==="call"){
      const label=callHistoryLabel(m,mine);
      mb.appendChild(h(`<div class="bubble call-bubble ${mine?"mine":"theirs"}">${S.phone} ${esc(label)}<span class="bubble-time">${time}</span></div>`));
      return;
    }
    /* Голосовое сообщение */
    if(m.type==="voice"){
      const vrow=document.createElement("div");
      vrow.className="msg-bubble-row "+(mine?"own":"");
      const vbub=document.createElement("div");
      vbub.className="bubble "+(mine?"mine":"theirs");
      vbub.appendChild(renderVoiceMessage(m));
      vbub.appendChild(h(`<span class="bubble-time">${time}</span>`));
      vrow.appendChild(vbub);
      mb.appendChild(vrow);
      return;
    }
    /* Пузырь сообщения (обычный или пересланный) */
    const bubble=h(`<div class="bubble ${mine?"mine":"theirs"}"></div>`);
    if(m.isForwarded&&m.forwardedFrom){
      const fd=m.forwardedFrom;
      const srcUser=fd.type==="user"?findUser(fd.id):null;
      const srcCh=fd.type==="channel"?findChannel(fd.id):null;
      const ava=(fd.avatarUrl||srcUser?.avatarUrl||srcCh?.avatarUrl)||null;
      const name=fd.name||(srcUser?srcUser.displayName:null)||(srcCh?srcCh.title:null)||"Удалённый аккаунт";
      const iniStr=name.trim().split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";
      const avaHtml=ava?`<img src="${esc(ava)}">`:`<span>${esc(iniStr)}</span>`;
      const fwdBlock=h(`<div class="fwd-from-block">
        <div class="fwd-from-header"><div class="fwd-from-ava">${avaHtml}</div><span class="fwd-from-label">Переслано от: ${esc(name)}</span></div>
        ${fd.originalText?`<div class="fwd-from-text">${esc(fd.originalText.slice(0,200))}${fd.originalText.length>200?"…":""}</div>`:""}
      </div>`);
      fwdBlock.onclick=(e)=>{
        e.stopPropagation();
        if(fd.type==="user") nav("profile",{userId:fd.id});
        else if(fd.type==="channel") nav("channelPage",{channelId:fd.id});
      };
      bubble.appendChild(fwdBlock);
    }
    if(m.content){
      const txt=document.createElement("span");
      txt.textContent=m.content;
      bubble.appendChild(txt);
    }
    const timeEl=h(`<span class="bubble-time">${time}</span>`);
    bubble.appendChild(timeEl);
    mb.appendChild(bubble);
  });
  tv.appendChild(mb);
  const ir=h(`<div class="thread-input"><button class="mic-btn" id="micBtn" title="Голосовое сообщение"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></button><input placeholder="Написать сообщение..." id="mi"/><button class="btn btn-primary btn-icon" id="sendBtn">${S.send}</button></div>`);
  function send(){ 
    const inp=ir.querySelector("#mi"),val=inp.value.trim(); if(!val) return;
    const msg={id:nid(),conversationId:conv.id,senderId:user.id,content:val,type:'text',createdAt:Date.now()};
    db.messages.push(msg);
    saveDB(db); inp.value="";
    /* Добавляем пузырь в DOM без полного перерендера */
    const isMine=true;
    const time=new Date(msg.createdAt).toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
    const newMb=h(`<div class="msg-bubble-row own"></div>`);
    const newBubble=h(`<div class="bubble mine"></div>`);
    const txtEl=document.createElement("span"); txtEl.textContent=msg.content;
    newBubble.appendChild(txtEl);
    newBubble.appendChild(h(`<span class="bubble-time">${time}</span>`));
    newMb.appendChild(newBubble);
    mb.appendChild(newMb);
    mb.scrollTop=mb.scrollHeight;
    /* Обновляем превью в списке диалогов */
    const convPreviewEl=document.querySelector(`.conv-item[data-cid="${conv.id}"] .conv-last`);
    if(convPreviewEl) convPreviewEl.textContent=val;
  }
  
  /* ── Голосовые сообщения ── */
  let mediaRec=null, audioChunks=[], recStart=0, recTimer=null;
  const micBtn=ir.querySelector("#micBtn");
  const sendBtnEl=ir.querySelector("#sendBtn");
  sendBtnEl.onclick=send;

  function stopRecording(cancel){
    if(!mediaRec) return;
    const recMime=mediaRec.mimeType||"audio/webm"; /* реальный MIME-тип записи */
    mediaRec.onstop=()=>{
      if(cancel||!audioChunks.length){ audioChunks=[]; return; }
      const blob=new Blob(audioChunks,{type:recMime});
      const dur=Math.max(0.5,(Date.now()-recStart)/1000);
      const peaks=Array.from({length:18},()=>Math.random());
      const reader=new FileReader();
      reader.onerror=()=>toast("Ошибка при сохранении аудио");
      reader.onload=ev=>{
        const voiceData=ev.target.result;
        if(!voiceData||voiceData.length<100){ toast("Запись слишком короткая, попробуйте ещё раз"); return; }
        const msg={id:nid(),conversationId:conv.id,senderId:user.id,content:"",type:"voice",voiceData,voiceMeta:{duration:dur,peaks},createdAt:Date.now()};
        db.messages.push(msg);
        saveDB(db);
        /* Добавляем в DOM в той же структуре, что и при загрузке треда */
        const time=new Date(msg.createdAt).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
        const vrow=document.createElement("div");
        vrow.className="msg-bubble-row own";
        const vbub=document.createElement("div");
        vbub.className="bubble mine";
        vbub.appendChild(renderVoiceMessage(msg));
        vbub.appendChild(h(`<span class="bubble-time">${time}</span>`));
        vrow.appendChild(vbub);
        mb.appendChild(vrow);
        mb.scrollTop=mb.scrollHeight;
        /* обновляем превью диалога */
        const convPrev=document.querySelector(`.conv-item[data-cid="${conv.id}"] .conv-last`);
        if(convPrev) convPrev.textContent="🎙 Голосовое сообщение";
      };
      reader.readAsDataURL(blob);
      audioChunks=[];
    };
    mediaRec.stop();
    mediaRec.stream.getTracks().forEach(t=>t.stop());
    mediaRec=null;
    micBtn.classList.remove("recording");
    micBtn.title="Голосовое сообщение";
    clearInterval(recTimer);
  }

  /* ── Запись голосового: удержание (мобильные) или клик (ПК) ── */
  let recMode=null; /* "hold" | "toggle" */
  let holdThreshold=null;

  micBtn.onpointerdown=async(e)=>{
    if(mediaRec){ /* уже записываем — стоп+отправить */
      stopRecording(false);
      return;
    }
    e.preventDefault();
    holdThreshold=Date.now();

    let stream;
    try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(err){ toast("Нет доступа к микрофону. Разрешите его в настройках браузера."); return; }

    if(mediaRec){ /* пока ждали, пользователь снова нажал */
      stream.getTracks().forEach(t=>t.stop()); return;
    }

    /* выбираем наилучший поддерживаемый формат */
    const mimeTypes=["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/mp4",""];
    const mimeType=mimeTypes.find(m=>!m||MediaRecorder.isTypeSupported(m))||"";
    mediaRec=new MediaRecorder(stream,mimeType?{mimeType}:{});
    audioChunks=[];
    mediaRec.ondataavailable=e2=>{ if(e2.data&&e2.data.size>0) audioChunks.push(e2.data); };
    mediaRec.start(100);
    recStart=Date.now();
    micBtn.classList.add("recording");
    micBtn.title="Нажмите ещё раз чтобы отправить";

    let sec=0;
    recTimer=setInterval(()=>{
      sec++;
      const mm=Math.floor(sec/60),ss=sec%60;
      const inp=ir.querySelector("#mi");
      if(inp) inp.placeholder="🎙 "+mm+":"+(ss<10?"0":"")+ss;
    },1000);

    /* Удержание — для мобильных: если поднять палец быстро (<500ms) — отменяем;
       если держать дольше — при pointerup отправляем */
    const onUp=()=>{
      const held=Date.now()-holdThreshold;
      const inp=ir.querySelector("#mi");
      if(inp) inp.placeholder="Написать сообщение...";
      document.removeEventListener("pointerup",onUp);
      document.removeEventListener("pointercancel",onCancel);
      if(held<300){
        /* Короткое касание — переходим в toggle-режим, не останавливаем запись */
        recMode="toggle";
        micBtn.title="Нажмите чтобы остановить и отправить";
      } else {
        recMode=null;
        stopRecording(false);
      }
    };
    const onCancel=()=>{
      const inp=ir.querySelector("#mi");
      if(inp) inp.placeholder="Написать сообщение...";
      document.removeEventListener("pointerup",onUp);
      document.removeEventListener("pointercancel",onCancel);
      recMode=null;
      stopRecording(true);
    };
    document.addEventListener("pointerup",onUp);
    document.addEventListener("pointercancel",onCancel);
  };

  micBtn.onclick=(e)=>{
    /* click срабатывает после pointerdown+pointerup. В toggle-режиме — останавливаем запись. */
    if(recMode==="toggle"){
      e.stopPropagation();
      recMode=null;
      const inp=ir.querySelector("#mi");
      if(inp) inp.placeholder="Написать сообщение...";
      stopRecording(false);
    }
  };

  ir.querySelector("#mi").addEventListener("keydown",e=>{ if(e.key==="Enter") send(); });
  tv.appendChild(ir); setTimeout(()=>{ mb.scrollTop=mb.scrollHeight; },0);
  return wrap;
}

      <input data-soc="${key}" placeholder="https://..." value="${esc(user.socialLinks[key]||"")}"/>
    </div>`);
    socForm.appendChild(field);
  });
  soc.querySelector("#socsave").onclick=()=>{
    if(!user.socialLinks) user.socialLinks={};
    SOCIAL_PLATFORMS.forEach(([key])=>{
      user.socialLinks[key]=soc.querySelector(`[data-soc="${key}"]`).value.trim();
    });
    user.updatedAt=Date.now();
    saveDB(db); toast("Ссылки сохранены ✓");
  };
  frag.appendChild(soc);

  /* ── Конфиденциальность ── */
  const priv=h(`<div class="card" style="padding:22px;margin-bottom:20px;">
    <h3 style="margin-top:0;">🔒 Конфиденциальность</h3>
    <div class="toggle-row">
      <div>
        <div style="font-weight:600;font-size:14.5px;">Закрытый профиль</div>
        <div style="color:var(--muted);font-size:13px;margin-top:2px;">Только друзья видят ваши посты и описание. Остальные могут лишь отправить заявку в друзья.</div>
      </div>
      <div class="sw-toggle ${user.isPrivate?"on":""}" id="privtoggle"><div class="knob"></div></div>
    </div>
  </div>`);
  priv.querySelector("#privtoggle").onclick=(e)=>{
    user.isPrivate=!user.isPrivate;
    user.updatedAt=Date.now();
    saveDB(db); toast(user.isPrivate?"Профиль закрыт 🔒":"Профиль открыт");
    e.currentTarget.classList.toggle("on", user.isPrivate);
  };
  frag.appendChild(priv);

  /* ── Кто может звонить мне ── */
  const CALL_PRIV_OPTS=[["all","Все пользователи"],["friends","Только друзья"],["none","Никто"]];
  const callPriv=h(`<div class="card" style="padding:22px;margin-bottom:20px;">
    <h3 style="margin-top:0;">📞 Звонки</h3>
    <div style="font-weight:600;font-size:14.5px;margin-bottom:6px;">Кто может звонить мне</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;">Ограничьте, кто может начинать с вами аудиозвонок.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;" id="callprivopts">
      ${CALL_PRIV_OPTS.map(([v,label])=>`<button class="btn ${((user.callPrivacy||"all")===v)?"btn-primary":"btn-outline"} btn-sm" data-callpriv="${v}">${label}</button>`).join("")}
    </div>
  </div>`);
  callPriv.querySelectorAll("[data-callpriv]").forEach(btn=>{
    btn.onclick=()=>{
      user.callPrivacy=btn.dataset.callpriv;
      user.updatedAt=Date.now();
      saveDB(db); toast("Настройка звонков сохранена ✓");
      /* Обновляем активную кнопку без перерендера */
      callPriv.querySelectorAll("[data-callpriv]").forEach(b=>{ b.className=`btn btn-sm ${b.dataset.callpriv===user.callPrivacy?"btn-primary":"btn-outline"}`; });
    };
  });
  frag.appendChild(callPriv);

  const tc=h(`<div class="card" style="padding:22px;margin-bottom:20px;"><h3 style="margin-top:0;">Оформление</h3><div class="toggle-row"><span>Тёмная тема</span><div class="sw-toggle ${localStorage.getItem("leimchat_theme")==="dark"?"on":""}" id="ts"><div class="knob"></div></div></div></div>`);
  tc.querySelector("#ts").onclick=()=>{ toggleTheme(); render(); };
  frag.appendChild(tc);
  const dc=h(`<div class="card" style="padding:22px;"><h3 style="margin-top:0;color:var(--danger);">Аккаунт</h3><button class="btn btn-danger-outline" id="lo">Выйти</button></div>`);
  dc.querySelector("#lo").onclick=()=>{ user.online=false; user.lastSeenAt=Date.now(); saveDB(db); clearSession(); nav("landing"); };
  frag.appendChild(dc);
  
  /* Приватность онлайн-статуса */
  try{
    const privRow=h('<div style="padding:16px 0;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px;"><div><b>Кто видит мой онлайн-статус</b><div style="color:var(--muted);font-size:13px;margin-top:2px;">Кто может видеть, когда вы в сети</div></div><select id="lcPrivSel" style="padding:8px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--fg);font-size:14px;cursor:pointer;max-width:260px;"><option value="all">Все пользователи</option><option value="friends">Только друзья</option><option value="nobody">Никто</option></select></div>');
    const sel=privRow.querySelector('#lcPrivSel'); sel.value=user.onlinePrivacy||'all';
    sel.onchange=e=>{ user.onlinePrivacy=e.target.value; if(typeof saveDB==='function') saveDB(db); if(typeof toast==='function') toast('Настройки сохранены'); };
    const wrap=arguments[0]; if(wrap&&wrap.appendChild) wrap.appendChild(privRow);
  }catch(privErr){}

  return frag;
}
/* ══════════════════════════════════════════════════════
   ADMIN PANEL — с разделом управления исполнителями
   ══════════════════════════════════════════════════════ */
function renderAdmin(user){
  const frag=h(`<div></div>`);
  frag.appendChild(h(`<h1 class="section-title">${S.admin} Админ-панель</h1>`));

  /* Статистика — считаем только уникальные аккаунты (по id, который у каждого
     аккаунта один на всё время его жизни; на всякий случай подстраховываемся
     и от случайных повторов по имени пользователя) */
  const uniqueUserCount=new Set(db.users.map(u=>u.username.toLowerCase())).size;
  frag.appendChild(h(`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;margin-bottom:24px;">
    <div class="card" style="padding:16px;"><div style="font-size:24px;font-weight:800;">${uniqueUserCount}</div><div style="color:var(--muted);font-size:13px;">Пользователей</div></div>
    <div class="card" style="padding:16px;"><div style="font-size:24px;font-weight:800;">${db.posts.length}</div><div style="color:var(--muted);font-size:13px;">Постов</div></div>
    <div class="card" style="padding:16px;"><div style="font-size:24px;font-weight:800;">${db.channels.length}</div><div style="color:var(--muted);font-size:13px;">Каналов</div></div>
    <div class="card" style="padding:16px;"><div style="font-size:24px;font-weight:800;">${db.artists.length}</div><div style="color:var(--muted);font-size:13px;">Исполнителей</div></div>
    <div class="card" style="padding:16px;"><div style="font-size:24px;font-weight:800;">${db.tracks.length}</div><div style="color:var(--muted);font-size:13px;">Треков</div></div>
  </div>`));

  /* ── Резервная копия ── */
  const bk=h(`<div class="card" style="padding:22px;margin-bottom:24px;">
    <div class="admin-section-title">🗄️ Резервная копия данных</div>
    <div class="backup-block">
      <h4>Все данные сайта</h4>
      <p>Сохраните аккаунты, посты, комментарии и переписки в файл. Восстановите из него при смене браузера.</p>
      <div class="backup-btns">
        <button class="bkbtn" id="expBtn">${S.download} Скачать резервную копию</button>
        <label class="bkbtn" style="cursor:pointer;">${S.upload} Восстановить из файла<input type="file" accept=".json" id="impFile" style="display:none;"/></label>
      </div>
    </div>
  </div>`);
  bk.querySelector("#expBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="leimchat_backup_"+new Date().toISOString().slice(0,10)+".json"; a.click();
    toast("Резервная копия скачана ✓");
  };
  bk.querySelector("#impFile").onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ try{ const imp=JSON.parse(ev.target.result); if(!imp.users||!imp.posts) throw 0; saveDB(normalizeDB(imp)); toast("Данные восстановлены! Перезагружаю..."); setTimeout(()=>location.reload(),1000); }catch{ toast("Ошибка: неверный формат файла"); } };
    reader.readAsText(file);
  };
  frag.appendChild(bk);

  /* ══════════════════════════════════════════════════════
     УПРАВЛЕНИЕ ИСПОЛНИТЕЛЯМИ
     ══════════════════════════════════════════════════════ */
  const artistsCard=h(`<div class="card" style="padding:18px;margin-bottom:24px;"></div>`);
  artistsCard.appendChild(h(`<div class="admin-section-title">🎤 Исполнители</div>`));

  /* Кнопка создания */
  const createBtn=h(`<button class="btn btn-primary btn-sm" style="margin-bottom:16px;" id="createArtistBtn">+ Добавить исполнителя</button>`);
  artistsCard.appendChild(createBtn);

  /* Список исполнителей */
  const artistList=h(`<div id="adminArtistList"></div>`);
  artistsCard.appendChild(artistList);

  function refreshArtistList(){
    artistList.innerHTML="";
    if(!db.artists.length){
      artistList.appendChild(h(`<div style="color:var(--muted);font-size:13px;padding:10px 0;">Исполнителей нет. Нажмите «+ Добавить исполнителя».</div>`));
      return;
    }
    const tbl=h(`<div style="overflow-x:auto;"><table class="admin-table"><thead><tr><th>Исполнитель</th><th>Треков</th><th>Прослушиваний</th><th>Подписчиков</th><th style="text-align:right;">Действия</th></tr></thead><tbody></tbody></table></div>`);
    const tbody=tbl.querySelector("tbody");
    db.artists.forEach(a=>{
      const stats=artistStats(a);
      const row=h(`<tr>
        <td><div style="display:flex;align-items:center;gap:10px;">
          <div class="avatar" style="width:36px;height:36px;font-size:13px;flex-shrink:0;">
            ${a.avatarUrl?`<img src="${esc(a.avatarUrl)}">`:esc(getInitials(a.name)||"?")}
          </div>
          <div>
            <div style="font-weight:700;">${esc(a.name)}</div>
            <div style="color:var(--muted);font-size:12px;">${a.bio?esc(a.bio.slice(0,40))+(a.bio.length>40?"…":""):"Без описания"}</div>
          </div>
        </div></td>
        <td>${stats.tracks}</td>
        <td>${fmtPlays(stats.total)}</td>
        <td>${fmtPlays(stats.subscribers)}</td>
        <td style="text-align:right;"><div style="display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;">
          <button class="btn btn-sm btn-outline" data-view="${a.id}">Открыть</button>
          <button class="btn btn-sm btn-outline" data-edit="${a.id}">Изменить</button>
          <button class="btn btn-sm" style="background:var(--accent);color:var(--primary);font-size:13px;" data-tracks="${a.id}">Треки</button>
          <button class="btn btn-sm btn-danger-outline" data-del="${a.id}">Удалить</button>
        </div></td>
      </tr>`);
      row.querySelector("[data-view]").onclick=()=>nav("artist",{artistId:a.id});
      row.querySelector("[data-edit]").onclick=()=>openArtistModal(a);
      row.querySelector("[data-tracks]").onclick=()=>openAssignModal(a);
      row.querySelector("[data-del]").onclick=()=>{
        if(!confirm(`Удалить исполнителя «${a.name}»?`)) return;
        removeEntity("artists",a.id);
        saveDB(db); refreshArtistList(); toast("Исполнитель удалён");
      };
      tbody.appendChild(row);
    });
    artistList.appendChild(tbl);
  }

  /* ── Модальное окно создания/редактирования исполнителя ── */
  function openArtistModal(existing){
    const isEdit=!!existing;
    const overlay=h(`<div class="modal-overlay"></div>`);
    const box=h(`<div class="modal-box">
      <h3>${isEdit?"Редактировать":"Создать"} исполнителя</h3>
      <div class="field"><label>Имя / Псевдоним *</label><input id="aname" placeholder="Имя исполнителя" value="${isEdit?esc(existing.name):""}"/></div>
      <div class="field"><label>Описание / Биография</label><textarea id="abio" style="min-height:90px;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:var(--bg);color:var(--fg);width:100%;font-family:inherit;font-size:14px;" placeholder="Расскажите об исполнителе...">${isEdit?esc(existing.bio||""):""}</textarea></div>
      <div class="field"><label>URL аватарки</label><input id="aavatar" placeholder="https://example.com/photo.jpg" value="${isEdit?esc(existing.avatarUrl||""):""}"/></div>
      <div id="avatarPreviewWrap" style="margin-top:-6px;margin-bottom:12px;${isEdit&&existing.avatarUrl?"":"display:none;"}">
        <img id="avatarPreview" src="${isEdit&&existing.avatarUrl?esc(existing.avatarUrl):""}" style="width:60px;height:60px;border-radius:999px;object-fit:cover;border:2px solid var(--border);">
      </div>
      <div class="field"><label>URL баннера (необязательно)</label><input id="abanner" placeholder="https://example.com/banner.jpg" value="${isEdit?esc(existing.bannerUrl||""):""}"/></div>
      <div id="bannerPreviewWrap" style="margin-top:-6px;margin-bottom:12px;${isEdit&&existing.bannerUrl?"":"display:none;"}">
        <img id="bannerPreview" src="${isEdit&&existing.bannerUrl?esc(existing.bannerUrl):""}" style="width:100%;height:80px;border-radius:12px;object-fit:cover;border:1px solid var(--border);">
      </div>
      <div style="color:var(--muted);font-size:12px;margin-bottom:14px;">💡 Укажите прямые ссылки на изображения (jpg, png, webp). Для загрузки файлов используйте imgbb.com, imgur.com или аналоги.</div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="amCancel">Отмена</button>
        <button class="btn btn-primary" id="amSave">${isEdit?"Сохранить":"Создать"}</button>
      </div>
    </div>`);

    /* Превью аватарки */
    box.querySelector("#aavatar").addEventListener("input",e=>{
      const url=e.target.value.trim();
      const pw=box.querySelector("#avatarPreviewWrap"), pi=box.querySelector("#avatarPreview");
      if(url){ pi.src=url; pw.style.display="block"; } else pw.style.display="none";
    });
    /* Превью баннера */
    box.querySelector("#abanner").addEventListener("input",e=>{
      const url=e.target.value.trim();
      const pw=box.querySelector("#bannerPreviewWrap"), pi=box.querySelector("#bannerPreview");
      if(url){ pi.src=url; pw.style.display="block"; } else pw.style.display="none";
    });

    box.querySelector("#amCancel").onclick=()=>document.body.removeChild(overlay);
    box.querySelector("#amSave").onclick=()=>{
      const name=box.querySelector("#aname").value.trim();
      if(!name){ toast("Введите имя исполнителя"); return; }
      const avatarUrl=box.querySelector("#aavatar").value.trim()||null;
      const bannerUrl=box.querySelector("#abanner").value.trim()||null;
      const bio=box.querySelector("#abio").value.trim();
      if(isEdit){
        existing.name=name; existing.bio=bio; existing.avatarUrl=avatarUrl; existing.bannerUrl=bannerUrl;
        saveDB(db); toast("Исполнитель обновлён ✓");
      } else {
        db.artists.push({id:nid(),name,bio,avatarUrl,bannerUrl,trackIds:[],subscriberIds:[],createdAt:Date.now()});
        saveDB(db); toast("Исполнитель создан 🎤");
      }
      document.body.removeChild(overlay);
      refreshArtistList();
    };
    overlay.appendChild(box);
    overlay.onclick=(e)=>{ if(e.target===overlay) document.body.removeChild(overlay); };
    document.body.appendChild(overlay);
    box.querySelector("#aname").focus();
  }

  /* ── Модальное окно назначения треков ── */
  function openAssignModal(artist){
    const overlay=h(`<div class="modal-overlay"></div>`);
    const box=h(`<div class="modal-box">
      <h3>Треки исполнителя «${esc(artist.name)}»</h3>
      <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Отметьте треки, которые нужно привязать к этому исполнителю. Треки загружают пользователи в разделе «Музыка».</div>
      <div class="searchbox" style="margin-bottom:12px;"><input placeholder="Поиск трека..." id="tsearch"/></div>
      <div id="trackAssignList" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="taCancel">Отмена</button>
        <button class="btn btn-primary" id="taSave">Сохранить</button>
      </div>
    </div>`);

    let selected=new Set(artist.trackIds||[]);

    function buildTrackList(term){
      const list=box.querySelector("#trackAssignList");
      list.innerHTML="";
      const filtered=db.tracks.filter(t=>!term||t.title.toLowerCase().includes(term.toLowerCase())||(t.artist||"").toLowerCase().includes(term.toLowerCase()));
      if(!filtered.length){
        list.innerHTML=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">${db.tracks.length?"Не найдено":"Треков нет. Загрузите их в разделе «Музыка»."}</div>`;
        return;
      }
      filtered.forEach(t=>{
        const uploader=findUser(t.uploaderId);
        const isSel=selected.has(t.id);
        const row=h(`<div class="assign-track-row ${isSel?"selected":""}">
          <input type="checkbox" ${isSel?"checked":""} data-check="${t.id}"/>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(t.title)}</div>
            <div style="color:var(--muted);font-size:12px;">${t.artist?esc(t.artist)+" · ":""}Загрузил: ${uploader?esc(uploader.displayName):"?"} · ${timeAgo(t.createdAt)}</div>
          </div>
          ${t.plays?`<div class="stat-mini">${S.headphone} ${fmtPlays(t.plays)}</div>`:""}
        </div>`);
        const cb=row.querySelector(`[data-check]`);
        cb.onclick=(e)=>{ e.stopPropagation(); if(cb.checked) selected.add(t.id); else selected.delete(t.id); row.classList.toggle("selected",cb.checked); };
        row.onclick=()=>{ cb.checked=!cb.checked; if(cb.checked) selected.add(t.id); else selected.delete(t.id); row.classList.toggle("selected",cb.checked); };
        list.appendChild(row);
      });
    }

    box.querySelector("#tsearch").addEventListener("input",e=>buildTrackList(e.target.value.trim()));
    buildTrackList("");

    box.querySelector("#taCancel").onclick=()=>document.body.removeChild(overlay);
    box.querySelector("#taSave").onclick=()=>{
      artist.trackIds=Array.from(selected);
      saveDB(db); toast("Треки обновлены ✓");
      document.body.removeChild(overlay);
      refreshArtistList();
    };
    overlay.appendChild(box);
    overlay.onclick=(e)=>{ if(e.target===overlay) document.body.removeChild(overlay); };
    document.body.appendChild(overlay);
  }

  createBtn.onclick=()=>openArtistModal(null);
  refreshArtistList();
  frag.appendChild(artistsCard);

  /* ══ Добавить трек по ссылке (YouTube / SoundCloud) ══ */
  const urlCard=h(`<div class="card" style="padding:18px;margin-bottom:24px;"></div>`);
  urlCard.appendChild(h(`<div class="admin-section-title">🔗 Трек по ссылке (YouTube / SoundCloud)</div>`));
  const urlForm=h(`<div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Вставьте ссылку на трек — он появится в разделе Музыка и будет играть прямо на сайте без перехода на YouTube/SoundCloud.</div>
    <div class="field"><label>Ссылка *</label><input id="uurl" placeholder="https://youtube.com/watch?v=... или https://soundcloud.com/..."/></div>
    <div id="urlPreview" style="margin:-6px 0 12px;font-size:13px;color:var(--muted);display:none;"></div>
    <div class="field"><label>Название трека *</label><input id="utitle" placeholder="Название"/></div>
    <div class="field"><label>Исполнитель (необязательно)</label><input id="uartist" placeholder="Исполнитель"/></div>
    <div class="field"><label>Обложка — ссылка на картинку (необязательно)</label><input id="ucover" placeholder="https://..."/></div>
    <button class="btn btn-primary" id="usubmit">${S.link} Добавить трек</button>
  </div>`);

  /* Превью + автозаполнение имени по URL */
  urlForm.querySelector("#uurl").addEventListener("input",e=>{
    const url=e.target.value.trim();
    const preview=urlForm.querySelector("#urlPreview");
    const parsed=parseMediaUrl(url);
    if(parsed){
      preview.style.display="block";
      preview.innerHTML=`<span style="color:var(--green);font-weight:600;">✓ ${parsed.sourceType==="youtube"?"YouTube":"SoundCloud"} — ссылка распознана</span>`;
    } else if(url){
      preview.style.display="block";
      preview.innerHTML=`<span style="color:var(--danger);">✗ Не удалось распознать ссылку. Поддерживаются YouTube и SoundCloud.</span>`;
    } else {
      preview.style.display="none";
    }
  });

  urlForm.querySelector("#usubmit").onclick=async()=>{
    const url=urlForm.querySelector("#uurl").value.trim();
    const title=urlForm.querySelector("#utitle").value.trim();
    const artist=urlForm.querySelector("#uartist").value.trim();
    const cover=urlForm.querySelector("#ucover").value.trim();
    if(!url){ toast("Введите ссылку"); return; }
    if(!title){ toast("Введите название трека"); return; }
    const parsed=parseMediaUrl(url);
    if(!parsed){ toast("Неподдерживаемая ссылка. Используйте YouTube или SoundCloud."); return; }
    const btn=urlForm.querySelector("#usubmit"); btn.disabled=true;
    const prevDb=db;
    db={...db,tracks:[{
      id:nid(), uploaderId:user.id, title, artist,
      dataUrl:null, sourceType:parsed.sourceType, embedUrl:parsed.embedUrl,
      coverUrl:cover||null,
      createdAt:Date.now(), plays:0, monthlyPlays:{}, playedUserIds:[]
    },...db.tracks]};
    const ok=await persistDB(prevDb,{successMsg:`Трек «${title}» добавлен 🎵`,failMsg:"Не удалось добавить трек"});
    btn.disabled=false;
    if(!ok) return;
    urlForm.querySelector("#uurl").value="";
    urlForm.querySelector("#utitle").value="";
    urlForm.querySelector("#uartist").value="";
    urlForm.querySelector("#ucover").value="";
    urlForm.querySelector("#urlPreview").style.display="none";
  };
  urlCard.appendChild(urlForm);
  frag.appendChild(urlCard);

/* Ненавязчивый баннер сверху экрана вместо блокирующего окна ошибки —
   пользователь видит статус, но может пользоваться приложением локально. */
let offlineBannerEl=null;
function setOfflineBanner(show){
  if(show){
    if(offlineBannerEl) return;
    offlineBannerEl=document.createElement("div");
    offlineBannerEl.id="offlineBanner";
    offlineBannerEl.style.cssText="position:fixed;top:0;left:0;right:0;z-index:9999;background:#b45309;color:#fff;font-family:sans-serif;font-size:13px;padding:8px 14px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;";
    offlineBannerEl.innerHTML=`<span>⚠️ Нет связи с сервером — показаны локальные данные, изменения других пользователей вы не увидите.</span><button id="offlineRetryBtn" style="border:none;border-radius:999px;padding:4px 12px;font-weight:600;font-size:12px;background:#fff;color:#b45309;cursor:pointer;">Проверить снова</button>`;
    document.body.appendChild(offlineBannerEl);
    document.getElementById("offlineRetryBtn").onclick=()=>tryReconnect(true);
  }else if(offlineBannerEl){
    offlineBannerEl.remove();
    offlineBannerEl=null;
  }
}

let reconnectTimer=null;
function scheduleReconnect(){
  if(reconnectTimer) return;
  reconnectTimer=setInterval(()=>tryReconnect(false),15000);
}
async function tryReconnect(manual){
  const {db:freshDb, offline, error}=await loadDB();
  if(!offline){
    if(reconnectTimer){ clearInterval(reconnectTimer); reconnectTimer=null; }
    db=mergeDB(freshDb,db);
    setOfflineBanner(false);
    render();
    startSync();
  }else if(manual){
    toast("⚠️ Всё ещё нет связи с сервером"+((error&&error.message)?" ("+error.message+")":""));
  }
}

/* Подписываемся на изменения в реальном времени — как только другой человек
   опубликует пост, напишет сообщение или отправит заявку в друзья, все увидят это сразу. */
function startSync(){
  sb.channel("leimchat_db_changes")
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"leimchat_db",filter:"id=eq.1"},payload=>{
      const remote=normalizeDB(payload.new.data);
      const merged=mergeDB(remote,db);
      const changed=JSON.stringify(merged)!==JSON.stringify(db);
      db=merged;
      if(changed){
        const activeTag=document.activeElement&&document.activeElement.tagName;
        /* не сбрасываем набираемый текст в полях ввода — но статус-бейджи
           всё равно можно точечно обновить без полного render() */
        if(activeTag!=="INPUT"&&activeTag!=="TEXTAREA") render();
        else if(typeof refreshOnlineBadges==="function") refreshOnlineBadges();
      }
    })
    .subscribe();
  subscribeCallSignaling();
}

/* ══════════════════════════════════════════════════════
   АУДИОЗВОНКИ (WebRTC + Supabase Realtime Broadcast для сигналинга)
   ══════════════════════════════════════════════════════
   Сигналы звонка (offer/answer/ice/end/busy/reject/cancel) НЕ проходят через
   общий JSON-блок leimchat_db (это привело бы к той же проблеме с раздутием
   строки и тайм-аутами, что и с аудио треков раньше) — вместо этого каждый
   пользователь слушает свой персональный broadcast-канал "call_<userId>",
   а для отправки сигнала открывается временный канал на "call_<id получателя>".
   Только итоговая запись о звонке (статус + длительность) один раз сохраняется
   в db.messages — так же компактно, как обычное текстовое сообщение. */
const ICE_SERVERS=[
  {urls:"stun:stun.l.google.com:19302"},
  {urls:"stun:stun1.l.google.com:19302"},
  {urls:"stun:stun2.l.google.com:19302"},
  {urls:"stun:stun3.l.google.com:19302"},
  {urls:"stun:stun.cloudflare.com:3478"},
  /* Бесплатный публичный TURN — для пробивания симметричного NAT */
  {urls:"turn:openrelay.metered.ca:80",username:"openrelayproject",credential:"openrelayproject"},
  {urls:"turn:openrelay.metered.ca:443",username:"openrelayproject",credential:"openrelayproject"},
  {urls:"turn:openrelay.metered.ca:443?transport=tcp",username:"openrelayproject",credential:"openrelayproject"},
];
const CALL_RING_TIMEOUT_MS=30000;

let myCallChannel=null;
let callState=null; /* {callId,peerId,peerName,peerAvatar,role,status,pc,localStream,remoteAudioEl,sendChannel,ringTimer,timerInterval,startedAt,connectedAt} */

function callChannelName(userId){ return `call_${userId}`; }

function subscribeCallSignaling(){
  const me=currentUser(); if(!me||!sb) return;
  if(myCallChannel){ try{ sb.removeChannel(myCallChannel); }catch(e){} myCallChannel=null; }
  myCallChannel=sb.channel(callChannelName(me.id),{config:{broadcast:{self:false}}});
  myCallChannel.on("broadcast",{event:"signal"},({payload})=>handleCallSignal(payload));
  myCallChannel.subscribe();
}

/* Открываем один канал заранее и держим его весь звонок.
   openSendChannel вызывается при старте звонка, затем getSendChannel
   просто возвращает уже готовый канал — без задержки 1.5 с. */
async function openSendChannel(toUserId){
  if(callState&&callState.sendChannel&&callState._sendChannelFor===toUserId) return callState.sendChannel;
  const ch=sb.channel(callChannelName(toUserId),{config:{broadcast:{self:false}}});
  await new Promise(resolve=>{
    const t=setTimeout(resolve,2000); /* max ожидания подписки */
    ch.subscribe(status=>{ if(status==="SUBSCRIBED"||status==="CHANNEL_ERROR"){ clearTimeout(t); resolve(); } });
  });
  if(callState){ callState.sendChannel=ch; callState._sendChannelFor=toUserId; }
  return ch;
}
async function getSendChannel(toUserId){
  if(callState&&callState.sendChannel&&callState._sendChannelFor===toUserId) return callState.sendChannel;
  return openSendChannel(toUserId);
}
async function sendCallSignal(toUserId,type,payload){
  try{
    const me=currentUser();
    const ch=await getSendChannel(toUserId);
    await ch.send({type:"broadcast",event:"signal",payload:{type,from:me?me.id:null,...payload}});
  }catch(e){ console.error("sendCallSignal failed",e); }
}

/* ── короткие сигнальные тона (звонок/завершение) — генерируются, без файлов ── */
let callAudioCtx=null;
function getCallAudioCtx(){ if(!callAudioCtx) callAudioCtx=new (window.AudioContext||window.webkitAudioContext)(); return callAudioCtx; }
function beep(freq,startAt,dur,vol=0.16){
  try{
    const ctx=getCallAudioCtx();
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.frequency.value=freq; osc.type="sine";
    gain.gain.setValueAtTime(0,ctx.currentTime+startAt);
    gain.gain.linearRampToValueAtTime(vol,ctx.currentTime+startAt+0.02);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+startAt+dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime+startAt); osc.stop(ctx.currentTime+startAt+dur+0.02);
  }catch(e){}
}
let ringToneTimer=null;
function startRingTone(pattern){
  stopRingTone();
  const play=()=>{ beep(pattern==="out"?440:523,0,0.28); beep(pattern==="out"?440:523,0.36,0.28); };
  play(); ringToneTimer=setInterval(play,1600);
}
function stopRingTone(){ if(ringToneTimer){ clearInterval(ringToneTimer); ringToneTimer=null; } }
function playEndTone(){ beep(300,0,0.18,0.14); beep(220,0.15,0.22,0.14); }
