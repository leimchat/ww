/* ── проверка приватности перед звонком ── */
function canCall(callerId,targetUser){
  const priv=targetUser.callPrivacy||"all";
  if(priv==="none") return false;
  if(priv==="friends") return friendIdsOf(callerId).has(targetUser.id);
  return true;
}

/* ── исходящий звонок ── */
/* Пока идёт getUserMedia (асинхронно), может прийти входящий звонок и занять
   callState первым — pendingCallId позволяет проверить, что именно
   ЭТА попытка звонка всё ещё актуальна, прежде чем продолжать после await. */
let pendingCallId=null;
async function startOutgoingCall(targetId){
  if(callState||pendingCallId){ toast("Вы уже находитесь в звонке"); return; }
  const target=db.users.find(u=>u.id===targetId);
  if(!target){ toast("Пользователь не найден"); return; }
  const me=currentUser(); if(!me) return;

  const callId=nid();
  pendingCallId=callId;

  /* Запрашиваем микрофон до показа UI */
  let localStream;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){
    pendingCallId=null;
    toast("Нет доступа к микрофону. Проверьте разрешения браузера.");
    return;
  }

  /* Звонок мог быть перехвачен входящим пока ждали разрешение */
  if(pendingCallId!==callId){
    localStream.getTracks().forEach(t=>t.stop());
    return;
  }
  pendingCallId=null;

  const conv=openConvWith(me.id,targetId);
  callState={
    callId,peerId:targetId,peerName:target.displayName,peerAvatar:target.avatarUrl,
    role:"caller",status:"ringing-out",pc:null,localStream,
    remoteAudioEl:null,sendChannel:null,_sendChannelFor:null,
    ringTimer:null,timerInterval:null,
    startedAt:Date.now(),connectedAt:null,muted:false,speakerMuted:false,
    convId:conv.id
  };

  renderActiveCallUI();
  startRingTone("out");

  try{
    /* Pre-open send channel so ICE signals don't wait for subscription */
    await openSendChannel(targetId);
    const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
    callState.pc=pc;
    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    pc.onicecandidate=e=>{ if(e.candidate&&callState) sendCallSignal(callState.peerId,"ice",{callId,candidate:e.candidate}); };
    pc.ontrack=e=>attachRemoteStream(e.streams[0]);
    pc.oniceconnectionstatechange=()=>handleIceStateChange(pc.iceConnectionState);

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await sendCallSignal(targetId,"offer",{
      callId,sdp:offer,
      callerName:me.displayName,callerAvatar:me.avatarUrl||null
    });
  }catch(e){
    console.error("startOutgoingCall WebRTC failed",e);
    if(callState&&callState.callId===callId){
      toast("Не удалось начать звонок");
      endCall("failed");
    }
    return;
  }

  /* Тайм-аут ожидания ответа */
  callState.ringTimer=setTimeout(()=>{
    if(callState&&callState.callId===callId&&callState.status==="ringing-out"){
      sendCallSignal(targetId,"cancel",{callId}).catch(()=>{});
      endCall("missed-outgoing");
    }
  },CALL_RING_TIMEOUT_MS);
}

/* ── обработка входящих сигналов ── */
function handleCallSignal(payload){
  const me=currentUser(); if(!me) return;
  const {type,callId}=payload;
  if(type==="offer") return handleIncomingOffer(payload);
  if(!callState||callState.callId!==callId) return; /* сигнал от неактивного/старого звонка — игнорируем */
  if(type==="answer") return handleAnswer(payload);
  if(type==="ice") return handleRemoteIce(payload);
  if(type==="end") return handleRemoteEnd(payload.reason||"completed");
  if(type==="cancel") return handleRemoteEnd("missed");
  if(type==="reject") return handleRemoteEnd("declined");
  if(type==="busy") return handleRemoteEnd("busy");
}

async function handleIncomingOffer(payload){
  const me=currentUser(); if(!me) return;
  const caller=findUser(payload.from)||{id:payload.from,displayName:payload.callerName,avatarUrl:payload.callerAvatar};
  if(callState||pendingCallId){
    /* уже в звонке (или сами набираем кого-то) — сообщаем вызывающему, что пользователь занят */
    sendCallSignal(payload.from,"busy",{callId:payload.callId});
    return;
  }
  if(!canCall(caller.id,me)){
    sendCallSignal(payload.from,"reject",{callId:payload.callId,reason:"privacy"});
    return;
  }
  callState={
    callId:payload.callId,peerId:caller.id,peerName:payload.callerName||caller.displayName,peerAvatar:payload.callerAvatar||caller.avatarUrl,
    role:"callee",status:"ringing-in",pc:null,localStream:null,remoteAudioEl:null,
    sendChannel:null,_sendChannelFor:null,ringTimer:null,timerInterval:null,
    startedAt:Date.now(),connectedAt:null,muted:false,speakerMuted:false,
    pendingOffer:payload.sdp,convId:openConvWith(me.id,caller.id).id,
  };
  renderIncomingCallUI();
  startRingTone("in");
  callState.ringTimer=setTimeout(()=>{
    if(callState&&callState.callId===payload.callId&&callState.status==="ringing-in"){
      endCall("missed");
    }
  },CALL_RING_TIMEOUT_MS);
}

async function acceptIncomingCall(){
  if(!callState||callState.role!=="callee") return;
  const callId=callState.callId;
  stopRingTone();
  if(callState.ringTimer){ clearTimeout(callState.ringTimer); callState.ringTimer=null; }
  let localStream;
  try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){
    if(!callState||callState.callId!==callId) return; /* звонок уже завершился по другой причине во время запроса разрешения */
    toast("Не удалось получить доступ к микрофону");
    sendCallSignal(callState.peerId,"reject",{callId,reason:"no-mic"});
    endCall("declined",false);
    return;
  }
  /* Звонок мог завершиться (отмена/тайм-аут/уход) пока ждали разрешение на микрофон. */
  if(!callState||callState.callId!==callId){
    localStream.getTracks().forEach(t=>t.stop());
    return;
  }
  callState.localStream=localStream;
  callState.status="connecting";
  renderActiveCallUI();

  try{
    /* Pre-open send channel before ICE storm begins */
    await openSendChannel(callState.peerId);
    const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
    callState.pc=pc;
    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    pc.onicecandidate=e=>{ if(e.candidate) sendCallSignal(callState.peerId,"ice",{callId,candidate:e.candidate}); };
    pc.ontrack=e=>attachRemoteStream(e.streams[0]);
    pc.oniceconnectionstatechange=()=>handleIceStateChange(pc.iceConnectionState);

    await pc.setRemoteDescription(new RTCSessionDescription(callState.pendingOffer));
    await drainPendingIce(); /* сбрасываем ICE, накопленные пока pc не существовал */
    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await sendCallSignal(callState.peerId,"answer",{callId,sdp:answer});
  }catch(e){
    console.error("acceptIncomingCall failed",e);
    if(callState&&callState.callId===callId){ toast("Не удалось принять звонок"); endCall("failed"); }
  }
}

function declineIncomingCall(reason){
  if(!callState||callState.role!=="callee") return;
  sendCallSignal(callState.peerId,"reject",{callId:callState.callId,reason});
  endCall(reason,false);
}

async function handleAnswer(payload){
  if(!callState||callState.role!=="caller"||!callState.pc) return;
  stopRingTone();
  if(callState.ringTimer){ clearTimeout(callState.ringTimer); callState.ringTimer=null; }
  callState.status="connecting"; updateCallStatusUI();
  try{
    await callState.pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
    await drainPendingIce(); /* caller тоже мог получить ICE до setRemote */
  }
  catch(e){ console.error("handleAnswer failed",e); toast("Не удалось установить соединение"); endCall("failed"); }
}

async function handleRemoteIce(payload){
  if(!callState) return;
  if(!callState.pc){
    /* pc ещё не создан (callee принимает звонок) — буферизуем */
    callState._pendingIce=callState._pendingIce||[];
    callState._pendingIce.push(payload.candidate);
    return;
  }
  try{ await callState.pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); }catch(e){}
}
/* Сбрасываем накопленных ICE-кандидатов после setRemoteDescription */
async function drainPendingIce(){
  if(!callState||!callState.pc||!callState._pendingIce) return;
  const q=callState._pendingIce; callState._pendingIce=[];
  for(const c of q){
    try{ await callState.pc.addIceCandidate(new RTCIceCandidate(c)); }catch(e){}
  }
}

function handleRemoteEnd(reason){
  if(!callState) return;
  stopRingTone();
  endCall(reason,false);
}

function handleIceStateChange(state){
  if(!callState) return;
  console.log("[WebRTC] iceConnectionState →", state);
  if(state==="connected"||state==="completed"){
    if(!callState.connectedAt){
      callState.connectedAt=Date.now();
      callState.status="in-call";
      renderActiveCallUI();
      startCallTimer();
    }
  } else if(state==="disconnected"){
    /* disconnected может быть временным (переключение сети) — ждём 8 сек */
    if(callState._disconnectTimer) return;
    callState._disconnectTimer=setTimeout(()=>{
      if(callState&&callState.pc&&callState.pc.iceConnectionState==="disconnected"){
        toast("⚠️ Соединение потеряно");
        endCall(callState.connectedAt?"completed":"canceled");
      }
    },8000);
  } else if(state==="failed"){
    /* failed окончательно — пробуем restart */
    if(callState.pc&&callState.pc.restartIce){
      toast("Переподключение…");
      callState.pc.restartIce();
    } else {
      toast("⚠️ Не удалось установить соединение");
      endCall(callState.connectedAt?"completed":"failed");
    }
  } else if(state==="closed"){
    if(callState&&callState.status!=="ended") endCall(callState.connectedAt?"completed":"canceled");
  } else if(state==="checking"){
    if(callState._disconnectTimer){ clearTimeout(callState._disconnectTimer); callState._disconnectTimer=null; }
  }
}

function attachRemoteStream(stream){
  if(!callState) return;
  if(!callState.remoteAudioEl){
    const a=document.createElement("audio");
    a.autoplay=true; a.style.display="none";
    document.body.appendChild(a);
    callState.remoteAudioEl=a;
  }
  callState.remoteAudioEl.srcObject=stream;
}

function startCallTimer(){
  if(!callState) return;
  callState.timerInterval=setInterval(()=>{
    if(!callState||!callOverlayEl) return;
    const secs=Math.floor((Date.now()-callState.connectedAt)/1000);
    const el=callOverlayEl.querySelector("#callTimerText");
    if(el){ el.style.display=""; el.textContent=fmtCallTimer(secs); }
  },500);
}

function toggleMuteMic(){
  if(!callState||!callState.localStream) return;
  callState.muted=!callState.muted;
  callState.localStream.getAudioTracks().forEach(t=>t.enabled=!callState.muted);
  renderActiveCallUI();
}
function toggleSpeaker(){
  if(!callState||!callState.remoteAudioEl) return;
  callState.speakerMuted=!callState.speakerMuted;
  callState.remoteAudioEl.muted=callState.speakerMuted;
  renderActiveCallUI();
}

/* ── завершение звонка: чистим WebRTC/аудио и сохраняем запись в историю чата ──
   endCall может быть вызван повторно из разных мест почти одновременно
   (повторный сигнал от собеседника, клик "завершить" + пришедший "end",
   обрыв связи и т.п.) — поэтому первым делом синхронно забираем callState
   в локальную переменную и обнуляем глобальную ссылку, чтобы повторный
   вызов сразу увидел callState===null и не выполнял очистку/запись дважды. */
async function endCall(reason,notifyPeer){
  if(!callState||callState.status==="ended") return;
  const s=callState;
  s.status="ended";
  callState=null;

  if(notifyPeer!==false){
    sendCallSignal(s.peerId,"end",{callId:s.callId,reason}).catch(()=>{});
  }
  stopRingTone();
  if(s.ringTimer) clearTimeout(s.ringTimer);
  if(s.timerInterval) clearInterval(s.timerInterval);
  if(s.pc){ try{ s.pc.close(); }catch(e){} }
  if(s.localStream){ s.localStream.getTracks().forEach(t=>t.stop()); }
  if(s.remoteAudioEl){ s.remoteAudioEl.srcObject=null; s.remoteAudioEl.remove(); }
  if(s.sendChannel){ try{ sb.removeChannel(s.sendChannel); }catch(e){} }
  playEndTone();
  hideCallOverlay();

  /* Однозначный "владелец" записи в истории — только вызывающий (caller).
     Так у одного звонка ровно одна запись в чате, даже если обе стороны
     локально завершают звонок примерно в одно и то же время. */
  if(s.role==="caller"){
    const durationSec=s.connectedAt?Math.round((Date.now()-s.connectedAt)/1000):0;
    await saveCallHistory(s,reason,durationSec);
  }
}

async function saveCallHistory(s,reason,durationSec){
  const me=currentUser(); if(!me) return;
  const prevDb=db;
  db={...db,messages:[...db.messages,{
    id:nid(),conversationId:s.convId,senderId:me.id,type:"call",
    callStatus:reason, /* completed | missed | missed-outgoing | declined | canceled | busy | failed */
    duration:durationSec,createdAt:Date.now(),content:""
  }]};
  await persistDB(prevDb,{});
}

/* ── подпись для записи о звонке в истории чата ── */
function callHistoryLabel(m,mine){
  const dirLabel=mine?"Исходящий звонок":"Входящий звонок";
  const durLabel=m.duration?` · ${fmtCallTimer(m.duration)}`:"";
  const statusMap={
    completed:`${dirLabel}${durLabel}`,
    missed:mine?"Звонок не принят":"Пропущенный звонок",
    "missed-outgoing":"Нет ответа",
    declined:mine?"Звонок отклонён":"Вы отклонили звонок",
    canceled:mine?"Звонок отменён":"Пропущенный звонок",
    busy:"Абонент уже в другом звонке",
    failed:"Не удалось соединиться",
  };
  return statusMap[m.callStatus]||dirLabel;
}

/* ── Вспомогательные ────────────────────────────────────────────────────────── */
function findChannel(id){ return db.channels.find(c=>c.id===id)||null; }
function findChannelByUsername(u){ return db.channels.find(c=>c.username&&c.username.toLowerCase()===u.toLowerCase())||null; }
function isChannelOwner(ch,user){ return ch&&user&&String(ch.ownerId)===String(user.id); }
function getChMod(ch,userId){ return (ch.moderators||[]).find(m=>String(m.userId)===String(userId))||null; }
function isChannelAdmin(ch,user){
  if(!ch||!user) return false;
  if(isChannelOwner(ch,user)||isAdmin(user)) return true;
  return !!getChMod(ch,user.id);
}
function chModCan(ch,user,perm){
  if(!ch||!user) return false;
  if(isChannelOwner(ch,user)||isAdmin(user)) return true;
  const mod=getChMod(ch,user.id);
  return mod&&mod.permissions&&!!mod.permissions[perm];
}
function canPostToChannel(ch,user){ return chModCan(ch,user,"canPost"); }
function isSubscribed(ch,user){ return ch&&user&&(ch.subscriberIds||[]).includes(user.id); }
function isChBanned(ch,userId){ return (ch.bannedUserIds||[]).includes(userId); }
function chReactions(ch){ return (ch.allowedReactions&&ch.allowedReactions.length)?ch.allowedReactions:CH_DEFAULT_REACTIONS; }

function getChannelPostReaction(cp,uid){
  for(const e of Object.keys(cp.reactions||{})){ if(cp.reactions[e]&&cp.reactions[e].includes(uid)) return e; }
  return null;
}
function toggleChannelReaction(cp,ch,uid,emoji){
  if(!cp.reactions) cp.reactions={};
  const prev=getChannelPostReaction(cp,uid);
  /* Сбрасываем старую реакцию */
  Object.keys(cp.reactions).forEach(e=>{ cp.reactions[e]=cp.reactions[e].filter(id=>id!==uid); if(!cp.reactions[e].length) delete cp.reactions[e]; });
  /* Устанавливаем новую (если не та же самая — тогда это снятие) */
  if(prev!==emoji){ if(!cp.reactions[emoji]) cp.reactions[emoji]=[]; cp.reactions[emoji].push(uid); }
  saveDB(db);
}
function totalChReactions(cp){ let n=0; Object.values(cp.reactions||{}).forEach(a=>n+=a.length); return n; }

function attachIcon(type){
  if(!type) return "📎";
  if(type.startsWith("image/")) return "🖼️";
  if(type.startsWith("video/")) return "🎬";
  if(type.startsWith("audio/")) return "🎵";
  if(type.includes("pdf")) return "📄";
  if(type.includes("zip")||type.includes("archive")||type.includes("rar")) return "📦";
  if(type.includes("word")||type.includes("doc")) return "📝";
  if(type.includes("sheet")||type.includes("excel")||type.includes("xlsx")) return "📊";
  if(type.includes("presentation")||type.includes("powerpoint")||type.includes("pptx")) return "📊";
  if(type.includes("gif")) return "🎞️";
  return "📎";
}

function notifyChannelSubscribers(ch,msg){
  if(!db.notifications) db.notifications=[];
  if(!ch||!ch.id) return;
  if(!(ch.subscriberIds&&ch.subscriberIds.length)) return;
  if(!db.chNotifications) db.chNotifications=[];
  db.chNotifications.push({id:nid(),channelId:ch.id,channelTitle:ch.title,msg,createdAt:Date.now()});
  if(db.chNotifications.length>500) db.chNotifications=db.chNotifications.slice(-500);
}

/* ── Рендер форматированного текста ──────────────────────────────────────────
   Поддерживает: **жирный**, _курсив_, ++подчёркнутый++, ~~зачёркнутый~~,
   `код`, ||спойлер||, а также URL → ссылки.                                  */
function renderChText(raw){
  if(!raw) return "";
  /* Экранируем HTML */
  let t=raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  /* Форматирование */
  t=t.replace(/\|\|(.+?)\|\|/gs,(_,s)=>`<span class="ch-spoiler" onclick="this.classList.toggle('ch-spoiler-open')" title="Нажмите, чтобы раскрыть">${s}</span>`);
  t=t.replace(/\*\*(.+?)\*\*/gs,(_,s)=>`<strong>${s}</strong>`);
  t=t.replace(/~~(.+?)~~/gs,(_,s)=>`<del>${s}</del>`);
  t=t.replace(/\+\+(.+?)\+\+/gs,(_,s)=>`<u>${s}</u>`);
  t=t.replace(/(?<![*_])\b_(.+?)_\b/gs,(_,s)=>`<em>${s}</em>`);
  t=t.replace(/`([^`]+)`/g,(_,s)=>`<code class="ch-inline-code">${s}</code>`);
  /* URL */
  t=t.replace(/(https?:\/\/[^\s<>"]+)/g,(_,url)=>`<a href="${url}" target="_blank" rel="noopener" class="ch-link">${url}</a>`);
  return t;
}
