<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeimChat</title>
<!-- auth-redesign-v2 -->
<meta name="build" content="auth-v2">
<link rel="icon" type="image/png" href="https://i.ibb.co/XG3pHwY/f6d0735a-38fb-4910-aea2-fd2c31e04bde.png">
<style>
:root{
  --bg:#f7f7f9;--card:#ffffff;--border:#e6e6ea;--muted:#8a8a95;--fg:#16161a;
  --primary:#4f6bff;--primary-fg:#ffffff;--accent:#eef0ff;--danger:#e5484d;--danger-bg:#fdeceb;
  --green:#1fa855;
}
[data-theme="dark"]{
  --bg:#0f0f13;--card:#17171c;--border:#26262e;--muted:#8b8b96;--fg:#f2f2f5;
  --primary:#5b7cff;--primary-fg:#ffffff;--accent:#1b1e33;--danger:#ff5b60;--danger-bg:#2a1618;
  --green:#2fce76;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);transition:background .2s,color .2s;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
.hidden{display:none!important;}
.app{min-height:100dvh;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.5px;}
.brand .logo{width:32px;height:32px;border-radius:10px;background:var(--primary);color:var(--primary-fg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;overflow:hidden;}
.brand .logo img{width:100%;height:100%;object-fit:cover;display:block;}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.btn{border:none;border-radius:999px;padding:10px 20px;font-weight:600;font-size:14px;transition:transform .1s,opacity .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:var(--primary-fg);box-shadow:0 4px 14px color-mix(in srgb,var(--primary) 35%,transparent);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--fg);}
.btn-ghost:hover{background:var(--accent);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--fg);}
.btn-outline:hover{background:var(--accent);}
.btn-danger-outline{background:transparent;border:1px solid var(--danger);color:var(--danger);}
.btn-danger-outline:hover{background:var(--danger-bg);}
.btn-icon{width:38px;height:38px;border-radius:999px;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;}
.btn-icon:hover{background:var(--accent);}
.btn-sm{padding:6px 14px;font-size:13px;}
.btn-block{width:100%;}
.landing-hero{padding:100px 24px 80px;max-width:840px;margin:0 auto;text-align:center;}
.badge-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:var(--accent);color:var(--primary);font-size:13px;font-weight:600;margin-bottom:28px;}
.dot{width:8px;height:8px;border-radius:999px;background:var(--primary);}
.landing-hero h1{font-size:52px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin:0 0 20px;}
.grad{background:linear-gradient(90deg,var(--primary),#7aa2ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
.landing-hero p{font-size:19px;color:var(--muted);max-width:560px;margin:0 auto 34px;line-height:1.5;}
.landing-features{padding:70px 24px;background:var(--accent);}
.features-grid{max-width:920px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media(max-width:720px){.features-grid{grid-template-columns:1fr;}.landing-hero h1{font-size:36px;}}
.feature-card{background:var(--card);border:1px solid var(--border);border-radius:2rem;padding:30px;}
.feature-card .ficon{width:48px;height:48px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px;}
.feature-card h3{margin:0 0 8px;font-size:17px;}
.feature-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.5;}
.landing-footer{padding:30px;text-align:center;color:var(--muted);font-size:13px;}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.auth-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:2rem;padding:36px;box-shadow:0 8px 30px rgba(0,0,0,.06);}
.auth-card h2{margin:0 0 6px;font-size:24px;font-weight:800;}
.auth-card .sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted);}
.field input,.field textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:14px;outline:none;}
.field input:focus,.field textarea:focus{border-color:var(--primary);}
.error-text{color:var(--danger);font-size:13px;margin:-6px 0 12px;}
.switch-line{text-align:center;margin-top:18px;font-size:14px;color:var(--muted);}
.switch-line span{color:var(--primary);font-weight:600;cursor:pointer;}

/* ══ AUTH v2 — redesigned login/signup screens ══ */
.auth-page{position:relative;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;isolation:isolate;}
.auth-page::before{content:"";position:absolute;inset:0;z-index:-2;background:
  radial-gradient(1100px 560px at 12% -8%,color-mix(in srgb,var(--primary) 20%,transparent),transparent 60%),
  radial-gradient(900px 620px at 108% 112%,color-mix(in srgb,var(--primary) 16%,transparent),transparent 60%),
  var(--bg);}
.auth-orb{position:absolute;z-index:-1;border-radius:50%;filter:blur(70px);opacity:.55;pointer-events:none;}
.auth-orb.o1{width:380px;height:380px;left:-120px;top:-90px;background:linear-gradient(135deg,var(--primary),#7aa2ff);animation:authFloat1 17s ease-in-out infinite;}
.auth-orb.o2{width:320px;height:320px;right:-100px;top:20%;background:linear-gradient(135deg,#7aa2ff,var(--primary));animation:authFloat2 14s ease-in-out infinite;}
.auth-orb.o3{width:280px;height:280px;left:12%;bottom:-140px;background:linear-gradient(135deg,var(--primary),#a9bcff);animation:authFloat3 19s ease-in-out infinite;}
@keyframes authFloat1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(50px,60px) scale(1.1);}}
@keyframes authFloat2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-40px,40px) scale(.92);}}
@keyframes authFloat3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-40px) scale(1.06);}}
@media (prefers-reduced-motion:reduce){.auth-orb{animation:none!important;}}
.auth-topbar2{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 20px 48px;position:relative;z-index:2;}
.auth-card2{width:100%;max-width:400px;background:color-mix(in srgb,var(--card) 86%,transparent);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid color-mix(in srgb,var(--fg) 8%,transparent);border-radius:28px;padding:40px 34px 34px;box-shadow:0 24px 60px rgba(0,0,0,.14),0 2px 10px rgba(0,0,0,.05);animation:authCardIn .55s cubic-bezier(.16,1,.3,1) both;}
@keyframes authCardIn{from{opacity:0;transform:translateY(26px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.auth-logo2{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--primary),#7aa2ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:26px;margin:0 auto 18px;box-shadow:0 10px 26px color-mix(in srgb,var(--primary) 45%,transparent);overflow:hidden;animation:authLogoPop .6s cubic-bezier(.34,1.56,.64,1) .05s both;}
.auth-logo2 img{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes authLogoPop{from{opacity:0;transform:scale(.4) rotate(-12deg);}to{opacity:1;transform:scale(1) rotate(0);}}
.auth-title2{text-align:center;font-size:25px;font-weight:800;letter-spacing:-.5px;margin:0 0 6px;animation:authFieldIn .5s ease .08s both;}
.auth-sub2{text-align:center;color:var(--muted);font-size:14px;margin-bottom:26px;animation:authFieldIn .5s ease .12s both;}
.auth-error2{display:flex;align-items:center;gap:8px;background:var(--danger-bg);color:var(--danger);border-radius:12px;padding:11px 14px;font-size:13px;margin-bottom:16px;font-weight:600;animation:authShake .45s;}
@keyframes authShake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
.input-group2{position:relative;margin-bottom:16px;animation:authFieldIn .5s cubic-bezier(.16,1,.3,1) both;}
.input-group2:nth-of-type(1){animation-delay:.14s}
.input-group2:nth-of-type(2){animation-delay:.19s}
.input-group2:nth-of-type(3){animation-delay:.24s}
@keyframes authFieldIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.input-group2 label{display:block;font-size:12px;font-weight:700;margin-bottom:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.input-group2 .input-icon2{position:absolute;left:14px;bottom:13px;color:var(--muted);display:flex;pointer-events:none;transition:color .2s;}
.input-group2 input{width:100%;padding:13px 14px 13px 42px;border-radius:16px;border:1.5px solid var(--border);background:var(--bg);color:var(--fg);font-size:14.5px;outline:none;transition:border-color .18s,box-shadow .18s;}
.input-group2 input:focus{border-color:var(--primary);box-shadow:0 0 0 4px color-mix(in srgb,var(--primary) 16%,transparent);}
.input-group2 input:focus~.input-icon2{color:var(--primary);}
.input-group2.has-toggle input{padding-right:42px;}
.input-group2 .pw-toggle2{position:absolute;right:10px;bottom:8px;background:none;border:none;color:var(--muted);padding:6px;display:flex;cursor:pointer;border-radius:8px;transition:background .15s,color .15s;}
.input-group2 .pw-toggle2:hover{color:var(--fg);background:var(--accent);}
.auth-submit2{width:100%;border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--primary),#7aa2ff);box-shadow:0 12px 26px color-mix(in srgb,var(--primary) 40%,transparent);transition:transform .15s,box-shadow .15s;margin-top:4px;animation:authFieldIn .5s cubic-bezier(.16,1,.3,1) .3s both;}
.auth-submit2:hover{transform:translateY(-2px);box-shadow:0 16px 32px color-mix(in srgb,var(--primary) 50%,transparent);}
.auth-submit2:active{transform:translateY(0) scale(.98);}
.auth-switch2{text-align:center;margin-top:22px;font-size:13.5px;color:var(--muted);animation:authFieldIn .5s ease .34s both;}
.auth-switch2 span{color:var(--primary);font-weight:700;cursor:pointer;}
.auth-switch2 span:hover{text-decoration:underline;}
@media(max-width:480px){
  .auth-card2{padding:32px 22px 26px;border-radius:22px;}
  .auth-orb{filter:blur(50px);opacity:.4;}
  .auth-logo2{width:48px;height:48px;font-size:22px;}
  .auth-title2{font-size:22px;}
}
.shell{flex:1;display:flex;min-height:0;}
.sidebar{width:230px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:14px;font-weight:600;font-size:14.5px;color:var(--muted);cursor:pointer;user-select:none;}
.nav-item:hover{background:var(--accent);color:var(--fg);}
.nav-item.active{background:var(--accent);color:var(--primary);}
.nav-item .ic{width:20px;text-align:center;display:flex;align-items:center;justify-content:center;}
.sidebar-bottom{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);}
.me-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:14px;cursor:pointer;}
.me-row:hover{background:var(--accent);}
.main{flex:1;overflow-y:auto;display:flex;justify-content:center;}
.main-inner{width:100%;max-width:680px;padding:24px 16px;}
@media(max-width:760px){
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;flex-direction:row;justify-content:space-around;border-right:none;border-top:1px solid var(--border);padding:8px;background:var(--card);z-index:40;}
  .nav-item{flex-direction:column;font-size:11px;gap:4px;padding:6px 10px;}
  .sidebar-bottom{display:none;}
  .shell{padding-bottom:64px;}
}
.avatar{border-radius:999px;background:var(--accent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.card{background:var(--card);border:1px solid var(--border);border-radius:2rem;box-shadow:0 1px 3px rgba(0,0,0,.03);}
/* composer */
.composer{padding:18px;display:flex;gap:14px;margin-bottom:20px;}
.composer .avatar{width:46px;height:46px;font-size:16px;}
.composer-body{flex:1;display:flex;flex-direction:column;gap:10px;}
.composer textarea{border:none;background:var(--accent);border-radius:16px;padding:12px 14px;font-size:15px;min-height:70px;resize:none;color:var(--fg);outline:none;font-family:inherit;}
.composer-actions{display:flex;justify-content:flex-end;}
/* post */
.post-wrap{border-bottom:1px solid var(--border);}
.post-wrap:last-child{border-bottom:none;}
.post{padding:18px 18px 10px;display:flex;gap:14px;}
.post .avatar{width:44px;height:44px;font-size:15px;}
.post-body{flex:1;min-width:0;}
.post-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.post-head .name{font-weight:700;font-size:14.5px;cursor:pointer;}
.post-head .username,.post-head .time{color:var(--muted);font-size:13px;}
.post-content{margin:6px 0 0;font-size:15px;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.post-actions{display:flex;gap:14px;margin-top:10px;color:var(--muted);font-size:13px;align-items:center;}
.act{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:4px 8px;border-radius:8px;}
.act:hover{background:var(--accent);}
.act.liked{color:var(--danger);}
.act.commented{color:var(--primary);}
.act-del{margin-left:auto;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:8px;display:flex;align-items:center;gap:4px;}
.act-del:hover{color:var(--danger);background:var(--danger-bg);}
/* comments */
.comments-section{padding:0 18px 14px 76px;}
.comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.comment-item{display:flex;gap:10px;align-items:flex-start;}
.comment-item .avatar{width:30px;height:30px;font-size:11px;flex-shrink:0;}
.comment-bubble{background:var(--accent);border-radius:14px;padding:8px 12px;flex:1;font-size:13.5px;line-height:1.4;position:relative;}
.comment-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.comment-name{font-weight:700;font-size:13px;cursor:pointer;}
.comment-time{color:var(--muted);font-size:11.5px;}
.comment-text{word-break:break-word;white-space:pre-wrap;}
.comment-del{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:6px;display:flex;align-items:center;gap:3px;}
.comment-del:hover{color:var(--danger);background:var(--danger-bg);}
.comment-composer{display:flex;gap:8px;align-items:center;}
.comment-composer .avatar{width:30px;height:30px;font-size:11px;flex-shrink:0;}
.comment-composer input{flex:1;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13.5px;outline:none;}
.comment-composer input:focus{border-color:var(--primary);}
.comment-composer button{width:32px;height:32px;border-radius:999px;border:none;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* misc */
.empty{text-align:center;padding:70px 20px;color:var(--muted);}
.empty .icon-circle{width:64px;height:64px;border-radius:999px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;}
.empty h3{color:var(--fg);margin:0 0 6px;}
.empty p{margin:0 0 18px;font-size:14px;}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:1.4rem;gap:10px;}
.list-row:hover{background:var(--accent);}
.list-row-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0;cursor:pointer;}
.list-row .avatar{width:48px;height:48px;font-size:16px;}
.list-row-name{font-weight:700;font-size:14.5px;}
.list-row-sub{color:var(--muted);font-size:13px;}
.list-row-actions{display:flex;gap:8px;flex-shrink:0;}
.section-title{display:flex;align-items:center;gap:10px;font-size:26px;font-weight:800;letter-spacing:-.5px;margin:0 0 18px;}
.req-card{padding:12px;border-radius:1.2rem;background:var(--accent);margin-bottom:12px;}
.searchbox{display:flex;gap:10px;margin-bottom:20px;}
.searchbox input{flex:1;padding:12px 16px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:14px;outline:none;}
.searchbox input:focus{border-color:var(--primary);}
/* messages */
.msg-shell{display:flex;height:calc(100dvh - 56px);width:100%;}
@media(max-width:760px){.msg-shell{height:calc(100dvh - 56px - 64px);}}
.conv-list{width:280px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:10px;}
.thread-back-btn{display:none;}
@media(max-width:760px){
  /* На телефоне список диалогов и переписка не помещаются рядом (список
     280px почти не оставляет места под сами сообщения) — показываем по
     одной панели за раз, как в обычных мессенджерах. */
  .conv-list{width:100%;}
  .thread-view{display:none;}
  .msg-shell.chat-open .conv-list{display:none;}
  .msg-shell.chat-open .thread-view{display:flex;}
  .thread-back-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:none;background:var(--accent);color:var(--fg);cursor:pointer;flex-shrink:0;}
}
.conv-item{display:flex;gap:10px;padding:10px;border-radius:1.2rem;cursor:pointer;align-items:center;}
.conv-item:hover,.conv-item.active{background:var(--accent);}
.conv-item .avatar{width:42px;height:42px;font-size:14px;}
.conv-meta{flex:1;min-width:0;}
.conv-name{font-weight:700;font-size:14px;}
.conv-last{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.thread-view{flex:1;display:flex;flex-direction:column;min-width:0;}
.thread-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.thread-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
.bubble{max-width:65%;padding:10px 15px;border-radius:18px;font-size:14.5px;line-height:1.4;word-break:break-word;}
.bubble.mine{align-self:flex-end;background:var(--primary);color:var(--primary-fg);}
.bubble.theirs{align-self:flex-start;background:var(--accent);}
.bubble-time{font-size:10.5px;opacity:.7;margin-top:4px;display:block;}
.thread-input{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);}
.thread-input input{flex:1;padding:12px 16px;border-radius:999px;border:1px solid var(--border);background:var(--bg);color:var(--fg);outline:none;font-size:14px;}
.thread-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);}
/* profile */
.profile-cover{height:140px;border-radius:2rem 2rem 0 0;background:linear-gradient(135deg,var(--primary),#7aa2ff);}
.profile-card{border-radius:2rem;overflow:hidden;margin-bottom:20px;}
.profile-info{padding:0 24px 24px;}
.profile-avatar{width:96px;height:96px;font-size:34px;border:4px solid var(--card);margin-top:-48px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.profile-name{font-size:22px;font-weight:800;margin:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.profile-username{color:var(--muted);font-size:14px;margin:2px 0 10px;}
.profile-bio{font-size:14.5px;line-height:1.5;margin:0 0 14px;}
.profile-stats{display:flex;gap:20px;font-size:13.5px;color:var(--muted);margin-bottom:16px;}
.profile-stats b{color:var(--fg);}
.role-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--accent);color:var(--primary);}
.role-badge.founder{background:#fff3cd;color:#856404;}
.verified-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;background:var(--primary);color:#fff;font-size:10px;flex-shrink:0;}
/* settings */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.sw-toggle{width:44px;height:24px;border-radius:999px;background:var(--border);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.sw-toggle.on{background:var(--primary);}
.sw-toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:999px;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.sw-toggle.on .knob{left:22px;}
/* admin */
.admin-table{width:100%;border-collapse:collapse;font-size:14px;}
.admin-table th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--border);}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.admin-table tr:last-child td{border-bottom:none;}
.status-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;text-transform:uppercase;}
.status-pill.active{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green);}
.status-pill.banned{background:var(--danger-bg);color:var(--danger);}
/* backup */
.backup-block{background:var(--accent);border-radius:1.4rem;padding:18px;margin-bottom:0;}
.backup-block h4{margin:0 0 6px;font-size:15px;font-weight:700;}
.backup-block p{color:var(--muted);font-size:13px;margin:0 0 14px;line-height:1.5;}
.backup-btns{display:flex;gap:10px;flex-wrap:wrap;}
.bkbtn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:14px;font-weight:600;font-size:13.5px;border:1.5px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;transition:.15s;}
.bkbtn:hover{border-color:var(--primary);color:var(--primary);background:color-mix(in srgb,var(--primary) 8%,transparent);}

/* ══════════════════════════════════════════════════════
   КАНАЛЫ — СТИЛИ
   ══════════════════════════════════════════════════════ */
.channel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
@media(max-width:600px){.channel-grid{grid-template-columns:1fr 1fr;gap:10px;}}
.channel-card{background:var(--card);border:1px solid var(--border);border-radius:1.6rem;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;}
.channel-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.1);}
.channel-card-banner{height:72px;background:linear-gradient(135deg,var(--primary),#7aa2ff);overflow:hidden;}
.channel-card-banner img{width:100%;height:100%;object-fit:cover;display:block;}
.channel-card-body{padding:0 14px 16px;}
.channel-card-avatar{width:56px;height:56px;font-size:18px;border:3px solid var(--card)!important;margin-top:-28px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.15)!important;position:relative;z-index:1;}
.channel-card-name{font-weight:800;font-size:14px;margin:0 0 2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.channel-card-sub{color:var(--muted);font-size:12px;}
.channel-hero{height:180px;background:linear-gradient(135deg,var(--primary),#7aa2ff);border-radius:2rem 2rem 0 0;overflow:hidden;}
.channel-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.channel-page-card{border-radius:2rem;overflow:visible;margin-bottom:20px;background:var(--card);border:1px solid var(--border);}
.channel-page-inner{border-radius:2rem;overflow:hidden;}
.channel-page-info{padding:0 24px 22px;}
.channel-page-avatar-wrap{margin-top:-44px;margin-bottom:12px;display:inline-block;position:relative;}
.channel-page-avatar{width:84px;height:84px;font-size:28px;border:4px solid var(--card)!important;box-shadow:0 4px 14px rgba(0,0,0,.18)!important;position:relative;z-index:2;}
.channel-page-name{font-size:20px;font-weight:800;margin:0 0 3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.channel-page-username{color:var(--muted);font-size:13.5px;margin:0 0 8px;}
.channel-page-desc{font-size:14px;line-height:1.5;color:var(--fg);margin:0 0 12px;white-space:pre-wrap;}
.channel-stat-row{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;font-size:13px;color:var(--muted);}
.channel-stat-row b{color:var(--fg);}
.channel-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ch-post{background:var(--card);border:1px solid var(--border);border-radius:1.6rem;margin-bottom:14px;overflow:hidden;}
.ch-post-pinned-bar{background:color-mix(in srgb,var(--primary) 10%,transparent);border-bottom:1px solid color-mix(in srgb,var(--primary) 18%,var(--border));padding:7px 18px;font-size:12.5px;color:var(--primary);font-weight:700;display:flex;align-items:center;gap:6px;}
.ch-post-head{padding:14px 18px 8px;display:flex;align-items:center;gap:12px;}
.ch-post-channel-info{flex:1;min-width:0;}
.ch-post-channel-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ch-post-time{color:var(--muted);font-size:12px;}
.ch-post-body{padding:0 18px 12px;}
.ch-post-text{font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word;margin:0 0 8px;}
.ch-post-attachments{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.ch-post-attachment{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;background:var(--accent);border:1px solid var(--border);font-size:13px;color:var(--fg);text-decoration:none;}
.ch-post-attachment:hover{border-color:var(--primary);color:var(--primary);}
.ch-post-image-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.ch-post-image-wrap img{border-radius:10px;object-fit:cover;max-height:300px;flex:1;min-width:100px;max-width:100%;cursor:pointer;}
.ch-post-footer{padding:10px 18px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ch-act{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none;background:none;border:none;}
.ch-act:hover{background:var(--accent);}
.ch-act.reacted{color:var(--danger);}
.ch-post-views{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.ch-comments{border-top:1px solid var(--border);padding:14px 18px;}
.ch-comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.ch-comment-item{display:flex;gap:10px;align-items:flex-start;}
.ch-comment-bubble{background:var(--accent);border-radius:14px;padding:8px 12px;flex:1;font-size:13.5px;position:relative;}
.ch-comment-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.ch-comment-name{font-weight:700;font-size:13px;cursor:pointer;}
.ch-comment-time{color:var(--muted);font-size:11.5px;}
.ch-comment-del{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:6px;}
.ch-comment-del:hover{color:var(--danger);background:var(--danger-bg);}
.ch-comment-composer{display:flex;gap:8px;align-items:center;}
.ch-comment-composer input{flex:1;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13.5px;outline:none;}
.ch-comment-composer input:focus{border-color:var(--primary);}
.ch-comment-composer button{width:32px;height:32px;border-radius:999px;border:none;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.channel-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cat-btn{padding:5px 14px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;}
.cat-btn:hover{border-color:var(--primary);color:var(--primary);}
.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.ch-composer{background:var(--card);border:1px solid var(--border);border-radius:1.6rem;padding:18px;margin-bottom:18px;}
.ch-composer textarea{width:100%;border:none;background:var(--accent);border-radius:14px;padding:12px 14px;font-size:15px;min-height:80px;resize:vertical;color:var(--fg);outline:none;font-family:inherit;}
.ch-composer-toolbar{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.ch-attach-label{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;color:var(--fg);background:transparent;}
.ch-attach-label:hover{border-color:var(--primary);color:var(--primary);}
.ch-attach-label input{display:none;}
.ch-file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.ch-file-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;background:var(--accent);font-size:12.5px;border:1px solid var(--border);}
.ch-file-chip button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:0;}
.ch-file-chip button:hover{color:var(--danger);}
.ch-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:20px;}
.ch-stat-card{background:var(--accent);border-radius:1.2rem;padding:14px;text-align:center;}
.ch-stat-num{font-size:22px;font-weight:800;color:var(--fg);}
.ch-stat-label{font-size:12px;color:var(--muted);margin-top:2px;}

/* ── Форматирование в composer ── */
.ch-fmt-bar{display:flex;gap:4px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--accent);border-radius:12px 12px 0 0;border-bottom:1px solid var(--border);}
.ch-fmt-btn{padding:4px 9px;border-radius:8px;border:none;background:transparent;color:var(--fg);cursor:pointer;font-size:13px;font-family:inherit;transition:.1s;}
.ch-fmt-btn:hover{background:var(--border);}
.ch-fmt-sep{width:1px;height:20px;background:var(--border);margin:0 2px;}
.ch-composer-ta{width:100%;border:none;background:var(--bg);border-radius:0;padding:12px 14px;font-size:15px;min-height:90px;resize:vertical;color:var(--fg);outline:none;font-family:inherit;border-bottom:1px solid var(--border);}
.ch-composer-preview{background:var(--bg);padding:12px 14px;min-height:80px;font-size:15px;line-height:1.55;border-bottom:1px solid var(--border);}
.ch-composer{background:var(--card);border:1px solid var(--border);border-radius:1.6rem;overflow:hidden;margin-bottom:18px;}
.ch-composer-toolbar{display:flex;gap:8px;align-items:center;padding:10px 14px;flex-wrap:wrap;}

/* ── Форматирование текста постов ── */
.ch-post-text strong{font-weight:700;}
.ch-post-text em{font-style:italic;}
.ch-post-text u{text-decoration:underline;}
.ch-post-text del{text-decoration:line-through;opacity:.75;}
.ch-inline-code{background:var(--accent);padding:1px 6px;border-radius:6px;font-family:monospace;font-size:13px;color:var(--primary);}
.ch-link{color:var(--primary);text-decoration:underline;word-break:break-all;}
.ch-spoiler{background:var(--fg);color:var(--fg);border-radius:4px;cursor:pointer;user-select:none;padding:0 3px;}
.ch-spoiler.ch-spoiler-open{background:var(--accent);color:var(--fg);}

/* ── Реакции-пилюли под постом ── */
.ch-react-summary{display:flex;flex-wrap:wrap;gap:5px;padding:0 18px 10px;}
.ch-react-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;border:1.5px solid var(--border);background:var(--accent);font-size:13px;cursor:pointer;transition:.12s;color:var(--fg);}
.ch-react-pill:hover{border-color:var(--primary);}
.ch-react-pill.ch-react-mine{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,var(--accent));}
.ch-react-pill span{font-weight:700;font-size:12px;}

/* ── Настройки канала — вкладки ── */
.ch-sett-tabs{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:10px;}
.ch-sett-tab{padding:7px 14px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;}
.ch-sett-tab:hover{border-color:var(--primary);color:var(--primary);}
.ch-sett-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.ch-sett-tab-danger.active{background:var(--danger);border-color:var(--danger);}
.ch-sett-tab-danger:hover{border-color:var(--danger);color:var(--danger);}

/* ── Права модератора — сетка ── */
.ch-perm-grid{display:flex;flex-direction:column;gap:6px;}
.ch-perm-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:10px;background:var(--card);border:1px solid var(--border);}
.ch-perm-readonly .sw-toggle{opacity:.5;pointer-events:none;}

/* ── Переопределяем старый .ch-composer (если был) ── */

/* ── Пересылка ── */
.fwd-modal-tabs{display:flex;gap:4px;background:var(--accent);border-radius:12px;padding:4px;margin-bottom:14px;}
.fwd-tab{flex:1;padding:8px 10px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;}
.fwd-tab.active{background:var(--card);color:var(--fg);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.fwd-user-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;}
.fwd-user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:.12s;}
.fwd-user-row:hover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 6%,transparent);}
.fwd-user-row.selected{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 10%,transparent);}
.fwd-note{color:var(--muted);font-size:13px;text-align:center;padding:20px 0;}
/* ── Блок «Переслано от» (Telegram-стиль) ── */
.fwd-from-block{border-left:3px solid var(--primary);padding:7px 10px 7px 13px;margin-bottom:9px;border-radius:0 10px 10px 0;background:color-mix(in srgb,var(--primary) 6%,var(--accent));cursor:pointer;transition:background .15s;}
.fwd-from-block:hover{background:color-mix(in srgb,var(--primary) 12%,var(--accent));}
.fwd-from-header{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.fwd-from-ava{width:22px;height:22px;border-radius:999px;background:color-mix(in srgb,var(--primary) 20%,var(--accent));color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:9px;overflow:hidden;flex-shrink:0;}
.fwd-from-ava img{width:100%;height:100%;object-fit:cover;}
.fwd-from-label{font-size:12.5px;font-weight:700;color:var(--primary);}
.fwd-from-text{font-size:13.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word;color:var(--fg);overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;}
/* В пузырях личных сообщений */
.bubble .fwd-from-block{border-left-color:rgba(255,255,255,.55);background:rgba(255,255,255,.1);}
.bubble.mine .fwd-from-block{border-left-color:rgba(255,255,255,.7);background:rgba(255,255,255,.12);}
.bubble.mine .fwd-from-label{color:rgba(255,255,255,.9);}
.bubble.mine .fwd-from-text{color:#fff;}
/* ── Кнопки в post-actions ── */
.act-fwd{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:8px;}
.act-fwd:hover{color:var(--primary);background:color-mix(in srgb,var(--primary) 8%,transparent);}
/* ── ch-post кнопка пересылки ── */
.ch-act-fwd{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;background:none;border:none;}
.ch-act-fwd:hover{background:var(--accent);color:var(--primary);}
/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--fg);color:var(--bg);padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:200;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateY(0);}
/* admin section divider */
.admin-section{margin-bottom:24px;}
.admin-section-title{font-size:15px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
/* reactions */
.reaction-picker-wrap{position:relative;display:inline-flex;}
.reaction-picker{position:absolute;bottom:calc(100% + 6px);left:0;display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:6px 8px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:100;white-space:nowrap;}
.reaction-picker button{font-size:20px;background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:8px;transition:.1s;line-height:1;}
.reaction-picker button:hover{background:var(--accent);transform:scale(1.25);}
.reaction-picker button.mine{background:var(--accent);outline:2px solid var(--primary);}
.reaction-bar{display:flex;flex-wrap:wrap;gap:5px;margin:7px 0 0;padding:0 0 2px;}
.reaction-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;background:var(--accent);border:1.5px solid var(--border);font-size:13px;cursor:pointer;user-select:none;transition:.1s;}
.reaction-pill:hover{border-color:var(--primary);}
.reaction-pill.mine{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,transparent);}
.reaction-pill .count{font-weight:700;}
.react-btn{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:4px 8px;border-radius:8px;color:var(--muted);font-size:13px;}
.react-btn:hover{background:var(--accent);}

/* ── Вкладки Музыка/Исполнители ── */
.music-tab{background:transparent;border:none;padding:7px 16px;border-radius:999px;font-weight:600;font-size:13.5px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
.music-tab:hover{color:var(--fg);}
.music-tab-active{background:var(--card);color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.08);}

/* ═══════════════════════════════
   ИСПОЛНИТЕЛИ — НОВЫЕ СТИЛИ
   ═══════════════════════════════ */

/* Каталог исполнителей */
.artists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px;}
@media(max-width:600px){.artists-grid{grid-template-columns:repeat(2,1fr);gap:12px;}}
@media(max-width:360px){.artists-grid{grid-template-columns:1fr;}}

.artist-card{background:var(--card);border:1px solid var(--border);border-radius:1.6rem;overflow:visible;cursor:pointer;transition:transform .18s,box-shadow .18s;}
.artist-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.1);}
.artist-card-banner{height:80px;background:linear-gradient(135deg,var(--primary),#7aa2ff);border-radius:1.6rem 1.6rem 0 0;overflow:hidden;position:relative;}
.artist-card-banner img{width:100%;height:100%;object-fit:cover;display:block;}
.artist-card-body{padding:0 14px 16px;background:var(--card);border-radius:0 0 1.6rem 1.6rem;}
.artist-card-avatar{width:60px;height:60px;font-size:20px;border:3px solid var(--card) !important;margin-top:-30px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.2) !important;position:relative;z-index:1;}
.artist-card-name{font-weight:800;font-size:14.5px;margin:0 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.artist-card-stats{color:var(--muted);font-size:11.5px;display:flex;gap:8px;flex-wrap:wrap;line-height:1.4;}

/* Страница исполнителя */
.artist-hero{height:200px;background:linear-gradient(135deg,var(--primary),#7aa2ff);border-radius:2rem 2rem 0 0;overflow:hidden;position:relative;flex-shrink:0;}
.artist-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.artist-page-card{border-radius:2rem;overflow:visible;margin-bottom:20px;background:var(--card);border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.artist-page-card-inner{border-radius:2rem;overflow:hidden;}
.artist-page-info{padding:0 24px 24px;position:relative;}
.artist-page-avatar-wrap{position:relative;margin-top:-52px;margin-bottom:12px;display:inline-block;}
.artist-page-avatar{width:96px;height:96px;font-size:34px;border:4px solid var(--card) !important;box-shadow:0 4px 16px rgba(0,0,0,.18) !important;position:relative;z-index:2;}
.artist-page-name{font-size:22px;font-weight:800;margin:0 0 4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.artist-page-bio{font-size:14.5px;color:var(--muted);line-height:1.55;margin:0 0 16px;white-space:pre-wrap;}
.artist-stats-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:18px;font-size:13.5px;color:var(--muted);}
.artist-stats-row b{color:var(--fg);}
.artist-stat-block{text-align:center;}
.artist-stat-num{font-size:18px;font-weight:800;color:var(--fg);display:block;}
.artist-stat-label{font-size:11.5px;color:var(--muted);}

/* Кнопка подписки */
.sub-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer;border:none;transition:background .15s,transform .1s;}
.sub-btn:active{transform:scale(.96);}
.sub-btn.not-subscribed{background:var(--primary);color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--primary) 30%,transparent);}
.sub-btn.subscribed{background:var(--accent);color:var(--fg);border:1.5px solid var(--border);}

/* Список треков на странице артиста */
.tracks-sort-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.sort-btn{padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;}
.sort-btn:hover{border-color:var(--primary);color:var(--primary);}
.sort-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

.track-list-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:1.2rem;transition:background .1s;position:relative;}
.track-list-item:hover{background:var(--accent);}
.track-num{width:22px;text-align:right;color:var(--muted);font-size:13px;font-weight:600;flex-shrink:0;}
.track-cover{width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--accent);}
.admin-cover-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border);}
.admin-cover-row:last-child{border-bottom:none;}
.admin-cover-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--accent);}
.admin-cover-row input,#coversearch{padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;outline:none;}
.admin-cover-row input:focus,#coversearch:focus{border-color:var(--primary);}
#coversearch{width:100%;}
.track-play-btn{width:34px;height:34px;border-radius:999px;border:none;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .1s,opacity .1s;}
.track-play-btn:hover{transform:scale(1.08);}
.track-info{flex:1;min-width:0;}
.track-title-text{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-meta-text{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-plays-count{color:var(--muted);font-size:12px;flex-shrink:0;display:flex;align-items:center;gap:4px;}

/* Мини-плеер (снизу страницы артиста) */
.artist-player{background:color-mix(in srgb,var(--primary) 6%,var(--card));border:1.5px solid color-mix(in srgb,var(--primary) 20%,var(--border));border-radius:1.6rem;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.ap-info{flex:1;min-width:0;}
.ap-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-artist{color:var(--muted);font-size:12.5px;}
.ap-play{width:40px;height:40px;border-radius:999px;border:none;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 3px 10px color-mix(in srgb,var(--primary) 35%,transparent);}
.ap-progress{flex:1;min-width:100px;height:4px;background:var(--border);border-radius:99px;cursor:pointer;position:relative;overflow:hidden;}
.ap-progress-fill{height:100%;background:var(--primary);border-radius:99px;pointer-events:none;}
.ap-time{font-size:11.5px;color:var(--muted);flex-shrink:0;}

/* Модальное окно для формы исполнителя */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:2rem;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-box h3{margin:0 0 18px;font-size:20px;font-weight:800;}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}

/* Список треков в модалке назначения */
.assign-track-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .1s;}
.assign-track-row:hover{background:var(--accent);}
.assign-track-row.selected{background:color-mix(in srgb,var(--primary) 12%,transparent);border:1.5px solid color-mix(in srgb,var(--primary) 30%,var(--border));}
.assign-track-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);flex-shrink:0;}

/* Бейдж статистики в карточке артиста в таблице */
.stat-mini{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);}

/* ── Приватность ── */
.privacy-badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--accent);color:var(--muted);}
.privacy-badge.private{background:color-mix(in srgb,var(--danger) 12%,transparent);color:var(--danger);}
.private-wall{padding:40px 20px;text-align:center;border-radius:1.4rem;border:1.5px dashed var(--border);margin-top:16px;}
.private-wall .icon-circle{font-size:32px;width:64px;height:64px;margin:0 auto 12px;}
.private-wall h3{margin:0 0 8px;font-size:17px;}
.private-wall p{margin:0;color:var(--muted);font-size:14px;}

/* ── Iframe-плеер (YouTube/SoundCloud без брендинга) ── */
.ext-player-wrap{width:100%;margin-top:8px;border-radius:12px;overflow:hidden;display:none;}
.ext-player-wrap.open{display:block;}
.ext-player-wrap iframe{width:100%;height:66px;border:0;display:block;}
.ext-play-btn{background:var(--primary);color:#fff;border:none;border-radius:999px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;flex-shrink:0;}
.ext-play-btn:hover{opacity:.85;}

/* ── Лайк-кнопка на треке ── */
.like-btn{background:transparent;border:none;padding:4px 6px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;gap:4px;transition:color .15s,transform .1s;flex-shrink:0;}
.like-btn:hover{color:var(--danger);}
.like-btn.liked{color:var(--danger);}
.like-btn:active{transform:scale(.88);}

/* ── Плейлисты ── */
.playlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
@media(max-width:600px){.playlist-grid{grid-template-columns:repeat(2,1fr);gap:10px;}}
.playlist-card{background:var(--card);border:1px solid var(--border);border-radius:1.4rem;padding:16px;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;gap:8px;}
.playlist-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.09);}
.playlist-card-cover{width:100%;aspect-ratio:1;border-radius:1rem;background:linear-gradient(135deg,var(--primary),#7aa2ff);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;margin-bottom:4px;}
.playlist-card-name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.playlist-card-meta{color:var(--muted);font-size:12px;}
.add-to-playlist-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:3px 8px;font-size:12px;cursor:pointer;color:var(--muted);transition:border-color .15s,color .15s;flex-shrink:0;}
.add-to-playlist-btn:hover{border-color:var(--primary);color:var(--primary);}

/* ── Социальные ссылки в профиле/настройках ── */
.social-links-row{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 14px;}
.social-link-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;background:var(--accent);color:var(--fg);font-size:13px;font-weight:600;border:1px solid var(--border);transition:.15s;}
.social-link-badge:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-1px);}
.social-link-badge .sl-ic{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.social-links-form{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;}
@media(max-width:560px){.social-links-form{grid-template-columns:1fr;}}
.friends-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;align-items:start;}
@media(max-width:760px){.friends-grid{grid-template-columns:1fr;gap:16px;}}
.social-field label{display:flex;align-items:center;gap:6px;}

/* ═══════════════════════════════════════════════════════
   ГЛОБАЛЬНЫЙ МУЗЫКАЛЬНЫЙ ПЛЕЕР (как в Spotify/VK/Яндекс.Музыке)
   ═══════════════════════════════════════════════════════ */
.gplayer-spacer{height:0;flex-shrink:0;transition:height .25s ease;}
.gplayer-spacer.active{height:78px;}
@media(max-width:760px){.gplayer-spacer.active{height:142px;}}
.gplayer{position:fixed;left:0;right:0;bottom:0;z-index:60;background:color-mix(in srgb,var(--card) 96%,transparent);backdrop-filter:blur(14px);border-top:1px solid var(--border);box-shadow:0 -4px 24px rgba(0,0,0,.08);
  display:flex;align-items:center;gap:16px;padding:10px 22px;transform:translateY(110%);opacity:0;transition:transform .32s cubic-bezier(.22,1,.36,1),opacity .32s ease;}
.gplayer.show{transform:translateY(0);opacity:1;}
@media(max-width:760px){.gplayer{bottom:64px;padding:8px 12px;flex-wrap:wrap;gap:8px;}}
body.has-gplayer .main{padding-bottom:112px;}
@media(max-width:760px){body.has-gplayer .main{padding-bottom:176px;}}
.gplayer-track{display:flex;align-items:center;gap:12px;min-width:0;flex:1 1 220px;}
.gplayer-cover{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#7aa2ff);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;box-shadow:0 3px 10px color-mix(in srgb,var(--primary) 35%,transparent);}
.gplayer-cover img{width:100%;height:100%;object-fit:cover;}
.gplayer-cover .gp-spin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);}
.gplayer-spinner{width:20px;height:20px;border-radius:999px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;animation:gpspin .7s linear infinite;}
@keyframes gpspin{to{transform:rotate(360deg);}}
.gplayer-meta{min-width:0;}
.gplayer-title{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.gplayer-artist{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.gplayer-center{display:flex;flex-direction:column;align-items:center;gap:6px;flex:2 1 320px;min-width:0;}
.gplayer-controls{display:flex;align-items:center;gap:14px;}
.gp-btn{background:none;border:none;color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:999px;transition:.15s;opacity:.75;}
.gp-btn:hover{opacity:1;background:var(--accent);}
.gp-btn.gp-active{color:var(--primary);opacity:1;}
.gp-play-main{width:38px;height:38px;background:var(--primary);color:#fff;opacity:1;box-shadow:0 3px 10px color-mix(in srgb,var(--primary) 40%,transparent);}
.gp-play-main:hover{background:var(--primary);opacity:.9;}
.gplayer-seek-row{display:flex;align-items:center;gap:10px;width:100%;}
.gplayer-lyrics{width:100%;max-height:34px;overflow-y:auto;font-size:11.5px;line-height:1.4;color:var(--muted);white-space:pre-wrap;text-align:center;margin-top:2px;}
.gplayer-lyrics-empty{opacity:.6;font-style:italic;}
.gp-time{font-size:11px;color:var(--muted);width:36px;flex-shrink:0;text-align:center;font-variant-numeric:tabular-nums;}
.gp-seek{flex:1;height:4px;border-radius:99px;background:var(--border);position:relative;cursor:pointer;}
.gp-seek-fill{height:100%;background:var(--primary);border-radius:99px;pointer-events:none;position:relative;transition:width .1s linear;}
.gp-seek-fill::after{content:"";position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:999px;background:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.3);opacity:0;transition:opacity .15s;}
.gp-seek:hover .gp-seek-fill::after{opacity:1;}
.gplayer-right{display:flex;align-items:center;gap:10px;flex:1 1 160px;justify-content:flex-end;min-width:0;}
.gp-vol-wrap{display:flex;align-items:center;gap:6px;}
.gp-repeat-btn{position:relative;}
.gp-repeat-badge{position:absolute;top:-2px;right:-2px;background:var(--primary);color:#fff;font-size:8.5px;font-weight:800;line-height:1;border-radius:999px;width:12px;height:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--card);}
@media(max-width:760px){.gplayer-center{order:3;flex-basis:100%;}.gplayer-right{order:2;}}

/* ══ АУДИОЗВОНКИ ══ */
.call-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,#000 55%,transparent);backdrop-filter:blur(6px);padding:20px;animation:callFadeIn .2s ease;}
@keyframes callFadeIn{from{opacity:0;}to{opacity:1;}}
.call-card{background:var(--card);border-radius:28px;padding:36px 28px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center;}
.call-avatar{width:96px;height:96px;border-radius:50%;overflow:hidden;background:var(--primary);color:var(--primary-fg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:32px;margin-bottom:8px;flex-shrink:0;position:relative;}
.call-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.call-avatar.ringing::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px solid var(--primary);animation:callPulse 1.4s ease-out infinite;}
@keyframes callPulse{0%{transform:scale(.85);opacity:.9;}100%{transform:scale(1.35);opacity:0;}}
.call-name{font-size:19px;font-weight:800;}
.call-status{color:var(--muted);font-size:14px;min-height:20px;}
.call-timer{color:var(--fg);font-size:14px;font-variant-numeric:tabular-nums;font-weight:600;}
.call-controls{display:flex;align-items:center;gap:18px;margin-top:22px;}
.call-btn{width:56px;height:56px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,opacity .15s;background:var(--accent);color:var(--fg);}
.call-btn:hover{transform:scale(1.06);}
.call-btn.active{background:var(--primary);color:var(--primary-fg);}
.call-btn-accept{background:var(--green);color:#fff;}
.call-btn-decline,.call-btn-end{background:var(--danger);color:#fff;}
.call-bubble{display:flex;align-items:center;gap:6px;font-style:italic;}
@media(max-width:480px){.call-card{max-width:100%;border-radius:22px;padding:28px 20px;}.call-avatar{width:84px;height:84px;font-size:28px;}}

/* ── Экран загрузки страницы (обновлённый) ── */
.page-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;min-height:100dvh;padding:24px;text-align:center;animation:loaderFadeIn .55s ease both;}
@keyframes loaderFadeIn{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.loader-frog-wrap{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center;}
.loader-frog{font-size:54px;line-height:1;animation:hop 1.35s ease-in-out infinite;will-change:transform;}
@keyframes hop{
  0%,100%{transform:translateY(0) scale(1,1);}
  15%{transform:translateY(2px) scale(1.08,.9);}
  40%{transform:translateY(-30px) scale(.94,1.08);}
  55%{transform:translateY(-30px) scale(.94,1.08);}
  80%{transform:translateY(2px) scale(1.08,.9);}
}
.loader-frog-shadow{position:absolute;bottom:2px;left:50%;width:44px;height:10px;border-radius:999px;background:radial-gradient(closest-side,rgba(0,0,0,.22),transparent);transform:translateX(-50%);animation:hopShadow 1.35s ease-in-out infinite;}
@keyframes hopShadow{
  0%,100%{opacity:.55;transform:translateX(-50%) scale(1);}
  40%,55%{opacity:.2;transform:translateX(-50%) scale(.55);}
}
.loader-dots{display:flex;align-items:center;gap:12px;}
.loader-dot{width:11px;height:11px;border-radius:999px;background:var(--border);transform:scale(1);animation:dotActive 1.2s ease-in-out infinite;}
.loader-dot:nth-child(1){animation-delay:0s;}
.loader-dot:nth-child(2){animation-delay:.15s;}
.loader-dot:nth-child(3){animation-delay:.3s;}
@keyframes dotActive{
  0%,100%{background:var(--border);box-shadow:none;transform:scale(1);}
  35%{background:#7bdc4a;box-shadow:0 0 8px 2px rgba(123,220,74,.55),0 0 18px 4px rgba(123,220,74,.28);transform:scale(1.35);}
  70%{background:var(--primary);box-shadow:0 0 8px 1px color-mix(in srgb,var(--primary) 55%,transparent);transform:scale(1.05);}
}
.loader-text{font-size:13.5px;font-weight:700;color:var(--muted);letter-spacing:.3px;animation:loaderTextPulse 1.8s ease-in-out infinite;}
@keyframes loaderTextPulse{0%,100%{opacity:.65;}50%{opacity:1;}}
@media(max-width:480px){.loader-frog{font-size:42px;}.loader-frog-wrap{width:76px;height:76px;}.loader-dot{width:9px;height:9px;}.loader-text{font-size:12.5px;}}

/* ── Обновлённый ползунок громкости (свечение + плавный след) ── */
.gp-vol{position:relative;width:84px;height:6px;border-radius:99px;background:var(--border);cursor:pointer;touch-action:none;}
.gp-vol-fill{position:relative;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),#7bdc4a);background-size:220% 100%;transition:width .12s cubic-bezier(.4,0,.2,1),box-shadow .2s;box-shadow:0 0 6px 1px color-mix(in srgb,var(--primary) 45%,transparent);}
.gp-vol-fill::after{content:"";position:absolute;top:50%;right:0;transform:translate(50%,-50%) scale(.7);width:13px;height:13px;border-radius:999px;background:#fff;box-shadow:0 0 0 2px var(--primary),0 0 10px 3px color-mix(in srgb,var(--primary) 55%,transparent);opacity:0;transition:opacity .15s ease,transform .15s ease;}
.gp-vol:hover .gp-vol-fill::after{opacity:1;transform:translate(50%,-50%) scale(1);}
.gp-vol.dragging{cursor:grabbing;}
.gp-vol.dragging .gp-vol-fill{box-shadow:0 0 14px 3px color-mix(in srgb,var(--primary) 65%,transparent);animation:volTrail .9s linear infinite;}
.gp-vol.dragging .gp-vol-fill::after{opacity:1;transform:translate(50%,-50%) scale(1.25);}
@keyframes volTrail{0%{background-position:0% 50%;}100%{background-position:220% 50%;}}
@media(max-width:900px){.gp-vol{width:60px;}}
@media(max-width:420px){.gp-vol{width:44px;}}

/* ══ ОНЛАЙН-СТАТУС ══ */
.online-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--green);}
.online-badge .odot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;}
.offline-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.offline-badge .odot{width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block;flex-shrink:0;}
.privacy-hidden-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-style:italic;}
.avatar-wrap{position:relative;display:inline-block;flex-shrink:0;}
.avatar-wrap .online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--card);}
.avatar-wrap .offline-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--border);border:2px solid var(--card);}

/* ══ РАЗДЕЛ СКОРО + 404-АНИМАЦИЯ ══ */

.face__eye-lid{animation:lc-eyelid 4s 1.3s cubic-bezier(.65,0,.35,1) infinite;}
.face__mouth-left{animation:lc-mouth-l 1s .3s cubic-bezier(.33,1,.68,1) forwards;}
.face__mouth-right{animation:lc-mouth-r 1s .3s cubic-bezier(.33,1,.68,1) forwards;}
.face__nose{animation:lc-nose 1s .3s cubic-bezier(.65,0,.35,1) forwards;}

.comm-layout{display:flex;flex-direction:column;gap:20px;}

.comm-hero-emoji{font-size:72px;flex-shrink:0;line-height:1;}

.comm-card h3{font-size:16px;font-weight:800;margin:0;}
