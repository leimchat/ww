        r.onclick=()=>{ dropdown.remove(); fn(); }; return r;
      };
      if(canPin||isChannelOwner(ch,viewer)||isAdmin(viewer)){
        dropdown.appendChild(mkRow("📌",cp.pinned?"Открепить":"Закрепить",false,()=>{
          db.channelPosts.filter(p=>p.channelId===ch.id).forEach(p=>p.pinned=false);
          if(!cp.pinned){ cp.pinned=true; ch.pinnedPostId=cp.id; toast("Пост закреплён 📌"); notifyChannelSubscribers(ch,"Новое закреплённое сообщение"); }
          else { ch.pinnedPostId=null; toast("Пост откреплён"); }
          saveDB(db);
          /* Перестраиваем ленту канала без полного render() */
          const feedEl=document.getElementById("chfeed");
          if(feedEl){ feedEl.innerHTML=""; const allPosts=db.channelPosts.filter(p=>p.channelId===ch.id); const pinned2=allPosts.filter(p=>p.pinned); const rest2=allPosts.filter(p=>!p.pinned).sort((a,b)=>b.createdAt-a.createdAt); [...pinned2,...rest2].forEach(pst=>feedEl.appendChild(makeChPostCard(pst,ch,viewer))); } else { render(); }
        }));
      }
      if(canDel||isMyPost){
        dropdown.appendChild(mkRow(S.trash,"Удалить пост",true,()=>{
          if(!confirm("Удалить этот пост?")) return;
          const postEl=wrap;
          removeEntity("channelPosts",cp.id);
          db.channelComments=db.channelComments.filter(c=>c.postId!==cp.id);
          if(ch.pinnedPostId===cp.id) ch.pinnedPostId=null;
          saveDB(db);
          /* Мгновенно убираем пост из DOM без перезагрузки всей страницы */
          if(postEl&&postEl.parentNode){ postEl.style.transition="opacity .2s"; postEl.style.opacity="0"; setTimeout(()=>{ if(postEl.parentNode) postEl.parentNode.removeChild(postEl); },200); }
          toast("Пост удалён");
        }));
      }
      document.body.appendChild(dropdown);
      /* Позиционируем dropdown около кнопки (position:fixed) */
      const btnRect=e.currentTarget.getBoundingClientRect();
      const dropW=dropdown.offsetWidth||200;
      let left=btnRect.right-dropW;
      let top=btnRect.bottom+4;
      if(left<8) left=8;
      if(top+220>window.innerHeight) top=btnRect.top-220;
      dropdown.style.left=left+"px";
      dropdown.style.top=top+"px";
      setTimeout(()=>document.addEventListener("click",function h(){ dropdown.remove(); document.removeEventListener("click",h); }),50);
    };
  }
  wrap.appendChild(head);

  /* Счётчик просмотров — увеличиваем при попадании поста в видимую область */
  if(!cp._viewCounted){
    const viewObs=new IntersectionObserver((entries)=>{
      entries.forEach(en=>{
        if(en.isIntersecting){
          cp._viewCounted=true;
          cp.views=(cp.views||0)+1;
          saveDB(db);
          /* Обновляем счётчик в DOM */
          const viewEl=wrap.querySelector(".ch-post-views");
          if(viewEl) viewEl.innerHTML=`${S.eye} ${cp.views}`;
          viewObs.disconnect();
        }
      });
    },{threshold:0.5,rootMargin:"0px 0px -60px 0px"});
    /* Запускаем наблюдение после добавления в DOM */
    /* Observe after next paint so wrap is in the DOM */
    const startViewObs=()=>{ if(document.body.contains(wrap)){ viewObs.observe(wrap); } else { requestAnimationFrame(startViewObs); } };
    requestAnimationFrame(startViewObs);
  }

  /* Тело */
  const body=h(`<div class="ch-post-body"></div>`);
  /* Блок «Переслано от» для поста канала */
  if(cp.forwardedFrom){
    const fd=cp.forwardedFrom;
    const srcUser=fd.type==="user"?findUser(fd.id):null;
    const srcCh=fd.type==="channel"?findChannel(fd.id):null;
    const ava=(fd.avatarUrl||srcUser?.avatarUrl||srcCh?.avatarUrl)||null;
    const name=fd.name||(srcUser?srcUser.displayName:null)||(srcCh?srcCh.title:null)||"Удалённый аккаунт";
    const iniStr=name.trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";
    const avaHtml=ava?`<img src="${esc(ava)}">`:`<span>${esc(iniStr)}</span>`;
    const fwdBlock=h(`<div class="fwd-from-block" title="Перейти к оригиналу">
      <div class="fwd-from-header"><div class="fwd-from-ava">${avaHtml}</div><span class="fwd-from-label">Переслано от: ${esc(name)}</span></div>
      ${fd.originalText?`<div class="fwd-from-text">${esc(fd.originalText.slice(0,220))}${fd.originalText.length>220?"…":""}</div>`:""}
    </div>`);
    fwdBlock.onclick=(e)=>{
      e.stopPropagation();
      if(fd.type==="user") nav("profile",{userId:fd.id});
      else if(fd.type==="channel") nav("channelPage",{channelId:fd.id});
    };
    body.appendChild(fwdBlock);
  }
  if(cp.content){
    const p=document.createElement("div");
    p.className="ch-post-text"; p.innerHTML=renderChText(cp.content);
    body.appendChild(p);
  }
  const images=(cp.attachments||[]).filter(a=>a.type&&(a.type.startsWith("image/")||a.type.includes("gif")));
  const other=(cp.attachments||[]).filter(a=>!(a.type&&(a.type.startsWith("image/")||a.type.includes("gif"))));
  if(images.length){
    const iw=h(`<div class="ch-post-image-wrap"></div>`);
    images.forEach(img=>{
      const el=h(`<img src="${esc(img.url)}" alt="${esc(img.name||"")}" loading="lazy">`);
      el.onclick=()=>{ const ov=h(`<div class="modal-overlay" style="background:rgba(0,0,0,.88);cursor:zoom-out;"><img src="${esc(img.url)}" style="max-width:95vw;max-height:90vh;border-radius:12px;display:block;margin:auto;"></div>`); ov.onclick=()=>ov.remove(); document.body.appendChild(ov); };
      iw.appendChild(el);
    });
    body.appendChild(iw);
  }
  if(other.length){
    const aw=h(`<div class="ch-post-attachments"></div>`);
    other.forEach(f=>{ const a=h(`<a class="ch-post-attachment" href="${esc(f.url)}" target="_blank" rel="noopener">${attachIcon(f.type)} ${esc(f.name||"Файл")}</a>`); aw.appendChild(a); });
    body.appendChild(aw);
  }
  wrap.appendChild(body);

  /* Реакции — разбивка по типам */
  const reactSummary=h(`<div class="ch-react-summary" id="rs_${cp.id}"></div>`);
  function buildReactSummary(){
    reactSummary.innerHTML="";
    reactions.forEach(em=>{
      const arr=cp.reactions[em]||[];
      if(!arr.length) return;
      const mine=arr.includes(viewer.id);
      const btn=h(`<button class="ch-react-pill ${mine?"ch-react-mine":""}" title="${em} · ${arr.length}">${em} <span>${arr.length}</span></button>`);
      btn.onclick=()=>{ toggleChannelReaction(cp,ch,viewer.id,em); buildReactSummary(); updateFooterReact(); };
      reactSummary.appendChild(btn);
    });
  }
  buildReactSummary();
  body.appendChild(reactSummary);

  /* Нижняя панель */
  const footer=h(`<div class="ch-post-footer">
    <button class="ch-act" id="chreactBtn" title="Реакция">${myReact||"😊"}</button>
    ${ch.commentsEnabled?`<button class="ch-act" id="chcommBtn">${S.comment} <span>${chComments.length||""}</span></button>`:""}
    <button class="ch-act-fwd" id="chfwdBtn">${S.repost} Переслать</button>
    <span class="ch-post-views">${S.eye} ${cp.views||0}</span>
    ${isMyPost&&!canManage?`<button class="act-del" id="chDelOwnBtn" title="Удалить свой пост" style="margin-left:auto;">${S.trash}</button>`:""}
  </div>`);

  function updateFooterReact(){
    const mr=getChannelPostReaction(cp,viewer.id);
    const btn=footer.querySelector("#chreactBtn"); if(btn) btn.textContent=mr||"😊";
  }

  /* Пикер реакций */
  footer.querySelector("#chreactBtn").onclick=(e)=>{
    e.stopPropagation();
    document.getElementById("chreactpicker")?.remove();
    const picker=h(`<div id="chreactpicker" style="position:fixed;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:10px 12px;box-shadow:0 6px 28px rgba(0,0,0,.2);z-index:300;max-width:320px;"></div>`);
    /* Показываем разрешённые реакции канала */
    const row=h(`<div style="display:flex;flex-wrap:wrap;gap:4px;"></div>`);
    reactions.forEach(em=>{
      const mine=getChannelPostReaction(cp,viewer.id)===em;
      const btn=h(`<button style="font-size:22px;padding:4px 6px;border-radius:10px;border:none;cursor:pointer;background:${mine?"var(--accent)":"none"};transition:.1s;" title="${em}">${em}</button>`);
      btn.onmouseenter=()=>{ btn.style.transform="scale(1.25)"; };
      btn.onmouseleave=()=>{ btn.style.transform=""; };
      btn.onclick=()=>{ toggleChannelReaction(cp,ch,viewer.id,em); picker.remove(); buildReactSummary(); updateFooterReact(); };
      row.appendChild(btn);
    });
    picker.appendChild(row);
    const r=e.currentTarget.getBoundingClientRect();
    picker.style.bottom=(window.innerHeight-r.top+8)+"px";
    picker.style.left=Math.min(r.left,window.innerWidth-340)+"px";
    document.body.appendChild(picker);
    setTimeout(()=>document.addEventListener("click",function h(){ picker.remove(); document.removeEventListener("click",h); }),50);
  };

  /* Переслать */
  footer.querySelector("#chfwdBtn").onclick=()=>{
    openForwardModal(viewer,{
      text: cp.content||"",
      attachments: cp.attachments||[],
      sourceLabel: "Пост из канала «"+ch.title+"»",
      sourceType: "channel",
      sourceId: ch.id,
      sourceName: ch.title,
      sourceAvatarUrl: ch.avatarUrl||null,
      originalPostId: cp.id,
    });
  };

  /* Удаление автором своего поста */
  const chDelOwnBtn=footer.querySelector("#chDelOwnBtn");
  if(chDelOwnBtn) chDelOwnBtn.onclick=()=>{
    if(!confirm("Удалить свой пост?")) return;
    removeEntity("channelPosts",cp.id);
    db.channelComments=db.channelComments.filter(c=>c.postId!==cp.id);
    if(ch.pinnedPostId===cp.id) ch.pinnedPostId=null;
    saveDB(db);
    /* Мгновенно убираем из DOM */
    wrap.style.transition="opacity .2s"; wrap.style.opacity="0";
    setTimeout(()=>{ if(wrap.parentNode) wrap.parentNode.removeChild(wrap); },200);
    toast("Пост удалён");
  };

  wrap.appendChild(footer);

  /* Счётчик просмотров — IntersectionObserver. 
     Используем cp.viewedBy (постоянный в БД) вместо cp._viewCounted (сбрасывается при reload) */
  if(!cp.viewedBy) cp.viewedBy=[];
  if(!cp.viewedBy.includes(viewer.id)){
    const viewObs=new IntersectionObserver((entries)=>{
      if(entries[0].isIntersecting){
        if(!cp.viewedBy.includes(viewer.id)){
          cp.viewedBy.push(viewer.id);
          cp.views=(cp.views||0)+1;
          saveDB(db);
          const viewEl=wrap.querySelector(".ch-post-views");
          if(viewEl) viewEl.innerHTML=`${S.eye} ${cp.views}`;
        }
        viewObs.disconnect();
      }
    },{threshold:0.5,rootMargin:"0px 0px -60px 0px"});
    const tryObserve=()=>{ if(document.body.contains(wrap)) viewObs.observe(wrap); else requestAnimationFrame(tryObserve); };
    requestAnimationFrame(tryObserve);
  }

  /* Секция комментариев */
  let commSection=null;
  const commBtn=footer.querySelector("#chcommBtn");
  if(commBtn){
    commBtn.onclick=()=>{
      if(commSection){ commSection.remove(); commSection=null; return; }
      commSection=h(`<div class="ch-comments"></div>`);
      buildChComments();
      wrap.appendChild(commSection);
    };
  }

  function buildChComments(){
    if(!commSection) return;
    commSection.innerHTML="";
    const fresh=db.channelComments.filter(c=>c.postId===cp.id).sort((a,b)=>a.createdAt-b.createdAt);
    if(fresh.length){
      const list=h(`<div class="ch-comment-list"></div>`);
      fresh.forEach(c=>{
        const ca=findUser(c.authorId); if(!ca) return;
        const canDelC=viewer.id===c.authorId||isAdmin(viewer)||chModCan(ch,viewer,"canDeletePosts")||isChannelOwner(ch,viewer);
        const canBanU=isChannelOwner(ch,viewer)||chModCan(ch,viewer,"canBanUsers");
        const ci=h(`<div class="ch-comment-item">
          <div class="avatar" style="width:30px;height:30px;font-size:11px;flex-shrink:0;cursor:pointer;" data-cuid="${ca.id}">${ca.avatarUrl?`<img src="${esc(ca.avatarUrl)}">`:esc(getInitials(ca.displayName))}</div>
          <div class="ch-comment-bubble">
            <div class="ch-comment-meta">
              <span class="ch-comment-name" data-cuid="${ca.id}">${esc(ca.displayName)}${verifiedBadge(ca)}${premiumBadge(ca)}</span>
              <span class="ch-comment-time">${timeAgo(c.createdAt)}</span>
              ${canBanU&&ca.id!==viewer.id?`<button class="ch-comment-del" style="color:var(--danger);margin-left:4px;" data-bancomm="${ca.id}" title="Заблокировать в канале">🚫</button>`:""}
            </div>
            <div style="word-break:break-word;white-space:pre-wrap;">${renderChText(c.content)}</div>
            ${canDelC?`<button class="ch-comment-del" data-delc="${c.id}" title="Удалить">${S.trash}</button>`:""}
          </div>
        </div>`);
        ci.querySelectorAll("[data-cuid]").forEach(el=>el.onclick=()=>nav("profile",{userId:ca.id}));
        const dcb=ci.querySelector("[data-delc]"); if(dcb) dcb.onclick=()=>{ 
          removeEntity("channelComments",c.id); saveDB(db); buildChComments();
          const freshCount=db.channelComments.filter(x=>x.postId===cp.id).length;
          if(commBtn){ const sp=commBtn.querySelector("span"); if(sp) sp.textContent=freshCount; }
        };
        const bbb=ci.querySelector("[data-bancomm]");
        if(bbb) bbb.onclick=()=>{
          if(!confirm(`Заблокировать @${ca.username} в канале?`)) return;
          if(!ch.bannedUserIds) ch.bannedUserIds=[];
          if(!ch.bannedUserIds.includes(ca.id)) ch.bannedUserIds.push(ca.id);
          /* Удаляем все его комментарии в этом канале */
          db.channelComments=db.channelComments.filter(x=>!(x.channelId===ch.id&&x.authorId===ca.id));
          saveDB(db); buildChComments(); toast(`@${ca.username} заблокирован в канале`);
        };
        list.appendChild(ci);
      });
      commSection.appendChild(list);
    }
    if(!ch.commentsEnabled){ commSection.appendChild(h(`<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px 0;">Комментарии отключены</div>`)); return; }
    if(isChBanned(ch,viewer.id)){ commSection.appendChild(h(`<div style="color:var(--danger);font-size:13px;text-align:center;padding:8px 0;">🚫 Вы заблокированы в этом канале</div>`)); return; }
    const canComment=!ch.commentsSubscribersOnly||(ch.subscriberIds||[]).includes(viewer.id)||isChannelAdmin(ch,viewer);
    if(!canComment){ commSection.appendChild(h(`<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px 0;">Комментарии только для подписчиков</div>`)); return; }
    const cf=h(`<div class="ch-comment-composer">
      <div class="avatar" style="width:30px;height:30px;font-size:11px;flex-shrink:0;">${viewer.avatarUrl?`<img src="${esc(viewer.avatarUrl)}">`:esc(getInitials(viewer.displayName))}</div>
      <input placeholder="Написать комментарий…" id="chinput" maxlength="1000"/>
      <button title="Отправить">${S.send}</button>
    </div>`);
    function sendChComment(){
      const inp=cf.querySelector("#chinput"),val=inp.value.trim(); if(!val) return;
      db.channelComments.push({id:nid(),postId:cp.id,channelId:ch.id,authorId:viewer.id,content:val,createdAt:Date.now()});
      saveDB(db); inp.value=""; buildChComments();
      const freshCount=db.channelComments.filter(c=>c.postId===cp.id).length;
      if(commBtn){ const sp=commBtn.querySelector("span"); if(sp) sp.textContent=freshCount; }
    }
    cf.querySelector("button").onclick=sendChComment;
    cf.querySelector("#chinput").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChComment(); } });
    commSection.appendChild(cf);
  }
  return wrap;
}

/* ═══════════════════════════════════════════════════════
   COMPOSER — редактор с форматированием
   ═══════════════════════════════════════════════════════ */
function makeChComposer(ch,user){
  const pendingFiles=[];
  const wrap=h(`<div class="ch-composer"></div>`);

  /* Панель форматирования */
  const fmtBar=h(`<div class="ch-fmt-bar">
    <button class="ch-fmt-btn" data-fmt="**" data-end="**" title="Жирный (Ctrl+B)"><b>Ж</b></button>
    <button class="ch-fmt-btn" data-fmt="_"  data-end="_"  title="Курсив (Ctrl+I)"><i>К</i></button>
    <button class="ch-fmt-btn" data-fmt="++" data-end="++" title="Подчёркнутый"><u>П</u></button>
    <button class="ch-fmt-btn" data-fmt="~~" data-end="~~" title="Зачёркнутый"><s>З</s></button>
    <button class="ch-fmt-btn" data-fmt="\`" data-end="\`" title="Код"><code style="font-size:11px;">код</code></button>
    <button class="ch-fmt-btn" data-fmt="||" data-end="||" title="Спойлер">👁</button>
    <div class="ch-fmt-sep"></div>
    <button class="ch-fmt-btn" id="chPreviewBtn" title="Предпросмотр">👁 Просмотр</button>
  </div>`);
  wrap.appendChild(fmtBar);

  const ta=h(`<textarea class="ch-composer-ta" placeholder="Написать публикацию…&#10;**жирный**, _курсив_, ++подчёркнутый++, ~~зачёркнутый~~, \`код\`, ||спойлер||" rows="4"></textarea>`);
  const preview=h(`<div class="ch-composer-preview" style="display:none;"></div>`);
  wrap.appendChild(ta);
  wrap.appendChild(preview);

  /* Применение форматирования */
  fmtBar.querySelectorAll(".ch-fmt-btn[data-fmt]").forEach(btn=>{
    btn.onclick=()=>{
      const start=ta.selectionStart, end=ta.selectionEnd;
      const val=ta.value, sel=val.substring(start,end);
      const f=btn.dataset.fmt, e2=btn.dataset.end;
      ta.focus();
      document.execCommand("insertText",false,f+(sel||"текст")+e2);
      if(!sel){ ta.selectionStart=start+f.length; ta.selectionEnd=start+f.length+(sel||"текст").length; }
    };
  });

  /* Горячие клавиши */
  ta.addEventListener("keydown",e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==="b"){ e.preventDefault(); fmtBar.querySelector('[data-fmt="**"]').click(); }
    if((e.ctrlKey||e.metaKey)&&e.key==="i"){ e.preventDefault(); fmtBar.querySelector('[data-fmt="_"]').click(); }
  });

  /* Предпросмотр */
  let showPrev=false;
  fmtBar.querySelector("#chPreviewBtn").onclick=()=>{
    showPrev=!showPrev;
    if(showPrev){
      preview.innerHTML=`<div class="ch-post-text">${renderChText(ta.value)||"<span style='color:var(--muted)'>Нет текста</span>"}</div>`;
      preview.style.display="block"; ta.style.display="none";
      fmtBar.querySelector("#chPreviewBtn").textContent="✏️ Редактировать";
    } else {
      preview.style.display="none"; ta.style.display="";
      fmtBar.querySelector("#chPreviewBtn").textContent="👁 Просмотр";
    }
  };

  const fileChips=h(`<div class="ch-file-chips"></div>`);
  function refreshChips(){
    fileChips.innerHTML="";
    pendingFiles.forEach((f,i)=>{
      const chip=h(`<div class="ch-file-chip">${attachIcon(f.type)} ${esc(f.name.length>24?f.name.slice(0,22)+"…":f.name)}<button data-rm="${i}" title="Убрать">×</button></div>`);
      chip.querySelector("[data-rm]").onclick=()=>{ pendingFiles.splice(i,1); refreshChips(); };
      fileChips.appendChild(chip);
    });
  }

  const toolbar=h(`<div class="ch-composer-toolbar"></div>`);
  const attLabel=h(`<label class="ch-attach-label" title="Прикрепить файлы">${S.upload} Прикрепить<input type="file" multiple accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.rar,.gif"/></label>`);
  attLabel.querySelector("input").onchange=e=>{ Array.from(e.target.files||[]).forEach(f=>pendingFiles.push(f)); refreshChips(); e.target.value=""; };
  toolbar.appendChild(attLabel);

  const pubBtn=h(`<button class="btn btn-primary btn-sm">📢 Опубликовать</button>`);
  pubBtn.onclick=async()=>{
    const text=ta.value.trim();
    if(!text&&!pendingFiles.length){ toast("Добавьте текст или прикрепите файл"); return; }
    pubBtn.disabled=true; pubBtn.textContent="Загрузка…";
    const attachments=[];
    for(const f of pendingFiles){
      const url=await new Promise(res=>{ const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.readAsDataURL(f); });
      attachments.push({name:f.name,type:f.type,url});
    }
    const newCp={id:nid(),channelId:ch.id,authorId:user.id,content:text,attachments,reactions:{},views:0,reposts:0,pinned:false,createdAt:Date.now()};
    db.channelPosts.unshift(newCp);
    saveDB(db);
    ta.value=""; pendingFiles.length=0; refreshChips();
    if(showPrev){ showPrev=false; preview.style.display="none"; ta.style.display=""; fmtBar.querySelector("#chPreviewBtn").textContent="👁 Просмотр"; }
    pubBtn.disabled=false; pubBtn.textContent="📢 Опубликовать";
    notifyChannelSubscribers(ch,"Новая публикация");
    /* Вставляем новый пост в DOM без полного перерендера */
    const feedEl=document.getElementById("chfeed");
    if(feedEl){
      const empty=feedEl.querySelector(".empty"); if(empty) empty.remove();
      feedEl.insertBefore(makeChPostCard(newCp,ch,user),feedEl.firstChild);
    } else { render(); }
    toast("Опубликовано! 📢");
  };
  toolbar.appendChild(pubBtn);
  wrap.appendChild(fileChips);
  wrap.appendChild(toolbar);
  return wrap;
}

/* ═══════════════════════════════════════════════════════
   СТРАНИЦА КАНАЛА
   ═══════════════════════════════════════════════════════ */
function renderChannelPage(user,channelId){
  const ch=findChannel(channelId);
  const frag=h(`<div></div>`);
  if(!ch){
    frag.appendChild(h(`<div class="empty"><div class="icon-circle">${S.channel}</div><h3>Канал не найден</h3></div>`));
    return frag;
  }

  let subbed=isSubscribed(ch,user);
  const owner=isChannelOwner(ch,user);
  const canManage=isChannelAdmin(ch,user)||isAdmin(user);
  const postsCount=db.channelPosts.filter(p=>p.channelId===ch.id).length;
  const subsCount=(ch.subscriberIds||[]).length;

  const back=h(`<button class="btn btn-outline btn-sm" style="margin-bottom:16px;">← К каналам</button>`);
  back.onclick=()=>nav("channels");
  frag.appendChild(back);

  if(ch.blocked&&!isAdmin(user)){
    frag.appendChild(h(`<div class="ch-post" style="padding:40px;text-align:center;"><div style="font-size:40px;">🚫</div><h3>Канал заблокирован администратором</h3></div>`));
    return frag;
  }

  /* Шапка канала */
  const pageCard=h(`<div class="channel-page-card">
    <div class="channel-page-inner">
      <div class="channel-hero">${ch.bannerUrl?`<img src="${esc(ch.bannerUrl)}" alt="баннер">`:""}</div>
    </div>
    <div class="channel-page-info">
      <div class="channel-page-avatar-wrap">
        <div class="avatar channel-page-avatar">${ch.avatarUrl?`<img src="${esc(ch.avatarUrl)}">`:(esc(getInitials(ch.title)||"?"))}</div>
      </div>
      <div class="channel-page-name">
        ${esc(ch.title)}
        ${ch.verified?`<span class="verified-icon">${S.check}</span>`:""}
        ${ch.isPrivate?`<span class="privacy-badge private">${S.lock} Приватный</span>`:`<span class="privacy-badge">${S.unlock} Публичный</span>`}
        ${ch.blocked?`<span class="privacy-badge private">🚫 Заблок.</span>`:""}
      </div>
      ${ch.username?`<div class="channel-page-username">@${esc(ch.username)}</div>`:""}
      ${ch.category?`<div style="margin:4px 0 8px;"><span class="cat-btn active" style="cursor:default;font-size:12px;">${esc(ch.category)}</span></div>`:""}
      ${ch.description?`<p class="channel-page-desc">${esc(ch.description)}</p>`:""}
      <div class="channel-stat-row">
        <span><b id="chSubCountEl">${subsCount}</b> подписчиков</span>
        <span><b>${postsCount}</b> публикаций</span>
        <span>Создан ${timeAgo(ch.createdAt)}</span>
      </div>
      <div class="channel-actions" id="chactions"></div>
      <div style="margin-top:12px;" id="chreact_bar"></div>
    </div>
  </div>`);

  /* Панель разрешённых реакций (отображение) */
  const reactBar=pageCard.querySelector("#chreact_bar");
  const rList=chReactions(ch);
  const rb=h(`<div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;"><span style="font-size:12px;color:var(--muted);margin-right:4px;">Реакции:</span></div>`);
  rList.forEach(em=>rb.appendChild(h(`<span style="font-size:18px;" title="${em}">${em}</span>`)));
  reactBar.appendChild(rb);

  const actions=pageCard.querySelector("#chactions");

  /* Подписка */
  if(!isChBanned(ch,user.id)){
    const subBtn=h(`<button class="sub-btn ${subbed?"subscribed":"not-subscribed"}">${subbed?`${S.check} Подписан`:`${S.channel} Подписаться`}</button>`);
    subBtn.onclick=async()=>{
      const prev={...db, channels: db.channels.map(x=>x.id===ch.id?{...x,subscriberIds:[...(x.subscriberIds||[])]}:x)};
      if(!ch.subscriberIds) ch.subscriberIds=[];
      if(subbed){
        ch.subscriberIds=ch.subscriberIds.filter(id=>id!==user.id);
        subbed=false;
        subBtn.className="sub-btn not-subscribed";
        subBtn.innerHTML=`${S.channel} Подписаться`;
      } else {
        ch.subscriberIds.push(user.id);
        subbed=true;
        subBtn.className="sub-btn subscribed";
        subBtn.innerHTML=`${S.check} Подписан`;
      }
      /* Обновляем счётчик подписчиков в шапке канала без полного перерендера */
      const subCountEl=pageCard.querySelector("#chSubCountEl");
      if(subCountEl) subCountEl.textContent=(ch.subscriberIds||[]).length;
      /* Раньше здесь просто вызывался saveDB(db) без проверки результата —
         если сохранение в Supabase падало (нет прав, оффлайн и т.п.),
         подписка тихо терялась при следующей перезагрузке, и никто об
         этом не узнавал. Теперь ждём результат и, если не удалось,
         откатываем UI и показываем причину. */
      const ok=await persistDB(prev,{
        successMsg:subbed?"Вы подписались 📢":"Вы отписались",
        failMsg:subbed?"Не удалось подписаться":"Не удалось отписаться"
      });
      if(ok) notifyChannelSubscribers(ch,subbed?"Новый подписчик":"");
    };
    actions.appendChild(subBtn);
  }

  /* Поделиться */
  const shrBtn=h(`<button class="btn btn-outline btn-sm">${S.share2} Поделиться</button>`);
  shrBtn.onclick=()=>{ if(navigator.clipboard) navigator.clipboard.writeText("@"+(ch.username||ch.title)).then(()=>toast("Скопировано!")); };
  actions.appendChild(shrBtn);

  /* Настройки — только для создателя и модераторов */
  if(canManage){
    const settBtn=h(`<button class="btn btn-outline btn-sm">⚙️ Настройки</button>`);
    settBtn.onclick=()=>openChannelSettingsModal(ch,user);
    actions.appendChild(settBtn);
  }

  /* Статистика — только создатель */
  if(owner||isAdmin(user)){
    const statBtn=h(`<button class="btn btn-outline btn-sm">📊 Статистика</button>`);
    statBtn.onclick=()=>openChannelStatModal(ch);
    actions.appendChild(statBtn);
  }

  frag.appendChild(pageCard);

  /* Поиск */
  const searchWrap=h(`<div class="card" style="padding:12px 16px;margin-bottom:14px;"><input id="chsrch" placeholder="🔍 Поиск по публикациям…" style="width:100%;border:none;background:var(--accent);border-radius:12px;padding:9px 14px;font-size:14px;color:var(--fg);outline:none;"></div>`);
  frag.appendChild(searchWrap);

  if(canPostToChannel(ch,user)) frag.appendChild(makeChComposer(ch,user));

  const feedWrap=h(`<div id="chfeed"></div>`);
  frag.appendChild(feedWrap);

  function buildFeed(term=""){
    feedWrap.innerHTML="";
    let posts=db.channelPosts.filter(p=>p.channelId===ch.id);
    if(term){ const t=term.toLowerCase(); posts=posts.filter(p=>(p.content||"").toLowerCase().includes(t)); }
    const pinned=posts.filter(p=>p.pinned);
    const rest=posts.filter(p=>!p.pinned).sort((a,b)=>b.createdAt-a.createdAt);
    const sorted=[...pinned,...rest];
    if(!sorted.length){ feedWrap.appendChild(h(`<div class="empty"><div class="icon-circle">📢</div><h3>Пока нет публикаций</h3></div>`)); return; }
    sorted.forEach(cp=>feedWrap.appendChild(makeChPostCard(cp,ch,user)));
  }

  searchWrap.querySelector("#chsrch").addEventListener("input",e=>buildFeed(e.target.value.trim()));
  buildFeed();
  return frag;
}

/* ═══════════════════════════════════════════════════════
   СОЗДАНИЕ / РЕДАКТИРОВАНИЕ КАНАЛА
   ═══════════════════════════════════════════════════════ */
function openChannelCreateModal(user,existing){
  const isEdit=!!existing;
  const overlay=h(`<div class="modal-overlay"></div>`);
  const box=h(`<div class="modal-box" style="max-width:520px;">
    <h3>${isEdit?"✏️ Редактировать канал":"➕ Создать канал"}</h3>
    <div class="field"><label>Название *</label><input id="chtitle" placeholder="Название канала" value="${isEdit?esc(existing.title):""}"/></div>
    <div class="field"><label>@username *</label>
      <div style="display:flex;align-items:center;gap:8px;"><span style="color:var(--muted);font-size:16px;font-weight:700;">@</span><input id="chusername" placeholder="username" style="flex:1;" value="${isEdit?esc(existing.username||""):""}"/></div>
    </div>
    <div class="field"><label>Описание</label><textarea id="chdesc" rows="3" style="width:100%;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-family:inherit;font-size:14px;resize:vertical;">${isEdit?esc(existing.description||""):""}</textarea></div>
    <div class="field"><label>Аватар (URL изображения)</label><input id="chavatar" placeholder="https://…" value="${isEdit?esc(existing.avatarUrl||""):""}"/></div>
    <div class="field"><label>Баннер (URL, необязательно)</label><input id="chbanner" placeholder="https://…" value="${isEdit?esc(existing.bannerUrl||""):""}"/></div>
    <div class="field"><label>Категория</label>
      <select id="chcat" style="width:100%;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:var(--bg);color:var(--fg);">
        <option value="">— выберите —</option>
        ${CHANNEL_CATEGORIES.map(c=>`<option value="${esc(c)}" ${isEdit&&existing.category===c?"selected":""}>${esc(c)}</option>`).join("")}
      </select>
    </div>
    <div class="toggle-row"><div><div style="font-weight:600;">Приватный канал</div><div style="color:var(--muted);font-size:12px;">Только по приглашению</div></div><div class="sw-toggle ${isEdit&&existing.isPrivate?"on":""}" id="chpriv"><div class="knob"></div></div></div>
    <div class="toggle-row"><div><div style="font-weight:600;">Комментарии</div></div><div class="sw-toggle ${!isEdit||existing.commentsEnabled?"on":""}" id="chcomm"><div class="knob"></div></div></div>
    <div class="toggle-row"><div><div style="font-weight:600;">Комментарии только подписчикам</div></div><div class="sw-toggle ${isEdit&&existing.commentsSubscribersOnly?"on":""}" id="chcommonly"><div class="knob"></div></div></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="chcancel">Отмена</button>
      <button class="btn btn-primary" id="chsave">${isEdit?"Сохранить":"Создать канал"}</button>
    </div>
  </div>`);

  let priv=isEdit?!!existing.isPrivate:false;
  let commEnabled=isEdit?!!existing.commentsEnabled:true;
  let commOnly=isEdit?!!existing.commentsSubscribersOnly:false;
  const mk=(id,get,set)=>{ const el=box.querySelector(id); el.onclick=()=>{ const v=set(!get()); el.classList.toggle("on",v); }; };
  /* простые переключатели */
  box.querySelector("#chpriv").onclick=()=>{ priv=!priv; box.querySelector("#chpriv").classList.toggle("on",priv); };
  box.querySelector("#chcomm").onclick=()=>{ commEnabled=!commEnabled; box.querySelector("#chcomm").classList.toggle("on",commEnabled); };
  box.querySelector("#chcommonly").onclick=()=>{ commOnly=!commOnly; box.querySelector("#chcommonly").classList.toggle("on",commOnly); };
  box.querySelector("#chcancel").onclick=()=>overlay.remove();
  box.querySelector("#chsave").onclick=()=>{
    const title=box.querySelector("#chtitle").value.trim();
    const username=box.querySelector("#chusername").value.trim().replace(/^@/,"").replace(/\s+/g,"").toLowerCase();
    const desc=box.querySelector("#chdesc").value.trim();
    const avatarUrl=box.querySelector("#chavatar").value.trim()||null;
    const bannerUrl=box.querySelector("#chbanner").value.trim()||null;
    const category=box.querySelector("#chcat").value;
    if(!title){ toast("Введите название"); return; }
    if(!username){ toast("Введите @username"); return; }
    const clash=findChannelByUsername(username);
    if(clash&&(!isEdit||clash.id!==existing.id)){ toast("@username уже занят"); return; }
    if(isEdit){
      Object.assign(existing,{title,username,description:desc,avatarUrl,bannerUrl,category,isPrivate:priv,commentsEnabled:commEnabled,commentsSubscribersOnly:commOnly});
      saveDB(db); overlay.remove(); toast("Канал обновлён ✓");
      /* Перестраиваем страницу канала без полного render() если мы на ней */
      if(route.name==="channelPage"&&route.params.channelId===existing.id){ render(); }
      else if(route.name==="channels") render();
      else render();
    } else {
      const ch={id:nid(),ownerId:user.id,title,username,description:desc,avatarUrl,bannerUrl,category,isPrivate:priv,commentsEnabled:commEnabled,commentsSubscribersOnly:commOnly,verified:false,blocked:false,subscriberIds:[user.id],moderators:[],bannedUserIds:[],allowedReactions:[...CH_DEFAULT_REACTIONS],pinnedPostId:null,createdAt:Date.now()};
      db.channels.push(ch); saveDB(db); overlay.remove(); toast("Канал создан 📢"); nav("channelPage",{channelId:ch.id});
    }
  };
  overlay.appendChild(box);
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
  box.querySelector("#chtitle").focus();
}

/* ═══════════════════════════════════════════════════════
   НАСТРОЙКИ КАНАЛА
   ═══════════════════════════════════════════════════════ */
function openChannelSettingsModal(ch,user){
  const isOwner=isChannelOwner(ch,user)||isAdmin(user);
  const overlay=h(`<div class="modal-overlay"></div>`);
  const box=h(`<div class="modal-box" style="max-width:600px;max-height:90vh;overflow-y:auto;">
    <h3>⚙️ Настройки канала «${esc(ch.title)}»</h3>
    <div class="ch-sett-tabs" id="chstabs">
      ${isOwner?`<button class="ch-sett-tab active" data-stab="edit">✏️ Основные</button>`:""}
      ${isOwner?`<button class="ch-sett-tab" data-stab="reactions">😊 Реакции</button>`:""}
      <button class="ch-sett-tab ${!isOwner?"active":""}" data-stab="moderators">👥 Модераторы</button>
      ${isOwner?`<button class="ch-sett-tab" data-stab="banned">🚫 Заблок. пользователи</button>`:""}
      <button class="ch-sett-tab" data-stab="invite">📨 Пригласить</button>
      ${isOwner?`<button class="ch-sett-tab ch-sett-tab-danger" data-stab="danger">⚠️ Опасная зона</button>`:""}
    </div>
    <div id="chsbody" style="margin-top:16px;"></div>
    <div class="modal-actions" style="margin-top:20px;"><button class="btn btn-outline" id="chsclose">Закрыть</button></div>
  </div>`);

  const body=box.querySelector("#chsbody");
  const tabs=box.querySelectorAll(".ch-sett-tab");
  function showTab(name){
    tabs.forEach(t=>t.classList.toggle("active",t.dataset.stab===name));
    body.innerHTML="";
    if(name==="edit") showSettEdit();
    else if(name==="reactions") showSettReactions();
    else if(name==="moderators") showSettModerators();
    else if(name==="banned") showSettBanned();
    else if(name==="invite") showInvitePanel(body,ch,user);
    else if(name==="danger") showSettDanger();
  }
  tabs.forEach(t=>t.onclick=()=>showTab(t.dataset.stab));
  showTab(isOwner?"edit":"moderators");
  box.querySelector("#chsclose").onclick=()=>overlay.remove();
  overlay.appendChild(box);
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);

  /* ── Вкладка: Основные настройки ── */
  function showSettEdit(){
    body.innerHTML=`<div style="color:var(--muted);font-size:13px;margin-bottom:12px;">Нажмите кнопку ниже, чтобы открыть редактор канала.</div>`;
    const btn=h(`<button class="btn btn-primary btn-sm">✏️ Редактировать канал</button>`);
    btn.onclick=()=>{ overlay.remove(); openChannelCreateModal(user,ch); };
    body.appendChild(btn);
  }

  /* ── Вкладка: Реакции ── */
  function showSettReactions(){
    body.innerHTML="";
    body.appendChild(h(`<div style="font-weight:700;font-size:15px;margin-bottom:4px;">😊 Реакции канала</div>`));
    body.appendChild(h(`<div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Выберите до 10 реакций, которые будут доступны читателям. Нажмите на эмодзи, чтобы добавить/убрать.</div>`));

    if(!ch.allowedReactions) ch.allowedReactions=[...CH_DEFAULT_REACTIONS];
    const selected=new Set(ch.allowedReactions);

    /* Выбранные */
    const selRow=h(`<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;">ВЫБРАНО <span id="selcount">${selected.size}</span>/10</div><div id="selreacts" style="display:flex;flex-wrap:wrap;gap:6px;min-height:36px;background:var(--accent);border-radius:12px;padding:8px 10px;"></div></div>`);
    body.appendChild(selRow);

    function buildSelected(){
      const sr=selRow.querySelector("#selreacts"); sr.innerHTML="";
      selRow.querySelector("#selcount").textContent=selected.size;
      [...selected].forEach(em=>{
        const btn=h(`<button style="font-size:22px;border:2px solid var(--primary);border-radius:10px;padding:3px 7px;background:var(--card);cursor:pointer;" title="Убрать ${em}">${em}</button>`);
        btn.onclick=()=>{ selected.delete(em); buildSelected(); buildAllReacts(); };
        sr.appendChild(btn);
      });
      if(!selected.size) sr.appendChild(h(`<span style="color:var(--muted);font-size:13px;line-height:36px;">Нет выбранных реакций</span>`));
    }

    /* Все реакции по категориям */
    const allWrap=h(`<div id="allreacts"></div>`);
    body.appendChild(allWrap);

    function buildAllReacts(){
      allWrap.innerHTML="";
      Object.entries(CH_ALL_REACTIONS).forEach(([cat,emojis])=>{
        allWrap.appendChild(h(`<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin:10px 0 4px;">${cat.toUpperCase()}</div>`));
        const row=h(`<div style="display:flex;flex-wrap:wrap;gap:4px;"></div>`);
        emojis.forEach(em=>{
          const sel=selected.has(em);
          const btn=h(`<button style="font-size:22px;padding:4px 6px;border-radius:10px;border:2px solid ${sel?"var(--primary)":"transparent"};background:${sel?"var(--accent)":"none"};cursor:pointer;transition:.1s;opacity:${!sel&&selected.size>=10?".35":"1"};" title="${sel?"Убрать":"Добавить"} ${em}">${em}</button>`);
          btn.onclick=()=>{
            if(sel){ selected.delete(em); }
            else if(selected.size<10){ selected.add(em); }
            else { toast("Максимум 10 реакций"); return; }
            buildSelected(); buildAllReacts();
          };
          row.appendChild(btn);
        });
        allWrap.appendChild(row);
      });
    }

    buildSelected(); buildAllReacts();

    const saveBtn=h(`<button class="btn btn-primary btn-sm" style="margin-top:16px;">💾 Сохранить реакции</button>`);
    saveBtn.onclick=()=>{
      ch.allowedReactions=[...selected];
      saveDB(db); toast("Реакции сохранены ✓"); showSettReactions();
    };
    body.appendChild(saveBtn);
  }

  /* ── Вкладка: Модераторы ── */
  function showSettModerators(){
    body.innerHTML="";
    body.appendChild(h(`<div style="font-weight:700;font-size:15px;margin-bottom:4px;">👥 Модераторы канала</div>`));
    body.appendChild(h(`<div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Создатель канала назначает модераторов и настраивает их права.</div>`));

    const mods=ch.moderators||[];

    /* Текущие модераторы */
    const modsWrap=h(`<div id="modslist" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;"></div>`);
    body.appendChild(modsWrap);

    const PERMS=[
      ["canPost","📢 Публиковать посты"],
      ["canDeletePosts","🗑 Удалять посты и комментарии"],
      ["canPinPosts","📌 Закреплять посты"],
      ["canBanUsers","🚫 Блокировать пользователей"],
      ["canInvite","📨 Приглашать подписчиков"],
      ["canEditChannel","✏️ Редактировать описание канала"],
    ];

    function buildModsList(){
      modsWrap.innerHTML="";
      if(!mods.length){ modsWrap.appendChild(h(`<div style="color:var(--muted);font-size:13px;">Модераторов нет</div>`)); }
      mods.forEach((mod,idx)=>{
        const mu=findUser(mod.userId); if(!mu) return;
        const card=h(`<div style="background:var(--accent);border-radius:16px;padding:14px 16px;border:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <div class="avatar" style="width:38px;height:38px;font-size:13px;">${mu.avatarUrl?`<img src="${esc(mu.avatarUrl)}">`:esc(getInitials(mu.displayName))}</div>
            <div style="flex:1;"><div style="font-weight:700;">${esc(mu.displayName)}</div><div style="color:var(--muted);font-size:12px;">@${esc(mu.username)}</div></div>
            ${isOwner?`<button class="btn btn-danger-outline btn-sm" data-remmod="${idx}">Снять</button>`:""}
          </div>
          <div class="ch-perm-grid" id="permgrid_${idx}"></div>
        </div>`);
        const rmBtn=card.querySelector(`[data-remmod]`);
        if(rmBtn) rmBtn.onclick=()=>{ mods.splice(idx,1); if(!ch.moderators) ch.moderators=[]; ch.moderators=mods; saveDB(db); buildModsList(); toast("Модератор снят"); };
        const pg=card.querySelector(`#permgrid_${idx}`);
        if(!mod.permissions) mod.permissions={};
        PERMS.forEach(([key,label])=>{
          const on=!!mod.permissions[key];
          const row=h(`<div class="ch-perm-row ${!isOwner?"ch-perm-readonly":""}">
            <span style="font-size:13px;flex:1;">${label}</span>
            <div class="sw-toggle ${on?"on":""}" id="pt_${idx}_${key}"><div class="knob"></div></div>
          </div>`);
          if(isOwner){
            const tgl=row.querySelector(`#pt_${idx}_${key}`);
            tgl.onclick=()=>{
              mod.permissions[key]=!mod.permissions[key];
              tgl.classList.toggle("on",mod.permissions[key]);
              saveDB(db);
            };
          }
          pg.appendChild(row);
        });
        modsWrap.appendChild(card);
      });
    }
    buildModsList();

    /* Добавить модератора — только для создателя */
    if(isOwner){
      const addBlock=h(`<div><div style="font-weight:600;font-size:13.5px;margin-bottom:8px;">➕ Добавить модератора</div>
        <input id="modsearch" placeholder="Имя или @username…" style="width:100%;padding:9px 12px;border-radius:14px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;outline:none;margin-bottom:8px;">
        <div id="modcandidates" style="max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;"></div>
      </div>`);
      function buildCandidates(term){
        const el=addBlock.querySelector("#modcandidates"); el.innerHTML="";
        const used=new Set(mods.map(m=>m.userId)); used.add(ch.ownerId);
        const list=db.users.filter(u=>!used.has(u.id)&&(!term||u.displayName.toLowerCase().includes(term.toLowerCase())||u.username.toLowerCase().includes(term.toLowerCase()))).slice(0,12);
        list.forEach(u=>{
          const row=h(`<div class="list-row" style="padding:7px 10px;"><div class="list-row-left"><div class="avatar" style="width:32px;height:32px;font-size:12px;">${u.avatarUrl?`<img src="${esc(u.avatarUrl)}">`:esc(getInitials(u.displayName))}</div><div><div style="font-weight:600;font-size:13px;">${esc(u.displayName)}</div><div style="color:var(--muted);font-size:12px;">@${esc(u.username)}</div></div></div><button class="btn btn-primary btn-sm">Назначить</button></div>`);
          row.querySelector("button").onclick=()=>{
            if(!ch.moderators) ch.moderators=[];
            ch.moderators.push({userId:u.id,permissions:{canPost:true,canDeletePosts:false,canPinPosts:false,canBanUsers:false,canInvite:true,canEditChannel:false}});
            saveDB(db); buildModsList(); buildCandidates(""); addBlock.querySelector("#modsearch").value=""; toast(`${u.displayName} назначен модератором ✓`);
          };
          el.appendChild(row);
        });
        if(!list.length) el.appendChild(h(`<div style="color:var(--muted);font-size:13px;padding:8px;">Пользователи не найдены</div>`));
      }
      addBlock.querySelector("#modsearch").addEventListener("input",e=>buildCandidates(e.target.value));
      buildCandidates("");
      body.appendChild(addBlock);
    }
  }

  /* ── Вкладка: Заблокированные ── */
  function showSettBanned(){
    body.innerHTML="";
    body.appendChild(h(`<div style="font-weight:700;font-size:15px;margin-bottom:12px;">🚫 Заблокированные пользователи</div>`));
    const banned=ch.bannedUserIds||[];
    if(!banned.length){ body.appendChild(h(`<div style="color:var(--muted);font-size:13px;">Нет заблокированных</div>`)); }
    const list=h(`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>`);
    banned.forEach(uid=>{
      const bu=findUser(uid); if(!bu) return;
      const row=h(`<div class="list-row" style="padding:8px 12px;"><div class="list-row-left"><div class="avatar" style="width:34px;height:34px;font-size:12px;">${bu.avatarUrl?`<img src="${esc(bu.avatarUrl)}">`:esc(getInitials(bu.displayName))}</div><div><div style="font-weight:600;font-size:13px;">${esc(bu.displayName)}</div><div style="color:var(--muted);font-size:12px;">@${esc(bu.username)}</div></div></div><button class="btn btn-outline btn-sm" data-unban="${uid}">Разблокировать</button></div>`);
      row.querySelector("[data-unban]").onclick=()=>{ ch.bannedUserIds=ch.bannedUserIds.filter(id=>id!==uid); saveDB(db); showSettBanned(); toast(`${bu.displayName} разблокирован`); };
      list.appendChild(row);
    });
    body.appendChild(list);

    /* Заблокировать вручную */
    body.appendChild(h(`<div style="font-weight:600;font-size:13.5px;margin-bottom:8px;">Заблокировать пользователя</div>`));
    const srch=h(`<input placeholder="Поиск пользователя…" style="width:100%;padding:9px 12px;border-radius:14px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;outline:none;margin-bottom:8px;">`);
    const cands=h(`<div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;"></div>`);
    function buildBanCandidates(term){
      cands.innerHTML="";
      const used=new Set(banned); used.add(ch.ownerId);
      const list=db.users.filter(u=>!used.has(u.id)&&u.id!==user.id&&(!term||u.displayName.toLowerCase().includes(term.toLowerCase())||u.username.toLowerCase().includes(term.toLowerCase()))).slice(0,12);
      list.forEach(u=>{
        const row=h(`<div class="list-row" style="padding:7px 10px;"><div class="list-row-left"><div class="avatar" style="width:32px;height:32px;font-size:12px;">${u.avatarUrl?`<img src="${esc(u.avatarUrl)}">`:esc(getInitials(u.displayName))}</div><span style="font-size:13px;">${esc(u.displayName)}</span></div><button class="btn btn-danger-outline btn-sm">Заблокировать</button></div>`);
        row.querySelector("button").onclick=()=>{
          if(!ch.bannedUserIds) ch.bannedUserIds=[];
          ch.bannedUserIds.push(u.id);
          /* Удаляем из подписчиков */
          ch.subscriberIds=(ch.subscriberIds||[]).filter(id=>id!==u.id);
          /* Удаляем его комментарии */
          db.channelComments=db.channelComments.filter(c=>!(c.channelId===ch.id&&c.authorId===u.id));
          saveDB(db); showSettBanned(); toast(`${u.displayName} заблокирован в канале`);
        };
        cands.appendChild(row);
      });
    }
    srch.addEventListener("input",e=>buildBanCandidates(e.target.value));
    buildBanCandidates("");
    body.appendChild(srch); body.appendChild(cands);
  }

  /* ── Вкладка: Опасная зона ── */
  function showSettDanger(){
    body.innerHTML="";
    body.appendChild(h(`<div style="color:var(--danger);font-weight:700;font-size:15px;margin-bottom:14px;">⚠️ Опасная зона</div>`));
    const delBtn=h(`<button class="btn btn-danger-outline" style="width:100%;">${S.trash} Удалить канал навсегда</button>`);
    delBtn.onclick=()=>{
      if(!confirm(`Удалить канал «${ch.title}»? Все посты и комментарии будут уничтожены. Это необратимо.`)) return;
      removeEntity("channels",ch.id);
      db.channelPosts=db.channelPosts.filter(p=>p.channelId!==ch.id);
      db.channelComments=db.channelComments.filter(c=>c.channelId!==ch.id);
      saveDB(db); overlay.remove(); toast("Канал удалён"); nav("channels");
    };
    body.appendChild(delBtn);
  }
}

/* ── Панель приглашения ── */
function showInvitePanel(container,ch,user){
  container.innerHTML="";
  container.appendChild(h(`<div style="font-weight:700;font-size:15px;margin-bottom:12px;">📨 Пригласить в канал</div>`));
  const link="@"+(ch.username||ch.title);
  container.appendChild(h(`<div style="margin-bottom:14px;">
    <div style="color:var(--muted);font-size:13px;margin-bottom:6px;">Ссылка на канал:</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <code style="background:var(--accent);padding:8px 12px;border-radius:10px;font-size:13px;flex:1;word-break:break-all;">${esc(link)}</code>
      <button class="btn btn-primary btn-sm" id="cpylink">Копировать</button>
    </div>
  </div>`));
  container.querySelector("#cpylink").onclick=()=>{ if(navigator.clipboard) navigator.clipboard.writeText(link).then(()=>toast("Ссылка скопирована!")); };
  const friendIds=[...friendIdsOf(user.id)];
  if(friendIds.length){
    container.appendChild(h(`<div style="font-weight:600;font-size:13.5px;margin-bottom:8px;">Пригласить друзей через сообщение:</div>`));
    const fl=h(`<div style="display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;"></div>`);
    friendIds.forEach(fid=>{
      const fr=findUser(fid); if(!fr) return;
      const row=h(`<div class="list-row" style="padding:7px 10px;"><div class="list-row-left"><div class="avatar" style="width:32px;height:32px;font-size:12px;">${fr.avatarUrl?`<img src="${esc(fr.avatarUrl)}">`:esc(getInitials(fr.displayName))}</div><span style="font-size:13px;">${esc(fr.displayName)}</span></div><button class="btn btn-outline btn-sm">Пригласить</button></div>`);
      row.querySelector("button").onclick=()=>{
        const conv=openConvWith(user.id,fr.id);
        db.messages.push({id:nid(),conversationId:conv.id,senderId:user.id,content:`Привет! Подписывайся на канал «${ch.title}» → @${ch.username||ch.title}`,type:"text",createdAt:Date.now()});
        saveDB(db); toast(`Приглашение отправлено ${fr.displayName} ✓`);
      };
      fl.appendChild(row);
    });
    container.appendChild(fl);
  }
}

/* ═══════════════════════════════════════════════════════
   СТАТИСТИКА КАНАЛА
   ═══════════════════════════════════════════════════════ */
function openChannelStatModal(ch){
  const posts=db.channelPosts.filter(p=>p.channelId===ch.id);
  let totalViews=0,totalReact=0,totalRepost=0,totalComm=0;
  posts.forEach(p=>{ totalViews+=p.views||0; totalReact+=totalChReactions(p); totalRepost+=p.reposts||0; totalComm+=db.channelComments.filter(c=>c.postId===p.id).length; });
  const topPosts=[...posts].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,5);
  const overlay=h(`<div class="modal-overlay"></div>`);
  const box=h(`<div class="modal-box" style="max-width:520px;">
    <h3>📊 Статистика «${esc(ch.title)}»</h3>
    <div class="ch-stat-grid">
      <div class="ch-stat-card"><div class="ch-stat-num">${(ch.subscriberIds||[]).length}</div><div class="ch-stat-label">Подписчиков</div></div>
      <div class="ch-stat-card"><div class="ch-stat-num">${posts.length}</div><div class="ch-stat-label">Публикаций</div></div>
      <div class="ch-stat-card"><div class="ch-stat-num">${fmtPlays(totalViews)}</div><div class="ch-stat-label">Просмотров</div></div>
      <div class="ch-stat-card"><div class="ch-stat-num">${totalReact}</div><div class="ch-stat-label">Реакций</div></div>
      <div class="ch-stat-card"><div class="ch-stat-num">${totalRepost}</div><div class="ch-stat-label">Репостов</div></div>
      <div class="ch-stat-card"><div class="ch-stat-num">${totalComm}</div><div class="ch-stat-label">Комментариев</div></div>
      <div class="ch-stat-card"><div class="ch-stat-num">${(ch.moderators||[]).length}</div><div class="ch-stat-label">Модераторов</div></div>
      <div class="ch-stat-card"><div class="ch-stat-num">${(ch.bannedUserIds||[]).length}</div><div class="ch-stat-label">Забанено</div></div>
    </div>
    ${topPosts.length?`<div style="font-weight:700;margin-bottom:10px;">🔥 Топ по просмотрам</div>`:""}
    <div id="stattoplist"></div>
    <div class="modal-actions"><button class="btn btn-outline" id="stclose">Закрыть</button></div>
  </div>`);
  const tl=box.querySelector("#stattoplist");
  topPosts.forEach((p,i)=>{
    tl.appendChild(h(`<div class="list-row" style="padding:8px 10px;align-items:flex-start;gap:10px;">
      <div style="font-size:18px;font-weight:800;color:var(--muted);flex-shrink:0;">${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc((p.content||"(вложение)").slice(0,80))}</div>
        <div style="color:var(--muted);font-size:12px;display:flex;gap:10px;margin-top:2px;">
          <span>${S.eye} ${p.views||0}</span>
          <span>❤️ ${totalChReactions(p)}</span>
          <span>${S.repost} ${p.reposts||0}</span>
          <span>· ${timeAgo(p.createdAt)}</span>
        </div>
      </div>
    </div>`));
  });
  box.querySelector("#stclose").onclick=()=>overlay.remove();
  overlay.appendChild(box);
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

/* ═══════════════════════════════════════════════════════
   ГЛАВНЫЙ ЭКРАН — КАНАЛЫ
   ═══════════════════════════════════════════════════════ */
function renderChannels(user,params={}){
  const tab=params.tab||"all";
  const frag=h(`<div></div>`);

  const header=h(`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;">
    <h1 class="section-title" style="margin:0;">${S.channel} Каналы</h1>
    <button class="btn btn-primary btn-sm" id="createCh">+ Создать канал</button>
  </div>`);
  header.querySelector("#createCh").onclick=()=>openChannelCreateModal(user);
  frag.appendChild(header);

  const tabs=h(`<div style="display:flex;gap:4px;background:var(--accent);border-radius:999px;padding:4px;flex-wrap:wrap;margin-bottom:16px;width:fit-content;">
    <button class="music-tab ${tab==="all"?"music-tab-active":""}" data-tab="all">🌐 Все</button>
    <button class="music-tab ${tab==="subs"?"music-tab-active":""}" data-tab="subs">📢 Подписки</button>
    <button class="music-tab ${tab==="my"?"music-tab-active":""}" data-tab="my">✏️ Мои каналы</button>
  </div>`);
  tabs.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>nav("channels",{tab:b.dataset.tab}));
  frag.appendChild(tabs);

  const searchBox=h(`<div class="searchbox" style="margin-bottom:12px;"><input id="chq" placeholder="🔍 Поиск по названию, @username, категории…"/></div>`);
  frag.appendChild(searchBox);

  let activeCat="";
  const catRow=h(`<div class="channel-cats" id="catrow">
    <button class="cat-btn active" data-cat="">Все</button>
    ${CHANNEL_CATEGORIES.map(c=>`<button class="cat-btn" data-cat="${esc(c)}">${esc(c)}</button>`).join("")}
  </div>`);
  frag.appendChild(catRow);

  const gridWrap=h(`<div></div>`);
  frag.appendChild(gridWrap);

  function buildGrid(){
    gridWrap.innerHTML="";
    const term=searchBox.querySelector("#chq").value.trim().toLowerCase();
    let list=db.channels.filter(ch=>!ch.blocked||isAdmin(user));
    if(tab==="subs") list=list.filter(ch=>(ch.subscriberIds||[]).includes(user.id));
    else if(tab==="my") list=list.filter(ch=>ch.ownerId===user.id||(ch.moderators||[]).some(m=>m.userId===user.id));
    if(term) list=list.filter(ch=>ch.title.toLowerCase().includes(term)||(ch.username||"").toLowerCase().includes(term)||(ch.category||"").toLowerCase().includes(term));
    if(activeCat) list=list.filter(ch=>ch.category===activeCat);
    list=[...list].sort((a,b)=>(b.subscriberIds||[]).length-(a.subscriberIds||[]).length);
    if(!list.length){
      gridWrap.appendChild(h(`<div class="empty"><div class="icon-circle">${S.channel}</div><h3>${term||activeCat?"Ничего не найдено":"Каналов нет"}</h3><p>${tab==="subs"?"Подпишитесь на каналы":tab==="my"?"Создайте первый канал":"Будьте первым!"}</p></div>`));
      return;
    }
    const grid=h(`<div class="channel-grid"></div>`);
    list.forEach(ch=>grid.appendChild(makeChannelCard(ch,user)));
    gridWrap.appendChild(grid);
  }
  catRow.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{ activeCat=b.dataset.cat; catRow.querySelectorAll("[data-cat]").forEach(x=>x.classList.toggle("active",x.dataset.cat===activeCat)); buildGrid(); });
  searchBox.querySelector("#chq").addEventListener("input",buildGrid);
  buildGrid();

  /* Лента подписок */
  if(tab==="subs"){
    const subChs=db.channels.filter(ch=>(ch.subscriberIds||[]).includes(user.id));
    if(subChs.length){
      frag.appendChild(h(`<h2 style="font-size:16px;font-weight:800;margin:20px 0 12px;">📰 Последние публикации</h2>`));
      const chIds=new Set(subChs.map(c=>c.id));
      const recentPosts=[...db.channelPosts].filter(p=>chIds.has(p.channelId)).sort((a,b)=>b.createdAt-a.createdAt).slice(0,20);
      if(recentPosts.length){
        recentPosts.forEach(cp=>{ const ch=findChannel(cp.channelId); if(ch) frag.appendChild(makeChPostCard(cp,ch,user)); });
      } else {
        frag.appendChild(h(`<div class="empty"><div class="icon-circle">📰</div><h3>Нет новых публикаций</h3></div>`));
      }
    }
  }
  return frag;
}

/* Карточка канала */
function makeChannelCard(ch,user){
  const subsCount=(ch.subscriberIds||[]).length;
  const card=h(`<div class="channel-card">
    <div class="channel-card-banner">${ch.bannerUrl?`<img src="${esc(ch.bannerUrl)}" alt="">`:""}</div>
    <div class="channel-card-body">
      <div class="avatar channel-card-avatar">${ch.avatarUrl?`<img src="${esc(ch.avatarUrl)}">`:(esc(getInitials(ch.title)||"?"))}</div>
      <div class="channel-card-name">
        ${esc(ch.title)}
        ${ch.verified?`<span class="verified-icon">${S.check}</span>`:""}
        ${ch.blocked?`<span style="font-size:10px;color:var(--danger);">🚫</span>`:""}
      </div>
      <div class="channel-card-sub">@${esc(ch.username||ch.id)} · ${subsCount} подп.</div>
      ${ch.category?`<div style="margin-top:4px;"><span style="font-size:11px;color:var(--primary);font-weight:600;background:color-mix(in srgb,var(--primary) 12%,var(--accent));padding:2px 8px;border-radius:999px;">${esc(ch.category)}</span></div>`:""}
    </div>
  </div>`);
  card.onclick=()=>nav("channelPage",{channelId:ch.id});
  return card;
}

/* ═══════════════════════════════════════════════════════
   КАНАЛЫ В АДМИН-ПАНЕЛИ САЙТА
   ═══════════════════════════════════════════════════════ */
function renderAdminChannels(user){
  const wrap=h(`<div class="card" style="padding:18px;margin-bottom:24px;"></div>`);
  wrap.appendChild(h(`<div class="admin-section-title">📢 Каналы</div>`));
  wrap.appendChild(h(`<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;">
    <div class="card" style="padding:12px 18px;flex:1;min-width:100px;"><div style="font-size:20px;font-weight:800;">${db.channels.length}</div><div style="color:var(--muted);font-size:12px;">Каналов</div></div>
    <div class="card" style="padding:12px 18px;flex:1;min-width:100px;"><div style="font-size:20px;font-weight:800;">${db.channelPosts.length}</div><div style="color:var(--muted);font-size:12px;">Публикаций</div></div>
    <div class="card" style="padding:12px 18px;flex:1;min-width:100px;"><div style="font-size:20px;font-weight:800;">${db.channelComments.length}</div><div style="color:var(--muted);font-size:12px;">Комментариев</div></div>
  </div>`));
  if(!db.channels.length){ wrap.appendChild(h(`<div style="color:var(--muted);font-size:13px;">Каналов пока нет</div>`)); return wrap; }
  const table=h(`<div style="overflow-x:auto;"><table class="admin-table"><thead><tr><th>Канал</th><th>Подп.</th><th>Постов</th><th>Статус</th><th style="text-align:right;">Действия</th></tr></thead><tbody id="chtbody"></tbody></table></div>`);
  const tbody=table.querySelector("#chtbody");
  db.channels.forEach(ch=>{
    const owner=findUser(ch.ownerId);
    const row=h(`<tr>
      <td><div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar" style="width:36px;height:36px;font-size:13px;flex-shrink:0;">${ch.avatarUrl?`<img src="${esc(ch.avatarUrl)}">`:esc(getInitials(ch.title)||"?")}</div>
        <div>
          <div style="font-weight:700;display:flex;align-items:center;gap:4px;">${esc(ch.title)}${ch.verified?`<span class="verified-icon" style="width:14px;height:14px;">${S.check}</span>`:""}</div>
          <div style="color:var(--muted);font-size:12px;">@${esc(ch.username||"—")} · ${owner?esc(owner.displayName):"?"}</div>
        </div>
      </div></td>
      <td>${(ch.subscriberIds||[]).length}</td>
      <td>${db.channelPosts.filter(p=>p.channelId===ch.id).length}</td>
      <td>
        <span class="status-pill ${ch.blocked?"banned":"active"}">${ch.blocked?"заблок.":"активен"}</span>
        ${ch.verified?`<span class="status-pill active" style="margin-left:4px;">верифицирован</span>`:""}
      </td>
      <td style="text-align:right;"><div style="display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;">
        <button class="btn btn-sm btn-outline" data-view="${ch.id}">Открыть</button>
        <button class="btn btn-sm btn-outline" data-ver="${ch.id}" style="color:${ch.verified?"var(--green)":"var(--muted)"};">${ch.verified?"Снять верификацию":"Верифицировать"}</button>
        <button class="btn btn-sm ${ch.blocked?"btn-outline":"btn-danger-outline"}" data-block="${ch.id}">${ch.blocked?"Разблок.":"Блок."}</button>
        <button class="btn btn-sm btn-danger-outline" data-delch="${ch.id}">${S.trash}</button>
      </div></td>
    </tr>`);
    row.querySelector("[data-view]").onclick=()=>nav("channelPage",{channelId:ch.id});
    row.querySelector("[data-ver]").onclick=(e)=>{
      ch.verified=!ch.verified; saveDB(db);
      e.currentTarget.textContent=ch.verified?"Снять верификацию":"Верифицировать";
      e.currentTarget.style.color=ch.verified?"var(--green)":"var(--muted)";
      toast(ch.verified?"Верификация выдана ✓":"Верификация снята");
    };
    row.querySelector("[data-block]").onclick=(e)=>{
      ch.blocked=!ch.blocked; saveDB(db);
      e.currentTarget.textContent=ch.blocked?"Разблок.":"Блок.";
      e.currentTarget.className=`btn btn-sm ${ch.blocked?"btn-outline":"btn-danger-outline"}`;
      const pill=row.querySelector(".status-pill.active,.status-pill.banned");
      if(pill){ pill.textContent=ch.blocked?"заблок.":"активен"; pill.className=`status-pill ${ch.blocked?"banned":"active"}`; }
      toast(ch.blocked?"Канал заблокирован":"Канал разблокирован");
    };
    row.querySelector("[data-delch]").onclick=()=>{
      if(!confirm(`Удалить канал «${ch.title}»? Все посты и комментарии будут уничтожены.`)) return;
      removeEntity("channels",ch.id);
      db.channelPosts=db.channelPosts.filter(p=>p.channelId!==ch.id);
      db.channelComments=db.channelComments.filter(c=>c.channelId!==ch.id);
      saveDB(db); render(); toast("Канал удалён");
    };
    tbody.appendChild(row);
  });
  wrap.appendChild(table);
  return wrap;
}


/* ══════════════════════════════════════════════════════════════════════
   УНИВЕРСАЛЬНАЯ ПЕРЕСЫЛКА
   ══════════════════════════════════════════════════════════════════════

   openForwardModal(viewer, {text, attachments, sourceLabel})
   Показывает модалку с тремя вкладками:
     • «Моя страница»    — публикует в личную ленту
     • «В канал»         — пересылает в канал, где есть право canPost
     • «Другу в ЛС»      — отправляет личным сообщением
*/
function openForwardModal(viewer, {text='', attachments=[], sourceLabel='', sourceType='', sourceId='', sourceName='', sourceAvatarUrl=null, originalPostId=null}){
  const overlay = h(`<div class="modal-overlay"></div>`);
  const box = h(`<div class="modal-box" style="max-width:480px;">
    <h3 style="margin:0 0 14px;">${S.repost} Переслать</h3>
    ${(sourceName||sourceLabel) ? `<div style="background:var(--accent);border-radius:12px;padding:10px 14px;font-size:13.5px;margin-bottom:14px;">
      <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:4px;">${S.repost} Переслано от: ${esc(sourceName||sourceLabel)}</div>
      ${text?`<div style="white-space:pre-wrap;word-break:break-word;max-height:70px;overflow:hidden;color:var(--fg);font-size:13.5px;">${esc(text.slice(0,180))}${text.length>180?'…':''}</div>`:''}
      ${!text&&attachments&&attachments.length?`<div style="color:var(--muted);font-size:13px;">📎 ${attachments.length} вложений</div>`:''}
    </div>` : ''}
    <div class="fwd-modal-tabs">
      <button class="fwd-tab active" data-ftab="feed">📰 Моя страница</button>
      <button class="fwd-tab" data-ftab="channel">📢 В канал</button>
      <button class="fwd-tab" data-ftab="dm">💬 Другу</button>
    </div>
    <div id="fwdbody"></div>
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-outline" id="fwdclose">Отмена</button>
    </div>
  </div>`);
  box.querySelector('#fwdclose').onclick = () => overlay.remove();

  const body = box.querySelector('#fwdbody');
  const tabs = box.querySelectorAll('.fwd-tab');
  let activeTab = 'feed';

  function showTab(tab){
    activeTab = tab;
    tabs.forEach(t => t.classList.toggle('active', t.dataset.ftab === tab));
    body.innerHTML = '';
    if(tab === 'feed')    buildFeedTab();
    if(tab === 'channel') buildChannelTab();
    if(tab === 'dm')      buildDmTab();
  }
  tabs.forEach(t => t.onclick = () => showTab(t.dataset.ftab));

  /* ── Вкладка: Моя страница ── */
  function buildFeedTab(){
    const commentBox = h(`<div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Добавьте комментарий (необязательно):</div>
      <textarea id="fwdcomment" rows="2" style="width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-family:inherit;font-size:14px;resize:none;outline:none;" placeholder="Ваш комментарий…"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:10px;width:100%;" id="fwdtoFeed">📰 Опубликовать на странице</button>
    </div>`);
    commentBox.querySelector('#fwdtoFeed').onclick = () => {
      const comment = commentBox.querySelector('#fwdcomment').value.trim();
      const content = (comment ? comment + '\n\n' : '') + (text || '');
      const fwdMeta = sourceType ? {type:sourceType, id:sourceId, name:sourceName||sourceLabel, avatarUrl:sourceAvatarUrl, originalPostId, originalText:text?text.slice(0,300):null} : null;
      db.posts.unshift({id:nid(), authorId:viewer.id, content:content.trim(), createdAt:Date.now(), likedBy:[], reactions:{}, isForwarded:true, forwardedFrom:fwdMeta});
      saveDB(db); overlay.remove(); toast('Опубликовано на вашей странице 📰');
    };
    body.appendChild(commentBox);
  }

  /* ── Вкладка: В канал ── */
  function buildChannelTab(){
    /* Каналы где viewer — создатель или модератор с canPost */
    const myChannels = db.channels.filter(ch =>
      !ch.blocked && (isChannelOwner(ch,viewer) || chModCan(ch,viewer,'canPost'))
    );
    if(!myChannels.length){
      body.appendChild(h(`<div class="fwd-note">У вас нет каналов для публикации.<br>Создайте канал в разделе «Каналы».</div>`));
      return;
    }

    const srch = h(`<input placeholder="🔍 Поиск канала…" style="width:100%;padding:8px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;outline:none;margin-bottom:10px;">`);
    body.appendChild(srch);

    const list = h(`<div class="fwd-user-list"></div>`);
    body.appendChild(list);

    const commentRow = h(`<div style="margin-top:10px;display:none;" id="fwdChCommentRow">
      <textarea id="fwdchcomment" rows="2" style="width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-family:inherit;font-size:14px;resize:none;outline:none;" placeholder="Добавить комментарий…"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:8px;width:100%;" id="fwdToChBtn">📢 Переслать в канал</button>
    </div>`);
    body.appendChild(commentRow);

    let selectedCh = null;

    function buildList(term){
      list.innerHTML = '';
      myChannels.filter(ch => !term || ch.title.toLowerCase().includes(term.toLowerCase()) || (ch.username||'').toLowerCase().includes(term.toLowerCase()))
        .forEach(ch => {
          const row = h(`<div class="fwd-user-row ${selectedCh===ch?'selected':''}">
            <div class="avatar" style="width:38px;height:38px;font-size:13px;flex-shrink:0;">${ch.avatarUrl?`<img src="${esc(ch.avatarUrl)}">`:esc(getInitials(ch.title)||'?')}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(ch.title)}${ch.verified?`<span class="verified-icon" style="width:12px;height:12px;">${S.check}</span>`:""}</div>
              <div style="color:var(--muted);font-size:12px;">@${esc(ch.username||ch.id)} · ${(ch.subscriberIds||[]).length} подп.</div>
            </div>
            ${selectedCh===ch?'<span style="color:var(--primary);font-size:18px;">✓</span>':''}
          </div>`);
          row.onclick = () => {
            selectedCh = ch;
            buildList(srch.value);
            commentRow.style.display = '';
          };
          list.appendChild(row);
        });
    }
    srch.addEventListener('input', e => buildList(e.target.value));
    buildList('');

    commentRow.querySelector('#fwdToChBtn').onclick = () => {
      if(!selectedCh) return;
      const comment = commentRow.querySelector('#fwdchcomment').value.trim();
      const content = (comment ? comment + '\n\n' : '') + (text || '');
      const fwdMeta = sourceType ? {type:sourceType, id:sourceId, name:sourceName||sourceLabel, avatarUrl:sourceAvatarUrl, originalPostId, originalText:text?text.slice(0,300):null} : null;
      db.channelPosts.unshift({
        id:nid(), channelId:selectedCh.id, authorId:viewer.id,
        content:content.trim(), attachments:[...attachments],
        reactions:{}, views:0, reposts:0, pinned:false, isForwarded:true, forwardedFrom:fwdMeta, createdAt:Date.now()
      });
      notifyChannelSubscribers(selectedCh, 'Новая публикация');
      /* Вставляем пост в DOM канала если мы на его странице */
      const chFeedEl=document.getElementById("chfeed");
      if(chFeedEl&&route&&route.params&&route.params.channelId===selectedCh.id){
        const latestCp=db.channelPosts.find(p=>p.channelId===selectedCh.id);
        if(latestCp){ const emp=chFeedEl.querySelector(".empty"); if(emp) emp.remove(); chFeedEl.insertBefore(makeChPostCard(latestCp,selectedCh,viewer),chFeedEl.firstChild); }
      }
      saveDB(db); overlay.remove(); toast(`Переслано в «${selectedCh.title}» 📢`);
    };
  }

  /* ── Вкладка: Другу в ЛС ── */
  function buildDmTab(){
    const friendIds = [...friendIdsOf(viewer.id)];
    if(!friendIds.length){
      body.appendChild(h(`<div class="fwd-note">У вас пока нет друзей.<br>Добавьте друзей, чтобы пересылать им сообщения.</div>`));
      return;
    }

    const srch = h(`<input placeholder="🔍 Поиск друга…" style="width:100%;padding:8px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:13px;outline:none;margin-bottom:10px;">`);
    body.appendChild(srch);

    const list = h(`<div class="fwd-user-list"></div>`);
    body.appendChild(list);

    const commentRow = h(`<div style="margin-top:10px;display:none;" id="fwdDmCommentRow">
      <textarea id="fwddmcomment" rows="2" style="width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-family:inherit;font-size:14px;resize:none;outline:none;" placeholder="Добавить комментарий…"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:8px;width:100%;" id="fwdToDmBtn">💬 Отправить в ЛС</button>
    </div>`);
    body.appendChild(commentRow);

    let selectedFriend = null;

    function buildFriendList(term){
      list.innerHTML = '';
      friendIds.map(id => findUser(id)).filter(Boolean)
        .filter(u => !term || u.displayName.toLowerCase().includes(term.toLowerCase()) || u.username.toLowerCase().includes(term.toLowerCase()))
        .forEach(u => {
          const row = h(`<div class="fwd-user-row ${selectedFriend===u?'selected':''}">
            <div class="avatar" style="width:38px;height:38px;font-size:13px;flex-shrink:0;">${u.avatarUrl?`<img src="${esc(u.avatarUrl)}">`:esc(getInitials(u.displayName))}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:13.5px;">${esc(u.displayName)}${verifiedBadge(u)}${premiumBadge(u)}</div>
              <div style="color:var(--muted);font-size:12px;">@${esc(u.username)}</div>
            </div>
            ${selectedFriend===u?'<span style="color:var(--primary);font-size:18px;">✓</span>':''}
          </div>`);
          row.onclick = () => {
            selectedFriend = u;
            buildFriendList(srch.value);
            commentRow.style.display = '';
          };
          list.appendChild(row);
        });
    }
    srch.addEventListener('input', e => buildFriendList(e.target.value));
    buildFriendList('');

    commentRow.querySelector('#fwdToDmBtn').onclick = () => {
      if(!selectedFriend) return;
      const comment = commentRow.querySelector('#fwddmcomment').value.trim();
      const msgText = (comment ? comment + '\n\n' : '') + (text || '');
      const fwdMeta = sourceType ? {type:sourceType, id:sourceId, name:sourceName||sourceLabel, avatarUrl:sourceAvatarUrl, originalPostId, originalText:text?text.slice(0,300):null} : null;
      const conv = openConvWith(viewer.id, selectedFriend.id);
      db.messages.push({id:nid(), conversationId:conv.id, senderId:viewer.id, content:msgText.trim(), type:'text', isForwarded:true, forwardedFrom:fwdMeta, createdAt:Date.now()});
      saveDB(db); overlay.remove(); toast(`Переслано ${selectedFriend.displayName} 💬`);
    };
  }

  showTab('feed');
  overlay.appendChild(box);
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}


/* ══ RENDER: СКОРО ══ */

/* ── Рендер голосового сообщения ── */

function buildBubbleContent(msg){
  if(msg.type==='voice'){
    const wrap=document.createElement("div"); wrap.className="bubble";
    wrap.appendChild(renderVoiceMessage(msg));
    return wrap;
  }
  const bub=document.createElement("div"); bub.className="bubble";
  // форматирование текста
  let txt=esc(msg.content||"");
  // поддержка **bold**, _italic_
  txt=txt.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/_(.+?)_/g,"<i>$1</i>");
  bub.innerHTML=txt;
  return bub;
}

function renderVoiceMessage(msg){
  const BARS=20;
  const meta=msg.voiceMeta||{};
  const totalDur=meta.duration||0;
  const peaks=meta.peaks||Array.from({length:BARS},(_,i)=>0.3+0.5*Math.sin(i*0.8+1));
  const fmtDur=s=>{ s=Math.max(0,s); const m=Math.floor(s/60),ss=Math.floor(s%60); return m+":"+(ss<10?"0":"")+ss; };
  const ICO_PLAY='<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><polygon points="5,3 19,12 5,21"/></svg>';
  const ICO_PAUSE='<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>';

  const el=document.createElement("div");
  el.className="voice-msg";

  const playBtn=document.createElement("button");
  playBtn.className="voice-play-btn";
  playBtn.title="Воспроизвести";
  playBtn.innerHTML=ICO_PLAY;

  const wf=document.createElement("div");
  wf.className="voice-waveform";
  wf.style.cursor="pointer";
  const normPeaks=peaks.map(p=>Math.max(0.15,Math.min(1,p)));
  normPeaks.forEach(p=>{
    const b=document.createElement("div");
    b.className="voice-bar";
    b.style.height=Math.round(p*100)+"%";
    wf.appendChild(b);
  });

  const durEl=document.createElement("div");
  durEl.className="voice-dur";
  durEl.textContent=fmtDur(totalDur);

  el.appendChild(playBtn);
  el.appendChild(wf);
  el.appendChild(durEl);

  if(!msg.voiceData){
    playBtn.disabled=true;
    playBtn.style.opacity="0.4";
    playBtn.title="Аудио недоступно";
    return el;
  }

  let audio=null;
  let playing=false;
  let raf=null;
  const bars=wf.querySelectorAll(".voice-bar");

  function getAudio(){
    if(audio) return audio;
    audio=new Audio();
    audio.preload="auto";
    /* Пробуем data-URL напрямую; некоторые браузеры не поддерживают webm — конвертируем MIME */
    let src=msg.voiceData;
    /* Chrome записывает audio/webm, Firefox/Safari — иногда audio/ogg или audio/mp4 */
    audio.src=src;
    audio.onended=resetUI;
    audio.onerror=()=>{
      resetUI();
      toast("Не удалось воспроизвести голосовое сообщение");
    };
    return audio;
  }

  function resetUI(){
    playing=false;
    playBtn.innerHTML=ICO_PLAY;
    bars.forEach(b=>b.classList.remove("active"));
    durEl.textContent=fmtDur(totalDur);
    cancelAnimationFrame(raf);
  }

  function tickProgress(){
    if(!audio||audio.paused){ cancelAnimationFrame(raf); return; }
    const prog=audio.duration>0?(audio.currentTime/audio.duration):0;
    bars.forEach((b,i)=>b.classList.toggle("active",i/bars.length<=prog));
    durEl.textContent=fmtDur(audio.currentTime);
    raf=requestAnimationFrame(tickProgress);
  }

  playBtn.onclick=()=>{
    const a=getAudio();
    if(playing){
      a.pause();
      playing=false;
      playBtn.innerHTML=ICO_PLAY;
      cancelAnimationFrame(raf);
    } else {
      /* resume AudioContext (mobile autoplay policy) */
      if(window.AudioContext||window.webkitAudioContext){
        try{ const ctx=new (window.AudioContext||window.webkitAudioContext)(); ctx.resume(); }catch(e){} 
      }
      const p=a.play();
      if(p&&p.catch) p.catch(err=>{
        console.warn("voice play error",err);
        if(err.name==="NotSupportedError"||err.name==="NotAllowedError"){
          toast("Воспроизведение заблокировано браузером. Нажмите кнопку ещё раз.");
        } else {
          toast("Ошибка воспроизведения: "+err.message);
        }
        resetUI();
      });
      playing=true;
      playBtn.innerHTML=ICO_PAUSE;
      tickProgress();
    }
  };

  /* Seek по клику на волну */
  wf.onclick=(e)=>{
    const a=getAudio();
    if(!a.duration) return;
    const rect=wf.getBoundingClientRect();
    const ratio=(e.clientX-rect.left)/rect.width;
    a.currentTime=a.duration*Math.max(0,Math.min(1,ratio));
    if(!playing){
      bars.forEach((b,i)=>b.classList.toggle("active",i/bars.length<=ratio));
      durEl.textContent=fmtDur(a.currentTime);
    }
  };

  return el;
}


/* ── buildMsgEl: враппер для совместимости с голосовыми ── */
function buildMsgEl(msg){
  const isMe=msg.senderId===user.id;
  const wrapper=document.createElement("div");
  wrapper.className="msg-row "+(isMe?"row-out":"row-in");
  const bub=buildBubbleContent(msg);
  const time=document.createElement("div");
  time.className="msg-time";
  time.textContent=new Date(msg.createdAt).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  wrapper.appendChild(bub);
  wrapper.appendChild(time);
  return wrapper;
}

function _b64ToBlob(b64,mime){
  const bin=atob(b64),buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return new Blob([buf],{type:mime});

const GAMES_CATALOG=[
  {id:"car-racing",title:"Car Racing",emoji:"🏎️",genre:"Гонки",
   desc:"Уклоняйся от препятствий и мчись к победе!",b64:GAME_CAR_RACING_B64}

let gameOverlayEl=null;
function openGameOverlay(game){
  if(gameOverlayEl) gameOverlayEl.remove();
  const blob=_b64ToBlob(game.b64,"text/html; charset=utf-8");
  const url=URL.createObjectURL(blob);
  const el=document.createElement("div");
  el.className="game-overlay";
  const bar=document.createElement("div"); bar.className="game-overlay-bar";
  bar.innerHTML='<span style="font-size:20px;">'+game.emoji+'</span><span class="game-overlay-title">'+esc(game.title)+'</span>';
  const cls=document.createElement("button"); cls.className="game-overlay-close"; cls.title="Закрыть";
  cls.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  cls.onclick=()=>{ el.remove(); gameOverlayEl=null; URL.revokeObjectURL(url); };
  bar.appendChild(cls); el.appendChild(bar);
  const fr=document.createElement("iframe"); fr.className="game-iframe";
  fr.setAttribute("allow","autoplay; fullscreen"); fr.allowFullscreen=true;
  fr.src=url; el.appendChild(fr);
  document.body.appendChild(el); gameOverlayEl=el;
}

function renderGames(user){
  const wrap=document.createElement("div");
  const title=document.createElement("h1"); title.className="section-title";
  title.innerHTML=S.games+" Игры"; wrap.appendChild(title);
  const grid=document.createElement("div"); grid.className="games-grid";
  GAMES_CATALOG.forEach(game=>{
    const card=document.createElement("div"); card.className="game-card";
    card.innerHTML='<div class="game-card-thumb"><span style="font-size:56px;">'+game.emoji+'</span></div>'
      +'<div class="game-card-body"><div class="game-card-title">'+esc(game.title)+'</div>'
      +'<div class="game-card-meta">'+esc(game.desc)+'</div>'
      +'<div class="game-card-badge">'+esc(game.genre)+'</div></div>';
    card.onclick=()=>openGameOverlay(game);
    grid.appendChild(card);
  });
  wrap.appendChild(grid); return wrap;
}
